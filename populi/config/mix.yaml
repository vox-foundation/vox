# Production mix for Populi QLoRA: primary train.jsonl + tool-trace supervision rows.
# Run from repo root: `vox corpus mix --config populi/config/mix.yaml`
# Full pipeline:
#   1. vox corpus generate --output populi/data/synthetic.jsonl
#   2. vox corpus mix --config populi/config/mix.yaml
#   3. vox populi train --backend qlora --tokenizer hf --data-dir target/dogfood

sources:
  # Primary Vox corpus (extracted from .vox files via `vox corpus extract`)
  - path: populi/data/train.jsonl
    weight: 2.0

  # Backup full corpus snapshot
  - path: populi/data/train_full_backup.jsonl
    weight: 1.0

  # Example tool traces (manually curated reference set)
  - path: populi/data/tool_traces.example.jsonl
    weight: 2.0
    record_format: tool_trace

  # Synthetic corpus: generated by `vox corpus generate`
  # Covers all MCP tools, A2A types, skills, workflows, orchestrator commands, agents.
  # Regenerate any time you add new tools: `vox corpus generate`
  - path: populi/data/synthetic.jsonl
    weight: 3.0

  # Live telemetry traces extracted via `vox corpus replay`
  - path: populi/data/arca_replay.jsonl
    weight: 1.5

  # A2A traces (subset of synthetic, higher weight for agent coordination)
  # Optional: separate a2a_trace file for weighted emphasis
  # - path: populi/data/synthetic_a2a.jsonl
  #   weight: 2.0
  #   record_format: a2a_trace

  # Workflow traces (subset of synthetic)
  # - path: populi/data/synthetic_workflows.jsonl
  #   weight: 2.0
  #   record_format: workflow_trace

  # ASR transcript correction pairs (for Oratio Vox integration)
  # - path: populi/data/asr_pairs.jsonl
  #   weight: 1.0
  #   record_format: asr_refine

output: target/dogfood/train_mixed.jsonl

# Remove duplicate (prompt, response) pairs across all sources.
deduplicate: true
