# Production mix for Populi QLoRA: primary train.jsonl + tool-trace supervision rows.
# Run from repo root: `vox populi corpus mix --config populi/config/mix.yaml`
# `vox populi train` auto-runs mix when this file exists and copies output to `--data-dir/train.jsonl`.

sources:
  - path: populi/data/train.jsonl
    weight: 2
    optional: true              # Generated by pipeline; absent on first-run is fine
  - path: populi/data/train_full_backup.jsonl
    weight: 2
  - path: populi/data/tool_traces.example.jsonl
    weight: 2
    record_format: tool_trace
  - path: populi/data/synthetic.jsonl
    weight: 2
  - path: populi/data/golden_pairs.jsonl
    weight: 4                   # Human-curated pairs: highest signal weight
  - path: populi/data/synthetic_search.jsonl
    weight: 2
  - path: populi/data/golden_validated.jsonl
    weight: 2
  - path: populi/data/autofeedback.jsonl
    weight: 1
    optional: true              # Self-improvement loop; absent until first dogfood run

output: target/dogfood/train_mixed.jsonl
