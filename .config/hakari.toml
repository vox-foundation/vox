# This file contains settings for `cargo hakari`.
# See https://docs.rs/cargo-hakari/latest/cargo_hakari/config for a full list of options.

hakari-package = "workspace-hack"

# Format version for hakari's output. Version 4 requires cargo-hakari 0.9.22 or above.
dep-format-version = "4"

# Setting workspace.resolver = "2" or higher in the root Cargo.toml is HIGHLY recommended.
# Hakari works much better with the v2 resolver. (The v2 and v3 resolvers are identical from
# hakari's perspective, so you're welcome to set either.)
#
# For more about the new feature resolver, see:
# https://blog.rust-lang.org/2021/03/25/Rust-1.51.0.html#cargos-new-feature-resolver
resolver = "2"

# Add triples corresponding to platforms commonly used by developers here.
# https://doc.rust-lang.org/rustc/platform-support.html
platforms = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# Write out exact versions rather than a semver range. (Defaults to false.)
# exact-versions = true

# L0 pure-types crates: keep them out of workspace-hack so they don't pull in
# the unified feature floor (tokio[full], reqwest, axum, hyper, wasmtime, ...).
# These crates have only serde/thiserror-style deps and benefit nothing from
# unification. See docs/src/architecture/2026-05-08-workspace-reorg-design.md Phase 2.
[traversal-excludes]
workspace-members = [
    "vox-orchestrator-types",
    "vox-db-types",
    "vox-protocol",
    "vox-mesh-types",
    "vox-primitives",
    "vox-plugin-types",
    "vox-layer-check",
]

[final-excludes]
third-party = [
    { name = "candle-core" },
    { name = "candle-nn" },
    { name = "candle-transformers" },
    { name = "float8" },
    { name = "cudarc" }
]
# Don't add `workspace-hack = ...` to these — they're truly leaf and shouldn't
# pay the workspace-hack compile cost.
workspace-members = [
    "vox-orchestrator-types",
    "vox-db-types",
    "vox-protocol",
    "vox-mesh-types",
    "vox-primitives",
    "vox-plugin-types",
    "vox-layer-check",
]
