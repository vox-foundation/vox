[profile.default]
retries = 2
# Per-test hang detection (this cargo-nextest build does not accept profile-level `global-timeout`).
slow-timeout = { period = "60s", terminate-after = 3 }
fail-fast = false

[profile.ci]
retries = 1
# llvm-cov / self-hosted runners: full `generate()` on large fixtures can exceed 240s wall time.
slow-timeout = { period = "180s", terminate-after = 3 }
