version: "1"
# Full eval gate policy — used by:
#   Step 2 of full-pipeline.vox (pre-flight, before training)
#   `vox mens eval-gate --run-dir <run>` after eval-local + review pipeline
#   Cycle 2 gate in scripts/mens/run_4080_cycles.vox
#
# All blocking gates require their source files to exist in the run directory.
# On a first-ever run (no benchmark_passatk.json / eval_local_report.json /
# review_metrics.json), use VOX_MENS_FORCE_TRAIN=1 to bypass Step 2.
# After training run eval-local and the review pipeline to satisfy those gates.
#
# After every gate run (pass or fail) gate_receipt.json is written to run_dir:
#   {"schema":"vox_mens_gate_receipt_v1","overall_passed":true,"gates":[...]}
# Orchestrators and A2A consumers read this instead of re-running the gate.
#
# Source file map:
#   training_manifest.json  → truncation, device_profile              (trainer)
#   telemetry.jsonl         → supervised_ratio, throughput            (trainer)
#   eval_results.json       → vox_parse_rate, construct_coverage_pct (corpus eval, Step 4)
#   benchmark_passatk.json  → pass_at_k                              (`vox mens eval-local`)
#   eval_local_report.json  → anti_stub                              (`vox mens eval-local`)
#   review_metrics.json     → review_recurrence                      (review pipeline)

supervised_ratio:
  min_pct: 10.0
  block: true

truncation:
  max_fraction: 0.50
  block: true

throughput:
  min_tokens_per_sec:
    cpu: 1.0
    rtx_4080_super: 10.0
  block: false

eval_local:
  min_parse_rate: 0.60
  min_coverage_pct: 0.35
  block: true

pass_at_k:
  min_pass_rate_at_1: 0.25
  min_pass_rate_at_k: 0.50
  max_regression_drop: 0.03
  metrics_file: benchmark_passatk.json
  baseline_file: baseline_passatk.json
  block: true

per_context: {}

modal_mix:
  max_voice_fraction: 0.30
  block: false

mcp_tool_schema:
  min_strict_validity_rate: 0.0
  block: false
  metrics_file: mcp_tool_schema_kpi.json

anti_stub:
  min_pass_rate: 0.92
  max_placeholder_event_rate: 0.08
  max_trivial_placeholder_event_rate: 0.08
  min_construct_richness_mean: 0.20
  block: true

review_recurrence:
  max_repeated_finding_rate: 0.30
  max_post_training_regression_rate: 0.15
  min_recurrence_delta: 0.01
  block: true
