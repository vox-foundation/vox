# Centralized source of truth for all training prompt templates.
# Used by synthetic_gen.rs to avoid hardcoding massive arrays of prompts.
# Placeholders: {tool}, {desc}, {desc_lower} (tool defs), {msg_type}/{from}/{to} (a2a),
# {value} (skills), {name}/{desc} (workflows/agents).

synthetic:
  tool_definitions:
    - "Please provide the Rust implementation for a Vox tool named `{tool}`."
    - "I need the MCP tool definition and handler for `{tool}`."
    - "Can you show me the code for the `{tool}` tool?"
    - "Implement the `{tool}` tool for the orchestrator."
    - "Show me how `{tool}` is defined in the Vox MCP server."
    - "Write the function signature and doc comments for `{tool}`."
    - "How do I implement the `{tool}` capability in Rust?"
    - "Provide the `Tool` struct generation logic for `{tool}`."

  a2a_messages:
    - "We need to send an A2A message of type `{msg_type}`. Give me an example."
    - "Show a sample JSON payload for a `{msg_type}` message."
    - "What does a `{msg_type}` event look like in the orchestrator?"
    - "Generate an example of an agent-to-agent `{msg_type}` communication."
    - "I'm writing an agent that handles `{msg_type}`. What should the message structure be?"

  skills:
    - "Create a new Vox skill for `{value}`."
    - "I need a SKILL.md template for a `{value}` capability."
    - "Write a skill definition for `{value}`."
    - "How do I define a `{value}` workflow in a skill?"
    - "Provide the directory structure and manifest for `{value}`."

  orchestrator_commands:
    - "I want to perform the following action: {desc_lower}."
    - "What is the command to {desc_lower}?"
    - "Show me how to use the orchestrator to {desc_lower}."
    - "Execute the `{tool}` orchestrator command."
    - "Agent requested capability: {desc}."

  inverse:
    instruction: |
      You are an expert AI creating supervised fine-tuning data.
      Analyze the following source code or tool output and generate a short, natural language command 
      that a human or agent would have typed to request it.
      Return ONLY the command string, with no quotes or markdown.
      
      SOURCE:
      {value}

  workflows:
    - name: "stripe_checkout"
      description: "a durable Stripe checkout workflow"
      snippet: |
        @workflow fn stripe_checkout(req: CheckoutReq) to CheckoutRes:
            let lock = vox_lock_acquire("stripe_checkout", req.id)
            if !lock.acquired:
                ret CheckoutRes { status: "conflict" }
            let payment = vox_stripe_charge(req.amount, req.token)
            vox_db_insert("payments", payment)
            vox_lock_release(lock.id)
            ret CheckoutRes { status: "success", payment_id: payment.id }
    - name: "email_campaign"
      description: "durable drip email campaign"
      snippet: |
        @workflow fn email_campaign(user: User) to Unit:
            vox_email_send(user.email, "welcome_01")
            vox_sleep(Duration::from_days(1))
            let active = vox_db_query("SELECT active FROM users WHERE id=?", [user.id])
            if active:
                vox_email_send(user.email, "tips_02")
            ret
    - name: "retry_pipeline"
      description: "a durable data pipeline with exponential backoff"
      snippet: |
        @workflow fn retry_pipeline(job: Job) to JobResult:
            let mut attempts = 0
            loop:
                let res = vox_run_job(job)
                if res.success:
                    ret res
                attempts += 1
                if attempts > 3:
                    ret JobResult { success: false, error: "max retries" }
                vox_sleep(Duration::from_mins(2 ^ attempts))

  agents:
    - name: "code_reviewer"
      description: "review pull requests and leave structured feedback"
      snippet: |
        @agent_def fn code_reviewer() to ReviewReport:
            tools: [vox_validate_file, vox_run_tests, vox_git_diff]
            memory: long_term
            fn run(pr_id: String) to ReviewReport:
                let diff = vox_git_diff(pr_id)
                let valid = vox_validate_file(diff.path)
                ret ReviewReport { issues: valid.errors, diff: diff }
    - name: "corpus_builder"
      description: "expand the Mens training corpus by generating synthetic pairs"
      snippet: |
        @agent_def fn corpus_builder() to Unit:
            tools: [vox_generate_code, vox_memory_store]
            fn run(taxonomy: List[String]) to Unit:
                for construct in taxonomy:
                    let pairs = generate_pairs(construct)
                    vox_memory_store("corpus." + construct, pairs)
                ret
    - name: "test_runner"
      description: "run the test suite and report failures to the orchestrator"
      snippet: |
        @agent_def fn test_runner() to TestReport:
            tools: [vox_run_tests, vox_a2a_send]
            fn run(crate_name: String) to TestReport:
                let report = vox_run_tests(crate_name)
                if report.failures > 0:
                    vox_a2a_send("orchestrator", "error_report", report)
                ret report
