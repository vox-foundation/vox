# Hardened MENS Corpus Mix — vox-lang adapter primary feed (Wave 0-5)
#
# This file feeds the vox-lang LoRA adapter ONLY.
# rust-expert corpus belongs in mix-rust.yaml (separate adapter).
# agents corpus belongs in mix-agents.yaml (separate adapter).
#
# Sources should all carry meaningful vox-lang signal.

sources:
  # PRIMARY: Validated mixed dataset — broadest, highest-quality vox source.
  # NOT optional: if this is missing the entire vox-lang adapter has no signal.
  # Strict-mix guarantee: if validated_mixed.jsonl is missing OR emits zero rows,
  # the corpus mix step fails closed instead of silently producing an empty corpus.
  - path: target/dogfood/validated_mixed.jsonl
    weight: 6.0                   # Validated mixed (GOLDEN / Wave 0–4 combined)
    optional: false

  - path: target/dogfood/vox_corpus_extract_pkg.jsonl
    weight: 2.0                   # Human-mined vox workspace code (GOLDEN / Wave 0)
    optional: true

  - path: target/dogfood/mutated_vox.jsonl
    weight: 1.5                   # Structural AST mutations — pure vox-lang signal
    optional: true

  - path: mens/data/research-lane-sft.jsonl
    weight: 1.0                   # Research domain warm-up
    optional: true

  - path: target/dogfood/train.jsonl
    weight: 0.5                   # Template-expanded synthetic vox (Wave 1)
    sample_rate: 0.05             # Heavily downsample to avoid monoculture
    optional: true

  - path: mens/data/synthetic.jsonl
    weight: 0.5
    sample_rate: 0.1
    optional: true

  # Real tool traces go here once harvested from orchestrator session captures.
  # Schema: ToolTraceRecord (task_prompt, tool_name, arguments_json, result_json,
  #   success, optional followup_text) — see mix.example.yaml and vox-corpus ToolTraceRecord.
  #
  # Source: orchestrator session captures under target/dogfood/ (real tool
  # invocations from `vox-orchestrator-d` runs).  Promote into the mix with
  # `vox populi corpus extract` — NOT `vox mens corpus generate`, which only
  # produces synthetic pairs to mens/data/synthetic.jsonl.
  # DO NOT reference tool_traces.example.jsonl — that file is a 1-row stub ({}).
  - path: mens/data/tool_traces.jsonl
    weight: 4.0                   # High-value tool trajectories with vox output
    record_format: tool_trace
    optional: true

output: target/dogfood/train_mixed.jsonl
include_lanes:
  - vox_codegen
  - vox_tooling
  - vox_docs_qa
  - vox_lang_tier_b
exclude_lanes:
  - vox_speech
  - vox_rust_expert_cross    # Rust-flavoured — belongs in mix-rust.yaml only
