# Hardened MENS Corpus Mix (Wave 0-4)
# Prioritizes compiler-verified golden data over massive synthetic lanes.

sources:
  - path: target/dogfood/vox_corpus_extract.jsonl
    weight: 10                  # Primary Golden Lane: compiler-verified
  - path: target/dogfood/preference_pairs.jsonl
    weight: 4                   # DPO Lane: verified preference pairs
    optional: true
  - path: target/dogfood/mutated_vox.jsonl
    weight: 5                   # Structural Mutations
    optional: true
  - path: target/dogfood/rust_to_vox.jsonl
    weight: 3                   # Cross-domain verified translations
    optional: true
  - path: mens/data/research-lane-sft.jsonl
    weight: 2                   # Research/Reasoning lanes
    optional: true
  - path: target/dogfood/train.jsonl
    weight: 1                   # Synthetic Monoculture: downweighted
    sample_rate: 0.1            # DOWNSAMPLE to 10% to prevent mode collapse
  - path: mens/data/synthetic.jsonl
    weight: 1
    sample_rate: 0.2
  - path: mens/data/tool_traces.example.jsonl
    weight: 4                   # High-value tool trajectories
    record_format: tool_trace

output: target/dogfood/train_mixed.jsonl
include_lanes:
  - vox_codegen
  - vox_tooling
  - vox_docs_qa
exclude_lanes:
  - vox_speech

