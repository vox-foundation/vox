# Hardened MENS Corpus Mix (Wave 0-4)
# Prioritizes compiler-verified golden data over massive synthetic lanes.

sources:
  - path: target/dogfood/vox_corpus_extract_pkg.jsonl
    weight: 1.0                   # Human-mined workspace code (GOLDEN / Wave 0)
    optional: true

  - path: target/dogfood/vox_rust_expert_cross.jsonl
    weight: 1.0                   # Cross-domain verified translations (MINE / Wave 2)
    optional: true

  - path: target/dogfood/mutated_vox.jsonl
    weight: 1.0                   # Structural AST mutations (Wave 2)
    optional: true

  - path: target/dogfood/train.jsonl
    weight: 1.0                   # Template-expanded synthetic (Wave 1)
    sample_rate: 0.1              # Downsample to avoid monoculture
    optional: true
  - path: mens/data/synthetic.jsonl
    weight: 1
    sample_rate: 0.2
  - path: mens/data/tool_traces.example.jsonl
    weight: 4                   # High-value tool trajectories
    record_format: tool_trace

output: target/dogfood/train_mixed.jsonl
include_lanes:
  - vox_codegen
  - vox_tooling
  - vox_docs_qa
  - vox_rust_expert_cross
  - vox_lang_tier_b
exclude_lanes:
  - vox_speech

