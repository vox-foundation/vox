# Mix configuration for rust-expert domain
# rust_source.jsonl is 464MB — sample at 2% to keep run manageable on RTX 4080 SUPER.
output: mens/data/train_mixed_rust.jsonl
sources:
  - path: target/dogfood/rust_pairs.validated.jsonl
    weight: 4.0
    optional: true
  - path: target/dogfood/vox_rust_expert_cross.jsonl
    weight: 3.0                   # Cross-domain verified Rust↔Vox (MINE / Wave 2)
    optional: true
  - path: target/dogfood/vox_corpus_extract_pkg.jsonl
    weight: 2.0                   # Human-mined workspace code (breadth)
    optional: true
  - path: mens/data/mix_sources/rust_source.jsonl
    weight: 1.5
    sample_rate: 0.02             # 464MB × 2% ≈ 9.3MB — fits in VRAM budget
    optional: true
