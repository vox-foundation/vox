# ── Training preset configurations ──────────────────────────────────────────
#
# SSOT for both local and cloud training preset selection.
# `vox mens train --preset auto` reads these to pick the best config for
# the available VRAM. Cloud dispatch reads the same to populate container env.
#
# Fields:
#   seq_len:     Training sequence length in tokens
#   batch_size:  Micro-batch size per step
#   grad_accum:  Gradient accumulation steps (effective batch = batch × grad_accum)
#   lr:          Learning rate
#   max_vram_mb: This preset fits in this many MB of VRAM (upper bound for selection)
#
# Selection rule: pick the preset with the largest max_vram_mb that still fits.

presets:
  tiny:
    seq_len: 256
    batch_size: 1
    grad_accum: 4
    lr: 5.0e-5
    max_vram_mb: 8192

  safe:
    seq_len: 384
    batch_size: 1
    grad_accum: 2
    lr: 3.0e-5
    max_vram_mb: 10240

  # Matches 12GB cards (RTX 3060, RTX 4070)
  prosumer_12g:
    seq_len: 512
    batch_size: 1
    grad_accum: 1
    lr: 2.0e-5
    max_vram_mb: 12288

  # Matches 16GB cards — RTX 4080 / 4080 Super / 4070 Ti Super (primary dev GPU)
  prosumer_16g:
    seq_len: 1024
    batch_size: 1
    grad_accum: 4
    lr: 2.0e-5
    max_vram_mb: 16384

  # Matches 24GB cards — RTX 3090 / 4090 / A10
  prosumer_24g:
    seq_len: 768
    batch_size: 2
    grad_accum: 1
    lr: 1.5e-5
    max_vram_mb: 24576

  # Matches NVIDIA A6000 (48GB), L40, L40S
  a6000:
    seq_len: 1024
    batch_size: 4
    grad_accum: 1
    lr: 1.0e-5
    max_vram_mb: 49152

  # Matches A100 40/80GB, H100 PCIe
  a100:
    seq_len: 2048
    batch_size: 8
    grad_accum: 1
    lr: 8.0e-6
    max_vram_mb: 81920

  # Matches H100 SXM, H200, B100, B200 (highest tier)
  h100:
    seq_len: 4096
    batch_size: 16
    grad_accum: 1
    lr: 5.0e-6
    max_vram_mb: 999999
