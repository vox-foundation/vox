# GPU specifications and training preset configurations for Vox Mens.
#
# SSOT for:
#   - Cloud cost estimation: TimeEstimator scales training time from TFLOPS ratios
#   - Local training: auto-preset selection based on available VRAM
#   - Cloud preset injection: resolver reads presets and passes them as container env
#
# Priority: measured DB profiles > TFLOPS-scaled heuristic > conservative fallback.
#
# Sources: NVIDIA product datasheets and official whitepapers.
# Add new GPUs without recompiling — loaded at runtime by TimeEstimator.
#
# SSOT doc: docs/src/architecture/mens-cloud-gpu-ssot.md

gpus:
  # ── Consumer GPUs (local training) ─────────────────────────────────────────

  # RTX 4080 Super — primary local training GPU. First-class default. SSOT.
