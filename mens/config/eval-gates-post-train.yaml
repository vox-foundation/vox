version: "1"
# Post-training eval gate — used by Step 5 of full-pipeline.vox immediately after training.
#
# Blocking gates cover only artifacts the QLoRA trainer or Step 4 corpus eval writes:
#   training_manifest.json  → truncation, device_profile              (trainer)
#   telemetry.jsonl         → supervised_ratio, throughput            (trainer)
#   eval_results.json       → vox_parse_rate, construct_coverage_pct (Step 4 corpus eval)
#
# The following gates are WARN-ONLY because their source files require explicit
# operator steps that run AFTER full-pipeline.vox completes:
#   pass_at_k         → benchmark_passatk.json    written by `vox mens eval-local`
#   anti_stub         → eval_local_report.json    written by `vox mens eval-local`
#   review_recurrence → review_metrics.json       written by the review pipeline
#
# Run `vox mens eval-gate --run-dir mens/runs/latest` with eval-gates.yaml
# (the full policy) once those steps are complete before promoting/serving.

supervised_ratio:
  min_pct: 10.0
  block: true

truncation:
  max_fraction: 0.50
  block: true

throughput:
  min_tokens_per_sec:
    cpu: 1.0
    rtx_4080_super: 10.0
  block: false

# Bootstrap thresholds — intentionally lower than the full policy (eval-gates.yaml).
# Rationale: mix.yaml includes the vox_docs_qa lane whose samples have English-prose
# responses that never parse as Vox.  With doc samples at ~69% of the corpus, the
# full-policy threshold of 0.60 is structurally unreachable without removing the
# docs lane from mix.yaml.  Bootstrap gate enforces a minimum viable code signal
# (≥25% of samples are valid Vox) and minimum construct diversity (≥10% of taxonomy).
# The full policy raises both bars once the corpus is code-majority.
eval_local:
  min_parse_rate: 0.25
  min_coverage_pct: 0.10
  block: true

# Warn-only: benchmark_passatk.json is written by `vox mens eval-local`, not the trainer.
pass_at_k:
  min_pass_rate_at_1: 0.25
  min_pass_rate_at_k: 0.50
  max_regression_drop: 0.03
  metrics_file: benchmark_passatk.json
  baseline_file: baseline_passatk.json
  block: false

per_context: {}

modal_mix:
  max_voice_fraction: 0.30
  block: false

mcp_tool_schema:
  min_strict_validity_rate: 0.0
  block: false
  metrics_file: mcp_tool_schema_kpi.json

# Warn-only: check_run.rs reads anti_stub metrics from eval_local_report.json,
# written by `vox mens eval-local`.  That file does not exist until the operator
# runs eval-local after training.  Missing file → warn (not block) here so Step 5
# can complete on a fresh run.  Matches the pass_at_k / review_recurrence pattern.
anti_stub:
  min_pass_rate: 0.92
  max_placeholder_event_rate: 0.08
  max_trivial_placeholder_event_rate: 0.08
  min_construct_richness_mean: 0.20
  block: false

# Warn-only: review_metrics.json is written by the review pipeline, not the trainer.
review_recurrence:
  max_repeated_finding_rate: 0.30
  max_post_training_regression_rate: 0.15
  min_recurrence_delta: 0.01
  block: false
