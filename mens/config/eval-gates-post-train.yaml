version: "1"
# Post-training eval gate — used by Step 4 of full-pipeline.vox immediately after training.
#
# Only gates on artifacts the QLoRA trainer itself writes:
#   training_manifest.json (truncation, device_profile)
#   telemetry.jsonl        (supervised_ratio, throughput)
#   eval_results.json      (eval_local: vox_parse_rate, construct_coverage_pct)
#
# pass_at_k and review_recurrence require explicit follow-up steps:
#   vox mens eval-local --model mens/runs/latest --bench <bench_dir>
#   vox mens corpus eval  (or review pipeline)
# Those gates are warn-only here so the pipeline can complete without them.
# Run `vox mens eval-gate --run-dir mens/runs/latest` with eval-gates.yaml
# (the full policy) once those steps are complete before promoting/serving.

supervised_ratio:
  min_pct: 10.0
  block: true

truncation:
  max_fraction: 0.50
  block: true

throughput:
  min_tokens_per_sec:
    cpu: 1.0
    rtx_4080_super: 10.0
  block: false

eval_local:
  min_parse_rate: 0.60
  min_coverage_pct: 0.35
  block: true

# Warn-only: benchmark_passatk.json is written by `vox mens eval-local`, not the trainer.
pass_at_k:
  min_pass_rate_at_1: 0.25
  min_pass_rate_at_k: 0.50
  max_regression_drop: 0.03
  metrics_file: benchmark_passatk.json
  baseline_file: baseline_passatk.json
  block: false

per_context: {}

modal_mix:
  max_voice_fraction: 0.30
  block: false

mcp_tool_schema:
  min_strict_validity_rate: 0.0
  block: false
  metrics_file: mcp_tool_schema_kpi.json

# Warn-only: anti_stub_task_success, placeholder_event_rate, trivial_placeholder_event_rate,
# and construct_richness_mean are written by `vox mens eval-local`, not by corpus eval
# (Step 4) or the QLoRA trainer.  Missing fields default to 0.0 in check_run.rs; with
# block: true and min_pass_rate: 0.92, Step 5 would always hard-block on fresh runs.
# Matches the pass_at_k / review_recurrence warn-only pattern.
anti_stub:
  min_pass_rate: 0.92
  max_placeholder_event_rate: 0.08
  max_trivial_placeholder_event_rate: 0.08
  min_construct_richness_mean: 0.20
  block: false

# Warn-only: review_metrics.json is written by the review pipeline, not the trainer.
review_recurrence:
  max_repeated_finding_rate: 0.30
  max_post_training_regression_rate: 0.15
  min_recurrence_delta: 0.01
  block: false
