# SearXNG settings
use_default_settings: true

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "vox_research_secret_key_change_me"
  limiter: false # Required for agentic scraping

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"

engines:
  - name: google
    engine: google
    shortcut: g
  - name: bing
    engine: bing
    shortcut: b
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: w

ui:
  static_use_hash: true

format:
  json: true
