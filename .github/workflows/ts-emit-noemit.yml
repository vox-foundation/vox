name: TS emit typecheck
on:
  push:
    branches: [main]
    paths:
      - 'crates/vox-codegen/**'
      - 'crates/vox-compiler/**'
      - 'examples/golden-ts/**'
      - 'crates/vox-integration-tests/ts-noemit-scratch/**'
  pull_request:
    paths:
      - 'crates/vox-codegen/**'
      - 'crates/vox-compiler/**'
      - 'examples/golden-ts/**'
      - 'crates/vox-integration-tests/ts-noemit-scratch/**'

jobs:
  ts-noemit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'crates/vox-integration-tests/ts-noemit-scratch/pnpm-lock.yaml'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install scratch deps
        run: pnpm install --frozen-lockfile
        working-directory: crates/vox-integration-tests/ts-noemit-scratch
      - name: Run TS emit typecheck
        run: cargo nextest run -p vox-integration-tests --test ts_emit_typecheck_test --run-ignored ignored-only --no-capture
