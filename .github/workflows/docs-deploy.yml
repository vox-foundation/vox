name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'docs-astro/**'
      - 'crates/vox-doc-pipeline/**'
      - 'examples/**'

# ── Permissions ────────────────────────────────────────────────────────────
# GitHub Pages requires pages: write + id-token: write.
permissions:
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.5

      - name: Build Docs Pipeline
        run: cargo build -p vox-doc-pipeline --profile ci
        env:
          RUSTC_WRAPPER: sccache

      - name: Run Docs Pipeline (extract + validate SUMMARY)
        run: cargo run -p vox-doc-pipeline
        env:
          SOURCE_DATE_EPOCH: ${{ github.event.head_commit.timestamp }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install docs-astro deps
        working-directory: docs-astro
        run: pnpm install --frozen-lockfile

      - name: Build Starlight
        working-directory: docs-astro
        run: pnpm build

      - name: Run Lychee Link Checker for UI
        continue-on-error: true
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          args: --base docs-astro/dist --verbose --no-progress --format json --output docs-astro/lychee_report.json 'docs-astro/dist/**/*.html'
          fail: false

      - name: Link Checker Guidance
        run: |
          if grep -q '"errors": [1-9]' docs-astro/lychee_report.json; then
            echo "::warning title=Broken Links Warning::Documentation contains broken links."
            echo "::notice title=Whitelist Guidance::To ignore a persistent or archival link, add it to .lycheeignore."
          fi

      # ── Archive docs artifact ───────────────────────────────────────────
      - name: Archive docs
        run: tar -czf docs.tar.gz docs-astro/dist/

      # ── GitHub Pages Deploy ─────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-astro/dist

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

