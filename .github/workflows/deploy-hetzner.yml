name: Deploy Hetzner (Coolify)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests and deploy immediately'
        type: boolean
        required: false
        default: false

concurrency:
  group: deploy-vox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-ci:
    name: "Gate 1: Smoke CI"
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Rust fmt check
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Build vox-cli
        run: cargo build -p vox-cli

  deploy-coolify:
    name: "Gate 2: Deploy & Poll"
    needs: smoke-ci
    if: ${{ always() && (needs.smoke-ci.result == 'success' || needs.smoke-ci.result == 'skipped') }}
    runs-on: ubuntu-latest
    env:
      COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
      COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
    steps:
      - name: Trigger Coolify deploy
        id: trigger
        run: |
          set -euo pipefail
          
          # Parse deployment id from JSON bodies only (avoids jq on HTML login pages).
          json_deploy_uuid() {
            local body="$1"
            case "$body" in
              \{*) ;;
              *) echo ""; return 0 ;;
            esac
            local u
            u="$(jq -r '.deployment_uuid // .deploymentUuid // empty' <<<"$body" 2>/dev/null || true)"
            if [ -n "$u" ] && [ "$u" != "null" ]; then echo "$u"; return 0; fi
            u="$(jq -r '.deployments[0].deployment_uuid // empty' <<<"$body" 2>/dev/null || true)"
            if [ -n "$u" ] && [ "$u" != "null" ]; then echo "$u"; return 0; fi
            echo ""
          }
          
          json_first_list_uuid() {
            local body="$1"
            case "$body" in
              \{*) ;;
              *) echo ""; return 0 ;;
            esac
            jq -r '
              (if type == "array" then .[0].uuid else empty end)
                // .data[0].uuid
                // .deployments[0].uuid
                // empty
            ' <<<"$body" 2>/dev/null || true
          }
          
          BASE="${COOLIFY_BASE_URL%/}"
          DEPLOY_UUID=""
          
          # 1) Official deploy endpoint — works with "Deploy" API token scope (not "Write").
          echo "Triggering Coolify via GET /api/v1/deploy?uuid=..."
          TMP="$(mktemp)"
          HTTP_CODE="$(
            curl -sS -o "$TMP" -w '%{http_code}' -X GET \
              -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${BASE}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}" || echo "000"
          )"
          BODY="$(cat "$TMP" 2>/dev/null || echo "")"
          rm -f "$TMP"
          echo "Deploy API HTTP ${HTTP_CODE} — ${BODY}"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            DEPLOY_UUID="$(json_deploy_uuid "$BODY")"
          fi
          
          # 2) Start endpoint — requires broader token permission on some Coolify builds.
          if [ -z "$DEPLOY_UUID" ]; then
            echo "Trying Applications /start (instant_deploy)..."
            START_URL="${BASE}/api/v1/applications/${COOLIFY_APP_UUID}/start?instant_deploy=true"
            TMP="$(mktemp)"
            HTTP_CODE="$(
              curl -sS -o "$TMP" -w '%{http_code}' -X GET \
                -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
                "$START_URL" || echo "000"
            )"
            BODY="$(cat "$TMP" 2>/dev/null || echo "")"
            rm -f "$TMP"
            echo "Start API HTTP ${HTTP_CODE} — ${BODY}"
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
              DEPLOY_UUID="$(json_deploy_uuid "$BODY")"
            fi
          fi
          
          # 3) Optional webhook URLs (manual hooks often omit Bearer).
          if [ -z "$DEPLOY_UUID" ] && [ -n "${COOLIFY_WEBHOOK_URL:-}" ]; then
            echo "Webhook fallback (no Authorization header)..."
            WH_RES="$(curl -sS -X GET "${COOLIFY_WEBHOOK_URL}" || true)"
            echo "Webhook response head: ${WH_RES:0:200}"
            DEPLOY_UUID="$(json_deploy_uuid "$WH_RES")"
          fi
          
          if [ -z "$DEPLOY_UUID" ] && [ -n "${COOLIFY_WEBHOOK_URL:-}" ]; then
            echo "Webhook fallback (Bearer token)..."
            WH_RES="$(curl -sS -X GET -H "Authorization: Bearer ${COOLIFY_TOKEN}" "${COOLIFY_WEBHOOK_URL}" || true)"
            echo "Webhook response head: ${WH_RES:0:200}"
            DEPLOY_UUID="$(json_deploy_uuid "$WH_RES")"
          fi
          
          # 4) List recent deployments for the application.
          if [ -z "$DEPLOY_UUID" ]; then
            echo "Polling deployments list for this application..."
            sleep 5
            LATEST="$(curl -sS -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
              "${BASE}/api/v1/applications/${COOLIFY_APP_UUID}/deployments" || true)"
            echo "Deployments response: $LATEST"
            DEPLOY_UUID="$(json_first_list_uuid "$LATEST")"
          fi
          
          if [ -z "$DEPLOY_UUID" ]; then
            echo "::error::Could not determine deployment UUID. Use a Coolify API token with at least Deploy scope; set COOLIFY_BASE_URL (no trailing slash), COOLIFY_APP_UUID, and optionally a Deploy Webhook URL from the Coolify UI."
            exit 1
          fi
          
          echo "Deployment UUID: $DEPLOY_UUID"
          echo "deploy_uuid=$DEPLOY_UUID" >> "$GITHUB_OUTPUT"

      - name: Poll Deployment Status
        id: poll
        run: |
          set -e
          DEPLOY_UUID="${{ steps.trigger.outputs.deploy_uuid }}"
          echo "Polling deployment $DEPLOY_UUID ..."
          
          MAX_RETRIES=90   # 90 x 10s = 15 minutes
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            STATUS_RES=$(curl -sS -H "Authorization: Bearer $COOLIFY_TOKEN" \
              "${COOLIFY_BASE_URL%/}/api/v1/deployments/$DEPLOY_UUID")
            STATUS=$(echo "$STATUS_RES" | jq -r '.status // "unknown"')
            echo "[$RETRY_COUNT/$MAX_RETRIES] Status: $STATUS"
            
            if [ "$STATUS" = "finished" ] || [ "$STATUS" = "success" ]; then
              echo "✅ Deployment succeeded."
              echo "deploy_status=success" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$STATUS" = "failed" ] || [ "$STATUS" = "error" ] || [ "$STATUS" = "cancelled" ]; then
              echo "❌ Deployment failed with status: $STATUS"
              echo "Full response: $STATUS_RES"
              echo "deploy_status=failed" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            
            sleep 10
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done
          
          echo "::error::Deployment timed out after 15 minutes."
          echo "deploy_status=timeout" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Fetch Coolify Logs on Failure
        if: failure()
        run: |
          echo "## ❌ Coolify Build Logs" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          
          # Try deployment-specific logs first
          DEPLOY_UUID="${{ steps.trigger.outputs.deploy_uuid }}"
          if [ -n "$DEPLOY_UUID" ]; then
            curl -sS -H "Authorization: Bearer $COOLIFY_TOKEN" \
              "${COOLIFY_BASE_URL%/}/api/v1/deployments/$DEPLOY_UUID/logs" \
              | jq -r '.logs // .output // "No deployment logs available"' \
              >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          fi
          
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          
          # Also surface the full application log endpoint
          echo "## 📋 Application Logs" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          curl -sS -H "Authorization: Bearer $COOLIFY_TOKEN" \
            "${COOLIFY_BASE_URL%/}/api/v1/applications/$COOLIFY_APP_UUID/logs" \
            | jq -r '.logs // "No application logs available"' \
            >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload deploy status artifact
        if: always()
        run: |
          STATUS="${{ steps.poll.outputs.deploy_status }}"
          echo "{\"status\":\"$STATUS\",\"deploy_uuid\":\"${{ steps.trigger.outputs.deploy_uuid }}\",\"run_id\":\"${{ github.run_id }}\",\"sha\":\"${{ github.sha }}\"}" > deploy-status.json
          cat deploy-status.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: deploy-status
          path: deploy-status.json

  health-check:
    name: "Gate 3: Health Check"
    needs: deploy-coolify
    if: ${{ needs.deploy-coolify.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for container to settle
        run: sleep 15
      - name: Probe Coolify app health
        run: |
          BASE="${{ secrets.COOLIFY_BASE_URL }}"
          BASE="${BASE%/}"
          # Try the Coolify health API for this application
          HEALTH=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "$BASE/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}")
          echo "Application API status: $HEALTH"
          if [ "$HEALTH" != "200" ]; then
            echo "::warning::Health check returned HTTP $HEALTH — application may still be starting"
          else
            echo "✅ Application is responding."
          fi

  notify:
    name: "Gate 4: Summary"
    needs: [smoke-ci, deploy-coolify, health-check]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Write deployment summary
        run: |
          echo "# 🚀 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Smoke CI | ${{ needs.smoke-ci.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coolify Deploy | ${{ needs.deploy-coolify.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health Check | ${{ needs.health-check.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`${{ github.sha }}\`  Run: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
