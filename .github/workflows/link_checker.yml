name: Docs Link Checker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link Checker
        id: lychee
        continue-on-error: true
        uses: lycheeverse/lychee-action@v1.9.3
        with:
          args: --base . --verbose --no-progress '**/*.md'
          fail: false
      - name: Warn if lychee found broken links
        if: steps.lychee.outcome == 'failure'
        run: echo "::warning title=External link checker::Lychee reported broken links; this workflow is advisory and will not block."
