name: Docs Link Checker

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Exclude gitignored trees that exist locally (worktrees, npm) so `**/*.md` matches a clean clone.
          # `--exclude-path` is a regex match (NOT a glob); use substrings, not globstars.
          args: --root-dir . --verbose --no-progress --max-retries 5 --retry-wait-time 5 --timeout 40 --exclude-path docs/src/archive --exclude-path '\.claude/' --exclude-path 'node_modules' '**/*.md'
          fail: true

      - name: Link Checker Guidance
        if: failure()
        run: |
          echo "::error title=Link Checker Failure::Broken links were detected. Please review the output above."
          echo "::notice title=Whitelist Guidance::To ignore a persistent or archival link, add it to the project whitelist."
          echo "Whitelist Location: .lycheeignore"
          echo "Action Required: Decide if the link should be fixed in Markdown or added to the whitelist for archival maintenance."
