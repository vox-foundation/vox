# CR-L8 corpus-feedback pipeline (P2.1c, ratified 2026-05-15).
#
# Exercises the full diagnostic→repair→corpus loop:
#
#   1. `cargo test` runs the workspace test suite. Tests that exercise
#      `ToestubEngine::run()` and `vox repair` emit `vox.lint.*` and
#      `vox.repair.*` `TelemetryEvent`s through `record_event!`.
#   2. When `init_telemetry_sinks` (vox-cli/src/lib.rs) registers the
#      `CorpusFeedbackJsonlSink` (P2.1c), those events persist to
#      `contracts/reports/corpus-feedback-events/<YYYY-MM-DD>.jsonl`.
#      That directory is `.gitignore`d (A1) so per-run noise stays out of git.
#   3. `cargo run -p vox-audit -- corpus-feedback` loads the JSONL files,
#      runs `vox_audit::aggregator::aggregate`, writes the substantive
#      report at `contracts/reports/corpus-feedback/<YYYY-QN>.json` per
#      CR-L8 spec, and gates exit-code on freshness.
#   4. Both artifacts are uploaded as build artifacts so PR reviewers (and
#      the council) can inspect the run's actual aggregated rollups.
#
# Per `contracts/ci/vox-audit-contract.v1.yaml` §exit_codes (D22 ratified),
# `exit 2` (infrastructure error) does NOT block CI. Only the binary CR-L8
# gates (CR-L8 itself is binary "report exists < 90 days old") block GA, and
# this workflow IS the artifact-producer that satisfies that gate.

name: CR-L8 corpus-feedback

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.lock"
      - "contracts/eval/**"
      - "contracts/retirement/**"
      - "contracts/ci/vox-audit-contract.v1.yaml"
      - ".github/workflows/cr-l8-corpus-feedback.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Direct the CR-L8 JSONL sink at a known path inside the workspace; this
  # path is `.gitignore`d (see A1, root `.gitignore`).
  VOX_CORPUS_FEEDBACK_EVENTS_DIR: ${{ github.workspace }}/contracts/reports/corpus-feedback-events

jobs:
  corpus-feedback:
    name: Exercise loop + aggregate
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Registry & Target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cr-l8-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cr-l8-
            ${{ runner.os }}-cargo-

      # ────────────────────────────────────────────────────────────────────
      # Step 1: build the crates that emit and aggregate.
      # ────────────────────────────────────────────────────────────────────
      - name: Build vox-cli + vox-audit + vox-code-audit
        run: |
          cargo build \
            -p vox-cli \
            -p vox-audit \
            -p vox-code-audit

      # ────────────────────────────────────────────────────────────────────
      # Step 2: run the integration tests that exercise the emit path. The
      # tests run `init_telemetry_sinks` (or register their own recorder for
      # in-binary capture), then drive ToestubEngine and `vox repair` flows.
      # ────────────────────────────────────────────────────────────────────
      - name: Run telemetry-emitting tests (seeds JSONL events)
        run: |
          # vox-cli integration tests register the production sink via
          # `init_telemetry_sinks` and emit through the full pipeline.
          cargo test -p vox-cli --test telemetry_corpus_feedback_e2e -- --nocapture

          # vox-audit's full-loop test uses BufferedRecorder (in-memory
          # capture) — it doesn't write JSONL itself, but it does prove the
          # engine→aggregator wire is intact.
          cargo test -p vox-audit --test cr_l8_loop_e2e -- --nocapture

          # vox-code-audit emission tests cover the engine emit-site shape.
          cargo test -p vox-code-audit --test telemetry_emission_test -- --nocapture

      # ────────────────────────────────────────────────────────────────────
      # Step 3: list any JSONL events that actually landed on disk. The
      # `.gitignore`d events dir is populated by `CorpusFeedbackJsonlSink`
      # whenever the corresponding sink was registered AT EMIT TIME (not just
      # during unit tests where we use a BufferedRecorder).
      # ────────────────────────────────────────────────────────────────────
      - name: Inventory JSONL events on disk
        run: |
          set -euo pipefail
          events_dir="${VOX_CORPUS_FEEDBACK_EVENTS_DIR}"
          mkdir -p "$events_dir"
          echo "Events directory: $events_dir"
          find "$events_dir" -name '*.jsonl' -print -exec wc -l {} \; || true

      # ────────────────────────────────────────────────────────────────────
      # Step 4: invoke the umbrella runner's corpus-feedback subcommand. It
      # reads from the JSONL events dir, aggregates, writes the substantive
      # report at `contracts/reports/corpus-feedback/<YYYY-QN>.json`.
      #
      # Exit-code-2 (infrastructure error, e.g. no events yet) is tolerated
      # per contract §exit-code-2-semantics. The workflow continues so the
      # artifact upload step always runs.
      # ────────────────────────────────────────────────────────────────────
      - name: Aggregate corpus-feedback report
        id: aggregate
        continue-on-error: true
        run: |
          cargo run --quiet -p vox-audit -- corpus-feedback --format json \
            > corpus-feedback-result.json
          echo "EXIT=$?" >> "$GITHUB_OUTPUT"

      - name: Inventory substantive report
        run: |
          set -euo pipefail
          report_dir="${{ github.workspace }}/contracts/reports/corpus-feedback"
          if [ -d "$report_dir" ]; then
            ls -la "$report_dir" || true
            for f in "$report_dir"/*.json; do
              [ -f "$f" ] || continue
              echo "==== $(basename "$f") ===="
              head -c 4096 "$f" || true
              echo
            done
          else
            echo "No report dir at $report_dir yet (P2.1c is wired but no events were"
            echo "persisted to JSONL during this run — the corpus-feedback gate exits 2"
            echo "honestly per CR-L8 §6 freshness semantics)."
          fi

      # ────────────────────────────────────────────────────────────────────
      # Step 5: archive everything as a CI artifact so reviewers can inspect.
      # ────────────────────────────────────────────────────────────────────
      - name: Upload CR-L8 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cr-l8-corpus-feedback-${{ github.run_id }}
          path: |
            contracts/reports/corpus-feedback/
            contracts/reports/corpus-feedback-events/
            corpus-feedback-result.json
          if-no-files-found: warn
          retention-days: 30

      # ────────────────────────────────────────────────────────────────────
      # Step 6: surface the audit-subcommand exit code in the job log. Per
      # D22 (ratified 2026-05-15) exit-2 is "infra not ready" and does NOT
      # block CI. Only exit-1 (bar missed) and exit-3 (invalid input) would
      # warrant red. This step exits 1 only when the subcommand returns
      # those codes; otherwise green.
      # ────────────────────────────────────────────────────────────────────
      - name: Gate on substantive failure modes
        run: |
          set -e
          rc="${{ steps.aggregate.outcome }}"
          # The `continue-on-error: true` above prevents the workflow from
          # auto-failing on any non-zero exit. We inspect the cargo exit code
          # encoded in the GITHUB_OUTPUT EXIT variable to differentiate.
          exit_code="${{ steps.aggregate.outputs.EXIT }}"
          echo "vox-audit corpus-feedback returned exit ${exit_code:-unknown}"
          case "${exit_code:-2}" in
            0) echo "✓ CR-L8 gate met (Ok)";;
            1) echo "✗ CR-L8 bar missed — see report"; exit 1;;
            2) echo "✓ CR-L8 infrastructure error (no events) — exit 2 does NOT block CI per D22";;
            3) echo "✗ CR-L8 invalid input (malformed fixtures / contracts)"; exit 1;;
            *) echo "? unrecognized exit code"; exit 1;;
          esac
