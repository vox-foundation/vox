name: ML Pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


on:
  push:
    branches:
      - main
    paths:
      - '**/*.vox'
      - 'crates/vox-parser/**'
      - 'crates/vox-typeck/**'
      - 'crates/vox-ast/**'
      - 'crates/vox-hir/**'
      - 'crates/vox-lexer/**'
      - 'docs/src/**'
      - 'docs/src/research/**'
      - 'examples/**'
      - 'scripts/vox_system_prompt.txt'
      - 'crates/vox-cli/src/training/**'
      - 'crates/vox-cli/src/commands/corpus/**'
      - 'populi/data/**'
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC nightly
  workflow_dispatch:       # manual trigger
    inputs:
      force_train:
        description: 'Force fine-tuning even if corpus unchanged'
        required: false
        default: 'false'
      native_train:
        description: 'Use native Rust trainer (default). Set to false for legacy Python QLoRA.'
        required: false
        default: 'true'
      strict_quality_gate:
        description: 'Set true to fail on eval/benchmark regression (phase B).'
        required: false
        default: 'false'
      benchmark_min_pass_rate:
        description: 'Held-out benchmark threshold (0.0 disables hard benchmark fail).'
        required: false
        default: '0.0'
      publish_model:
        description: 'Publish trained model bundle to Hugging Face when secrets are configured.'
        required: false
        default: 'false'

# ── Platform portability notes ───────────────────────────────────────────────
# GitHub-specific: github.sha, github.event.inputs.*, workflow_dispatch
# GitLab equivalent: CI_COMMIT_SHA, manual job variables
# Forgejo equivalent: gitea.sha, workflow_dispatch (Forgejo Actions supports this)
# Abstract env var VCS_SHA is set in each job's env block for portability.

jobs:
  extract:
    name: Extract & Validate Training Corpus
    runs-on: [self-hosted, linux, x64]
    env:
      # Abstract VCS_SHA: use github.sha on GitHub Actions.
      # On GitLab: set VCS_SHA: $CI_COMMIT_SHA in variables block.
      # On Forgejo: set VCS_SHA: ${{ gitea.sha }}
      VCS_SHA: ${{ github.sha }}
    outputs:
      corpus_changed: ${{ steps.check_diff.outputs.changed }}
      pair_count: ${{ steps.count_pairs.outputs.count }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2   # need HEAD^ for diff

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ml-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ml-

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Build Vox Compiler
        run: cargo build -p vox-cli --release --quiet
        env:
          RUSTC_WRAPPER: sccache

      - name: Detect grammar drift
        id: grammar_drift
        run: ./target/release/vox ci grammar-drift --emit github >> "$GITHUB_OUTPUT"

      - name: Extract golden corpus (Tier A)
        run: |
          VOX_BIN="./target/release/vox"
          mkdir -p target/dogfood

          # W0-01: Extract AST/records from golden files
          "$VOX_BIN" corpus extract examples/golden/ -o target/dogfood/vox_corpus_extract_raw.jsonl 2>/dev/null || true
          
          # W0-01: Convert raw records to ChatML instruction pairs
          "$VOX_BIN" corpus pairs target/dogfood/vox_corpus_extract_raw.jsonl -o target/dogfood/vox_corpus_extract.jsonl

      - name: Extract training corpus (incremental)
        run: |
          VOX_BIN="./target/release/vox"
          mkdir -p populi/data target/dogfood

          # Incremental: existing populi/data/validated.jsonl is preserved by extract
          "$VOX_BIN" corpus extract docs/ -o populi/data/validated.jsonl 2>/dev/null || true

          LINES=$(wc -l < populi/data/validated.jsonl 2>/dev/null || echo 0)
          echo "Corpus has $LINES validated records."

      - name: Validate corpus
        run: |
          ./target/release/vox corpus validate populi/data/validated.jsonl --no-recheck \
            -o populi/data/validated.jsonl

      - name: Generate training pairs (canonical)
        run: |
          # Single pairs run with all docs dirs; deterministic merge+dedup
          ./target/release/vox corpus pairs populi/data/validated.jsonl \
            -o target/dogfood/train.jsonl \
            --docs docs/src/ \
            --docs docs/src/research/ \
            --docs docs/src/adr/

      # Rustdoc pairs have Rust prose as response, not Vox code; skip merge to preserve parse rate.

      - name: Auto-generate system prompt
        run: |
          ./target/release/vox corpus prompt -o scripts/vox_system_prompt.txt

      - name: Run native eval on training corpus
        run: |
          ./target/release/vox corpus eval target/dogfood/train.jsonl -o target/dogfood/eval_results.json --print-summary 2>/dev/null || true


      - name: Count generated pairs
        id: count_pairs
        run: |
          COUNT=$(wc -l < target/dogfood/train.jsonl 2>/dev/null || echo 0)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Generated $COUNT training pairs"

      - name: Compute train.jsonl hash for change detection
        id: train_hash
        run: |
          mkdir -p populi/data
          if [ -f target/dogfood/train.jsonl ]; then
            HASH=$(sha256sum target/dogfood/train.jsonl | cut -d' ' -f1)
          else
            HASH="no-train-file"
          fi
          echo "$HASH" > populi/data/train_hash.txt
          echo "Train hash: $HASH"

      - name: Check for corpus changes
        id: check_diff
        run: |
          if git diff --quiet populi/data/validated.jsonl 2>/dev/null && \
             git diff --quiet populi/data/grammar_fingerprint.txt 2>/dev/null && \
             git diff --quiet populi/data/train_hash.txt 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Corpus unchanged."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Corpus changed — will trigger training."
          fi

      - name: Commit updated corpus
        if: steps.check_diff.outputs.changed == 'true'
        # Portable: plain git commands work on any CI platform.
        # Previously used stefanzweifel/git-auto-commit-action@v5 (GitHub Marketplace only).
        shell: bash
        run: |
          git config user.name "vox-ci"
          git config user.email "ci@vox-lang.dev"
          git add populi/data/validated.jsonl \
                  populi/data/grammar_fingerprint.txt \
                  populi/data/train_hash.txt \
                  scripts/vox_system_prompt.txt
          git diff --cached --quiet || git commit -m "chore: update validated ML training corpus [skip ci]"
          git push

      - name: Upload training data artifact
        uses: actions/upload-artifact@v7
        with:
          # Portable note: GitLab uses `artifacts: paths:` block.
          # Forgejo Actions uses identical syntax to GitHub Actions.
          name: training-data-${{ env.VCS_SHA }}
          path: |
            target/dogfood/train.jsonl
            target/dogfood/metadata.json
            target/dogfood/eval_results.json
          retention-days: 30

  # Training job — runs when corpus changes OR forced
  train:
    name: Fine-tune Model (GPU)
    needs: extract
    if: |
      needs.extract.outputs.corpus_changed == 'true' ||
      github.event.inputs.force_train == 'true' ||
      github.event_name == 'workflow_dispatch'
    # Portable note: On GitLab, use `when: manual` + `rules:` with CI variables.
    # On Forgejo Actions, workflow_dispatch and event.inputs work identically.
    runs-on: [self-hosted, linux, x64, gpu]
    env:
      VCS_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Download training data
        uses: actions/download-artifact@v8
        with:
          name: training-data-${{ env.VCS_SHA }}
          path: target/dogfood/

      - name: Verify training data
        run: |
          COUNT=$(wc -l < target/dogfood/train.jsonl 2>/dev/null || echo 0)
          echo "Training pairs to process: $COUNT"
          if [ "$COUNT" -lt "50" ]; then
            echo "::warning::Only $COUNT training pairs found. Minimum is 50. Skipping fine-tuning."
            echo "Add more examples to examples/ or docs/src/ to generate training data."
            exit 0
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Vox Compiler
        run: cargo build -p vox-cli --release --quiet

      - name: Reject legacy Python training path
        if: github.event.inputs.native_train == 'false'
        run: |
          echo "::error::native_train=false is no longer supported (removed invalid uv sync --project scripts). Use default native Rust training."
          exit 1

      - name: Run native Rust training (default)
        if: github.event.inputs.native_train != 'false'
        env:
          VOX_BACKEND: cpu
          VOX_EVAL_MIN_PARSE_RATE: "0.70"
          VOX_EVAL_MIN_COVERAGE: "0.50"
          VOX_EVAL_STRICT: ${{ github.event.inputs.strict_quality_gate == 'true' && '1' || '0' }}
          VOX_BENCHMARK: "1"
          VOX_BENCHMARK_MIN_PASS_RATE: ${{ github.event.inputs.benchmark_min_pass_rate || '0.0' }}
        run: |
          echo "strict_quality_gate=${{ github.event.inputs.strict_quality_gate || 'false' }}"
          echo "benchmark_min_pass_rate=${{ github.event.inputs.benchmark_min_pass_rate || '0.0' }}"
          ./target/release/vox train --native \
            --data-dir target/dogfood \
            --output-dir target/dogfood/run

      - name: Write model provenance manifest
        if: always()
        run: |
          mkdir -p target/dogfood/run
          cat > target/dogfood/run/model_manifest.json <<EOF
          {
            "commit_sha": "${{ env.VCS_SHA }}",
            "native_train": "${{ github.event.inputs.native_train || 'true' }}",
            "strict_quality_gate": "${{ github.event.inputs.strict_quality_gate || 'false' }}",
            "benchmark_min_pass_rate": "${{ github.event.inputs.benchmark_min_pass_rate || '0.0' }}",
            "data_path": "target/dogfood/train.jsonl",
            "output_path": "target/dogfood/run"
          }
          EOF

      - name: Upload LoRA adapter
        uses: actions/upload-artifact@v7
        with:
          name: lora-adapter-${{ env.VCS_SHA }}
          path: target/dogfood/run/
          retention-days: 90

      - name: Install uv (model publish)
        if: github.event.inputs.publish_model == 'true'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Publish model bundle to Hugging Face (optional)
        if: github.event.inputs.publish_model == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO: ${{ vars.HF_MODEL_REPO }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_MODEL_REPO" ]; then
            echo "Skipping publish_model: HF_TOKEN or HF_MODEL_REPO is not configured."
            exit 0
          fi
          ~/.local/bin/uv run --with huggingface_hub python - <<'PY'
          import os
          from huggingface_hub import HfApi, upload_folder
          repo_id = os.environ["HF_MODEL_REPO"]
          token = os.environ["HF_TOKEN"]
          path = "target/dogfood/run"
          api = HfApi(token=token)
          api.create_repo(repo_id=repo_id, repo_type="model", exist_ok=True)
          upload_folder(
              repo_id=repo_id,
              folder_path=path,
              repo_type="model",
              path_in_repo=f"runs/{os.environ.get('VCS_SHA','unknown')}"
          )
          print(f"Uploaded model bundle to hf://{repo_id}/runs/{os.environ.get('VCS_SHA','unknown')}")
          PY

      - name: Upload eval and benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-gate-${{ env.VCS_SHA }}
          path: |
            target/dogfood/run/eval_results.json
            target/dogfood/run/eval_gate_failed.json
            target/dogfood/run/benchmark_results.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Check eval gate
        run: |
          if [ -f target/dogfood/run/eval_gate_failed.json ]; then
            echo "::warning::Eval gate FAILED — training data quality below thresholds."
            echo "Review eval_gate_failed.json for details."
            cat target/dogfood/run/eval_gate_failed.json
          else
            echo "Eval gate passed."
          fi

