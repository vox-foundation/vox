name: Release Installers

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-voxup-installer:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build voxup
        run: cargo build --release -p voxup
      - name: E2E Test voxup
        run: |
          mkdir -p /tmp/fake_home
          HOME=/tmp/fake_home target/release/voxup install default
          if [ ! -f /tmp/fake_home/.vox/bin/vox ]; then
            echo "voxup failed to install the proxy binary."
            exit 1
          fi
          # Test the proxy wrapper
          HOME=/tmp/fake_home /tmp/fake_home/.vox/bin/vox --version || true
  build-windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-wix
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-wix
      - name: Build MSI
        run: cargo wix --no-build --package vox-cli
        # Note: In a real pipeline, `cargo build --release --locked -p vox-cli` 
        # would be run first to populate target/release/vox.exe.

  build-linux-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - name: Build DEB
        run: cargo deb -p vox-cli

  publish-macos-brew:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Release
        run: cargo build --release --locked -p vox-cli
      - name: Archive and Hash
        run: |
          tar -czvf vox-darwin.tar.gz -C target/release vox
          shasum -a 256 vox-darwin.tar.gz > checksum.txt
      - name: Upload to Homebrew Tap
        run: |
          echo "Simulating Homebrew Tap update..."
          # Logic to dispatch repository event to vox-foundation/homebrew-vox
