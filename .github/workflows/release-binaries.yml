name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ fromJson(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs_on: '["self-hosted","linux","x64"]'
          - target: x86_64-pc-windows-msvc
            runs_on: '["windows-latest"]'
          - target: x86_64-apple-darwin
            runs_on: '["macos-latest"]'
          - target: aarch64-apple-darwin
            runs_on: '["macos-latest"]'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and package release artifacts (core + bootstrap + plugins)
        # `--package all` produces: vox, vox-bootstrap, vox-mens, vox-schola
        # Each ships as its own archive so users opt into the heavy ML/scientia plugins.
        run: cargo run --locked -p vox-cli -- ci release-build --target ${{ matrix.target }} --version ${{ github.ref_name }} --out-dir dist --package all

      - name: Smoke test packaged binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          for f in vox-${{ github.ref_name }}-*.tar.gz; do
            rm -f vox
            tar -xzf "$f"
            ./vox --version
          done
          for f in vox-bootstrap-*.tar.gz; do
            rm -f vox-bootstrap
            tar -xzf "$f"
            ./vox-bootstrap --help >/dev/null
          done
          for f in vox-mens-*.tar.gz; do
            rm -f vox-mens
            tar -xzf "$f"
            ./vox-mens --help >/dev/null
          done
          for f in vox-schola-*.tar.gz; do
            rm -f vox-schola
            tar -xzf "$f"
            ./vox-schola --help >/dev/null
          done

      - name: Smoke test packaged binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location dist
          Get-ChildItem -Filter 'vox-${{ github.ref_name }}-*.zip' | ForEach-Object {
            if (Test-Path _smoke) { Remove-Item -Recurse -Force _smoke }
            Expand-Archive -Path $_.FullName -DestinationPath _smoke -Force
            & ".\_smoke\vox.exe" --version
          }
          Get-ChildItem -Filter 'vox-bootstrap-*.zip' | ForEach-Object {
            if (Test-Path _smoke_boot) { Remove-Item -Recurse -Force _smoke_boot }
            Expand-Archive -Path $_.FullName -DestinationPath _smoke_boot -Force
            & ".\_smoke_boot\vox-bootstrap.exe" --help | Out-Null
          }
          Get-ChildItem -Filter 'vox-mens-*.zip' | ForEach-Object {
            if (Test-Path _smoke_mens) { Remove-Item -Recurse -Force _smoke_mens }
            Expand-Archive -Path $_.FullName -DestinationPath _smoke_mens -Force
            & ".\_smoke_mens\vox-mens.exe" --help | Out-Null
          }
          Get-ChildItem -Filter 'vox-schola-*.zip' | ForEach-Object {
            if (Test-Path _smoke_schola) { Remove-Item -Recurse -Force _smoke_schola }
            Expand-Archive -Path $_.FullName -DestinationPath _smoke_schola -Force
            & ".\_smoke_schola\vox-schola.exe" --help | Out-Null
          }

      - name: Upload packaged binary
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/vox-${{ github.ref_name }}-${{ matrix.target }}.*
            dist/vox-bootstrap-${{ github.ref_name }}-${{ matrix.target }}.*
            dist/vox-mens-${{ github.ref_name }}-${{ matrix.target }}.*
            dist/vox-schola-${{ github.ref_name }}-${{ matrix.target }}.*
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    runs-on: [self-hosted, linux, x64]
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      # Native `vox --version` smoke runs in each matrix job above; this job only merges hashes and uploads assets.

      - name: Generate consolidated checksums
        run: |
          cd release-artifacts
          rm -f checksums.txt
          for f in release-*/*; do
            sum="$(sha256sum "$f" | cut -d ' ' -f 1)"
            echo "$sum  $(basename "$f")" >> checksums.txt
          done

      - name: Create release with assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-artifacts/release-*/*
            release-artifacts/checksums.txt
          generate_release_notes: true
