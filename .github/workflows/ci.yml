name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cache warmup: builds vox-cli + warms target/ once so the five parallel
  # jobs below all restore from a populated cache instead of racing.
  setup:
    name: Cache warmup
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20
    outputs:
      cache-key: ${{ steps.k.outputs.key }}
    steps:
      - uses: actions/checkout@v6
      - id: k
        run: echo "key=${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.k.outputs.key }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build vox-cli (warms target/ + makes guards available)
        run: cargo build -p vox-cli

  guards-fast:
    name: Guards (fast)
    needs: setup
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build vox-cli
        run: cargo build -p vox-cli

      - name: Line endings (forward-only)
        run: cargo run -p vox-cli --quiet -- ci line-endings

      - name: Workspace manifest resolves (fix-forward guard)
        run: cargo run -p vox-cli --quiet -- ci manifest

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Codex SSOT documentation guard
        run: cargo run -p vox-cli --quiet -- ci check-codex-ssot

      - name: Docs migration SSOT guard
        run: cargo run -p vox-cli --quiet -- ci check-docs-ssot

      - name: Retired symbol documentation guard
        run: cargo run -p vox-cli --quiet -- ci retired-symbol-check

      - name: CLI command registry / docs / MCP parity
        run: cargo run -p vox-cli --quiet -- ci command-compliance

      - name: SSOT drift bundle (operations-verify, sql-surface + query-all --all, capability-sync, nested guards)
        run: cargo run -p vox-cli --quiet -- ci ssot-drift

      - name: Data / telemetry SSOT guards
        run: cargo run -p vox-cli --quiet -- ci data-ssot-guards

      - name: Determinism Audit
        run: cargo run -p vox-cli --quiet -- ci determinism-audit

      - name: Dependency Sprawl Check
        run: cargo run -p vox-cli --quiet -- ci dep-sprawl --cap 25

      - name: Dynamic Workspace Health Audit
        run: ./scripts/windows/vox-dev.ps1 run --interp scripts/quality/audit-workspace-health.vox

      - name: Telemetry-Driven Architectural Audit
        run: ./scripts/windows/vox-dev.ps1 run --interp scripts/quality/audit-telemetry.vox

      - name: Secrets SSOT parity + secret direct-read guard
        shell: bash
        run: |
          set -euo pipefail
          cargo run -p vox-cli --quiet -- ci secrets-parity
          # Meaningful diff scope on clean checkouts (default `git diff HEAD` scans nothing in CI).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=256
            export VOX_SECRET_GUARD_GIT_REF="origin/${{ github.base_ref }}...HEAD"
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
              export VOX_SECRET_GUARD_GIT_REF="HEAD~1...HEAD"
            else
              export VOX_SECRET_GUARD_GIT_REF="${{ github.event.before }}...${{ github.sha }}"
            fi
          fi
          cargo run -p vox-cli --quiet -- ci secret-env-guard
          export VOX_SECRETS_REQUIRE_COMPAT_SUNSET=1
          export VOX_SECRETS_CUTOVER_PHASE=enforce
          cargo run -p vox-cli --quiet -- ci secrets-cutover-gates

      - name: Contracts index + scaling policy SSOT
        run: |
          cargo run -p vox-cli --quiet -- ci contracts-index
          cargo run -p vox-cli --quiet -- ci exec-policy-contract
          cargo run -p vox-cli --quiet -- ci openclaw-contract
          cargo run -p vox-cli --quiet -- ci scientia-worthiness-contract
          cargo run -p vox-cli --quiet -- ci scientia-novelty-ledger-contracts
          cargo run -p vox-cli --quiet -- ci scaling-audit verify

      - name: Workflow scripts allowlist
        run: cargo run -p vox-cli --quiet -- ci workflow-scripts

      - name: Doc inventory matches generator (Rust)
        run: cargo run -p vox-cli --quiet -- ci doc-inventory verify

      - name: Docs — no stale `tanstack_start.rs` compiler path
        shell: bash
        run: |
          set -euo pipefail
          if rg -n "crates/vox-compiler/src/codegen_ts/tanstack_start\\.rs" docs/src; then
            echo "docs must not reference removed tanstack_start.rs; use route_manifest / vox_client / scaffold"
            exit 1
          fi

      - name: Docs — no ghost references to retired HTMX / Pico / TanStack-virtual-routes (G.73)
        # Audit item G.73: retired surfaces must not appear in normative docs.
        # Allowlist: the audit-findings doc and archive/ may reference them for historical context.
        shell: bash
        run: |
          set -euo pipefail
          RETIRED_HITS=$(rg -in \
            "\bhtmx\b|picocss|pico\.css|tanstack.*virtual.route" \
            docs/src \
            --glob "*.md" \
            --ignore-file .voxignore \
            -l \
            | grep -v 'docs/src/archive/' \
            | grep -v 'comprehensive-audit-findings' \
            || true)
          if [ -n "$RETIRED_HITS" ]; then
            echo "Retired surface references found in normative docs:"
            echo "$RETIRED_HITS"
            echo "Move HTMX/Pico/TanStack-virtual-routes content to docs/src/archive/ or remove."
            exit 1
          fi
          echo "No ghost retired-surface references in normative docs."

      - name: Web TS codegen — forbidden legacy RPC shims in sources
        shell: bash
        run: |
          set -euo pipefail
          if rg -n "createServerFn\\(" crates/vox-compiler/src/codegen_ts; then
            echo "createServerFn must not appear in vox-codegen-ts sources"
            exit 1
          fi

      - name: Normative docs — @query is GET (no POST /api/query claims)
        shell: bash
        run: |
          set -euo pipefail
          if rg -n "POST /api/query" docs/src/reference docs/src/api docs/src/architecture docs/src/how-to; then
            echo "docs must not describe @query as POST /api/query"
            exit 1
          fi

  lints:
    name: Lints (clippy + rustdoc + TOESTUB-scoped + hakari + grammar)
    needs: setup
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build vox-cli
        run: cargo build -p vox-cli

      - name: Rustdoc (deny warnings)
        run: RUSTDOCFLAGS='-D warnings' cargo doc --workspace --no-deps

      - name: Lint Check (Clippy)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # Scoped TOESTUB: legacy mode (Error/Critical blocking) for cross-CI consistency.
      - name: TOESTUB (scoped)
        run: cargo run -p vox-cli --quiet -- ci toestub-scoped --mode legacy

      - name: Architecture / Code Drift Guard (TOESTUB)
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1 || true
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^docs/src/architecture/"; then
            echo "Architecture docs changed. Running full crates TOESTUB..."
            cargo run -p vox-cli --quiet -- ci toestub-scoped crates --mode legacy
          else
            echo "No architecture docs changed. Skipping full strict TOESTUB."
          fi

      - name: Install cargo-hakari
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hakari

      - name: Verify Hakari (Workspace Dependency Determinism)
        run: cargo hakari generate --diff

      - name: Grammar export check (EBNF/GBNF/Lark/JSON-Schema non-empty)
        run: cargo run -p vox-cli --quiet -- ci grammar-export-check

  compiler-gates:
    name: Compiler gates (WebIR + projection + golden examples + benches)
    needs: setup
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build vox-cli
        run: cargo build -p vox-cli

      - name: routes.manifest + vox-client legacy-bundle smoke
        run: cargo test -p vox-compiler --test web_ir_lower_emit codegen_output_never_includes_vox_tanstack_router_or_server_fns -q

      - name: SPA scaffold manifest idempotency
        run: cargo test -p vox-cli --test scaffold_spa_manifest_idempotent -q

      - name: Eval benchmark matrix contract + vox-cli GPU compile smoke
        run: |
          cargo run -p vox-cli --quiet -- ci eval-matrix verify
          cargo run -p vox-cli --quiet -- ci eval-matrix run --milestone m3-dei-contracts
          cargo check -p vox-cli --features gpu

      - name: WebIR structural validate gate (TS codegen path)
        env:
          VOX_WEBIR_VALIDATE: "1"
        run: cargo test -p vox-compiler --test web_ir_lower_emit

      - name: Projection parity gate (WebIR + AppContract + RuntimeProjection)
        env:
          VOX_RUNTIME_PROJECTION_INCLUDE_HOST_PROBE: "0"
        run: cargo test -p vox-compiler --test projection_parity

      - name: Golden examples strict-parse gate (A.13 — all examples/*.vox must parse)
        # A.13: VOX_EXAMPLES_STRICT_PARSE=1 must be the default in CI.
        # Uses the vox-compiler test suite which already has a strict-parse integration test.
        env:
          VOX_EXAMPLES_STRICT_PARSE: "1"
        run: cargo test -p vox-compiler --test golden_examples_strict_parse -- --nocapture 2>&1
        # Gate enforcement: The build fails if any golden example contains syntax errors or unhandled tokens.

      - name: Golden @test function runner (CR-D3 — vox test round-trip)
        # Runs every @test fn in examples/golden/**/*.vox through the eval layer.
        # Validates that the `vox test` command surface works end-to-end on golden examples.
        run: cargo test -p vox-integration-tests --test golden_vox_test_runner -- --nocapture 2>&1

      - name: Compiler pipeline benchmarks compile-smoke (CR-E1 gate)
        # Verifies benchmark code compiles cleanly; timing baselines are captured
        # by the separate nightly benchmark job.  `--no-run` prevents wall-clock
        # variability from inflating CI times.
        run: cargo bench -p vox-compiler --no-run

      - name: Golden examples fmt idempotency gate (A.12)
        shell: bash
        run: |
          set -euo pipefail
          find examples/golden -name "*.vox" -type f -print0 | while IFS= read -r -d '' f; do
            cargo run -p vox-cli --quiet -- fmt "$f"
          done
          if ! git diff --exit-code examples/golden/; then
            echo "vox fmt is not idempotent or examples have unformatted changes."
            exit 1
          fi

  tests:
    name: Tests (nextest + llvm-cov + doctests)
    needs: setup
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build vox-cli
        run: cargo build -p vox-cli

      - name: Repository SSOT + MCP smoke
        run: cargo test -p vox-repository --lib && cargo test -p vox-orchestrator --lib detect_layout_node_workspaces && cargo test -p vox-mcp --lib && cargo check -p vox-git

      - name: Mesh transport + workflow-runtime + CLI feature matrix slice
        run: |
          cargo test -p vox-populi --features transport
          cargo test -p vox-workflow-runtime
          cargo check -p vox-cli --features mesh,workflow-runtime

      - name: Orchestrator slim build (news-publish off, no populi-transport → minimal default)
        run: cargo check -p vox-orchestrator --no-default-features --features runtime,mcp-native,toestub-gate

      - name: Arch-check (layer + fan-in + LoC + orphan + docstring)
        # Invocation delegated to scripts/arch-check.vox (SSOT).
        # Layer rule strict; the others warn-only by default. Source of truth:
        # docs/src/architecture/layers.toml.
        run: cargo run -p vox-cli --quiet -- run scripts/arch-check.vox

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Run Tests (llvm-cov + nextest, bounded timeouts)
        # Includes vox-compiler integration tests such as rust_ecosystem_support_parity.
        # INSTA_UPDATE=unseen: auto-accept new (not-yet-committed) snapshots without failing.
        # Changed snapshots still fail.  Committed snap files live in tests/snapshots/.
        env:
          INSTA_UPDATE: unseen
        run: cargo llvm-cov nextest --workspace --profile ci

      - name: Upload insta snapshots (review and commit after first run)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: insta-snapshots
          path: |
            crates/vox-integration-tests/tests/snapshots/
            crates/vox-compiler/tests/snapshots/
          if-no-files-found: ignore

      - name: vox-db replication feature (compile + embedded sync smoke skips without creds)
        run: cargo test -p vox-db --features replication sync_embedded_replica_smoke

      - name: Doc tests (not run by nextest)
        run: cargo test --workspace --doc

      - name: Line coverage report (summary, LCOV, gates enforce)
        run: |
          set -euo pipefail
          cargo llvm-cov report --text --summary-only
          cargo llvm-cov report --json --summary-only --output-path target/llvm-cov-summary.json
          cargo llvm-cov report --lcov --output-path target/llvm-cov-lcov.info
          cargo run -p vox-cli --quiet -- ci coverage-gates --summary-json target/llvm-cov-summary.json --mode enforce

      - name: Upload LLVM coverage artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: llvm-cov
          path: |
            target/llvm-cov-summary.json
            target/llvm-cov-lcov.info

  audits:
    name: Audits (TOESTUB-full + build-timings + feature-matrix + completion + mens-gate)
    needs: setup
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ needs.setup.outputs.cache-key }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Build vox-cli
        run: cargo build -p vox-cli

      - name: Completion quality audit + gates (LLM premature-completion SSOT)
        run: |
          cargo run -p vox-cli --features completion-toestub --quiet -- ci completion-audit
          cargo run -p vox-cli --features completion-toestub --quiet -- ci completion-gates --mode enforce

      - name: TOESTUB full crates/ — syn parse failure budget (JSON envelope)
        env:
          VOX_TOESTUB_MAX_RUST_PARSE_FAILURES: 3
        run: |
          set -euo pipefail
          cargo run -p vox-code-audit -q --bin toestub -- --mode audit --format json --min-severity info crates \
            | python3 -c "import json,os,sys;m=int(os.environ['VOX_TOESTUB_MAX_RUST_PARSE_FAILURES']);v=json.load(sys.stdin);n=int(v.get('rust_parse_failures',0));((print(f'rust_parse_failures={n} exceeds cap {m}',file=sys.stderr),sys.exit(1)) if n>m else (print(f'rust_parse_failures={n} (cap {m}) OK'),sys.exit(0)))"

      - name: vox-cli build timings (default + GPU/stub + per-crate lanes; wall-clock)
        env:
          VOX_BENCHMARK_TELEMETRY: "1"
          # H.79: enforce soft build budget caps — fails if any lane exceeds budgets.json
          VOX_BUILD_TIMINGS_BUDGET_FAIL: "1"
        run: cargo run -p vox-cli --quiet -- ci build-timings --crates

      - name: vox-cli feature matrix + no vox_orchestrator imports
        run: cargo run -p vox-cli --quiet -- ci feature-matrix && cargo run -p vox-cli --quiet -- ci no-vox-orchestrator-import

      - name: Workspace-wide all-features check (A.4)
        run: cargo check --workspace --all-features

      - name: Optional CUDA feature compile (Oratio + Populi Candle, when nvcc exists)
        run: cargo run -p vox-cli --quiet -- ci cuda-features

      - name: Mens corpus mix (strict required sources)
        run: |
          bash scripts/ci/prep_mens_mix_inputs.sh
          cargo run -p vox-cli --quiet -- mens corpus mix --config mens/config/mix.yaml

      - name: Populi CI gate matrix (single manifest)
        run: cargo run -p vox-cli --quiet -- ci mens-gate --profile ci_full

  # Single required-status check for branch protection. Keep this job's `name:`
  # identical to the existing required check ("Check, Build, and Test (Rust)")
  # so branch-protection settings carry over without admin action.
  ci-summary:
    name: Check, Build, and Test (Rust)
    needs: [guards-fast, lints, compiler-gates, tests, audits]
    if: always()
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 2
    steps:
      - name: All required jobs succeeded
        run: |
          set -euo pipefail
          fail=0
          for r in \
            "${{ needs.guards-fast.result }}" \
            "${{ needs.lints.result }}" \
            "${{ needs.compiler-gates.result }}" \
            "${{ needs.tests.result }}" \
            "${{ needs.audits.result }}"; do
            if [ "$r" != "success" ]; then fail=1; fi
          done
          exit $fail

  # GitHub-hosted exception: stock Node + pnpm (see .cursor/rules/ci-runner-convention.mdc).
  visualizer-ingest-smoke:
    name: Visualizer ingest unit (pnpm + tsx)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - name: Install + run ingest tests
        run: |
          cd tools/visualizer
          pnpm install
          pnpm run test:ingest

  # GitHub-hosted exception: needs stock Node + pnpm (see .cursor/rules/ci-runner-convention.mdc).
  web-vite-build-smoke:
    name: Web Vite build smoke (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-web-vite-${{ hashFiles('**/Cargo.lock') }}

      - name: Vite production build (full_stack_minimal)
        env:
          VOX_WEB_VITE_SMOKE: "1"
        run: cargo test -p vox-integration-tests --test web_vite_smoke_test -- --ignored --nocapture

  vox-vscode-extension:
    name: VS Code extension (compile + lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false
      - name: npm ci + compile (includes MCP + activation parity) + lint
        run: |
          cd vox-vscode
          npm ci
          npm run compile
          npm run lint

  mesh-compose-config:
    name: Validate examples/mesh-compose.yml
    runs-on: [self-hosted, linux, x64, docker]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: docker compose config (mesh example)
        run: docker compose -f examples/mesh-compose.yml config

  docker-vox-image-smoke:
    name: Docker build smoke (default + mesh)
    runs-on: [self-hosted, linux, x64, docker]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: docker build default image
        run: docker build -t vox:ci-smoke .
      # Blessed doc name: vox:ci-mesh-worker (same image as historical vox:ci-mesh); see vox-cross-platform-runbook.md
      - name: docker build mesh worker image (mesh + script-execution)
        run: docker build --build-arg VOX_CLI_FEATURES=populi,script-execution -t vox:ci-mesh -t vox:ci-mesh-worker .

  # Chromium/CDP (chromiumoxide): requires Chrome or Chromium on the runner (browser pool).
  vox-browser-cdp-smoke:
    name: vox-browser CDP smoke (Chromium)
    runs-on: [self-hosted, linux, x64, browser]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-browser-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-browser-smoke-
            ${{ runner.os }}-cargo-

      - name: CDP smoke (ignored tests)
        env:
          VOX_BROWSER_NO_SANDBOX: "1"
        run: cargo test -p vox-browser -- --ignored --nocapture

  gui-playwright-smoke:
    name: GUI Playwright golden route (full_stack_minimal)
    runs-on: [self-hosted, linux, x64, browser]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gui-playwright-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gui-playwright-
            ${{ runner.os }}-cargo-

      - name: Install Playwright deps + Chromium
        run: |
          cd crates/vox-integration-tests
          pnpm install --prefer-offline
          pnpm exec playwright install chromium

      - name: Golden route (ignored integration test)
        env:
          VOX_GUI_PLAYWRIGHT: "1"
        run: cargo test -p vox-integration-tests --test playwright_golden_route -- --ignored --nocapture

  all-features-matrix:
    name: All-Features Check (${{ matrix.crate }})
    runs-on: [self-hosted, linux, x64, docker]
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        crate:
          - vox-compiler
          - vox-codegen
          - vox-cli
          - vox-actor-runtime
          - vox-db
          - vox-db-types
          - vox-secrets
          - vox-orchestrator
          - vox-populi
          - vox-ml-cli
          - vox-gamify
          - vox-oratio
          - vox-schola
          - vox-skills
          - vox-scientia-ingest
          - vox-doc-pipeline
          - vox-mcp-registry
          - vox-package
          - vox-primitives
          - vox-config
          - vox-crypto
          - vox-code-audit
          - vox-openclaw-runtime
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-matrix-${{ matrix.crate }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Check with all features
        run: cargo check -p ${{ matrix.crate }} --all-features
