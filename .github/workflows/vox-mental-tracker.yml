name: vox-mental-tracker

on:
  push:
    paths:
      - "apps/vox-mental-tracker/**"
      - ".github/workflows/vox-mental-tracker.yml"
  pull_request:
    paths:
      - "apps/vox-mental-tracker/**"
      - ".github/workflows/vox-mental-tracker.yml"

defaults:
  run:
    working-directory: apps/vox-mental-tracker

jobs:
  vox-check:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo smoke (parent workspace)
        run: cargo run -q -p vox-cli -- check apps/vox-mental-tracker/src/main.vox
        working-directory: "."

  vitest:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: apps/vox-mental-tracker/pnpm-lock.yaml
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
        working-directory: apps/vox-mental-tracker
      - name: Build Sherpa plugin package (declarations)
        run: pnpm exec tsc -p plugins/vox-sherpa-transcribe/tsconfig.json
        working-directory: apps/vox-mental-tracker
      - name: Vitest
        run: pnpm exec vitest run
        working-directory: apps/vox-mental-tracker

  playwright:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: apps/vox-mental-tracker/pnpm-lock.yaml
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
        working-directory: apps/vox-mental-tracker
      - name: Resolve Playwright version
        id: pw_version
        shell: bash
        run: |
          ver=$(node -p "require('./apps/vox-mental-tracker/node_modules/@playwright/test/package.json').version")
          echo "ver=$ver" >> "$GITHUB_OUTPUT"
        working-directory: "."
      - name: Cache Playwright browsers
        id: pw_cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.pw_version.outputs.ver }}-chromium
          restore-keys: |
            ms-playwright-${{ runner.os }}-${{ steps.pw_version.outputs.ver }}-
            ms-playwright-${{ runner.os }}-
      - name: Install Playwright browsers (cache miss)
        if: steps.pw_cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium
        working-directory: apps/vox-mental-tracker
      - name: Playwright
        run: pnpm exec playwright test
        working-directory: apps/vox-mental-tracker

  contracts:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Build vox-cli
        run: cargo build -p vox-cli
      - name: JSON parse check on event-payload contracts
        run: cargo run -p vox-cli --quiet -- ci json-parse-check 'apps/vox-mental-tracker/contracts/event-payloads/*.json'
      - name: YAML parse check on export contracts
        run: cargo run -p vox-cli --quiet -- ci yaml-parse-check 'apps/vox-mental-tracker/contracts/export/*.yaml'

  app-summary:
    needs: [vox-check, vitest, playwright, contracts]
    runs-on: [self-hosted, linux, x64]
    if: always()
    steps:
      - name: Aggregate
        run: |
          if [ "${{ needs.vox-check.result }}" != "success" ] \
             || [ "${{ needs.vitest.result }}" != "success" ] \
             || [ "${{ needs.playwright.result }}" != "success" ] \
             || [ "${{ needs.contracts.result }}" != "success" ]; then
            echo "One or more lanes failed:"
            echo "  vox-check=${{ needs.vox-check.result }}"
            echo "  vitest=${{ needs.vitest.result }}"
            echo "  playwright=${{ needs.playwright.result }}"
            echo "  contracts=${{ needs.contracts.result }}"
            exit 1
          fi
          echo "All lanes green."
