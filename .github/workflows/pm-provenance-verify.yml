# Optional gate: validates `vox ci pm-provenance --strict` against a minimal fixture (WP8 smoke).
# Binary release workflow does not produce PM provenance; run this when exercising registry publish flows.
name: PM provenance verify (fixture)

on:
  workflow_dispatch:
  # Optional: periodic self-hosted smoke (uncomment and set cron); upstream keeps dispatch-only to avoid surprise runner load.
  # schedule:
  #   - cron: "17 4 1 * *" # e.g. monthly — 04:17 UTC on day-of-month 1

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  strict:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Strict pm-provenance on fixture
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .vox_modules/provenance
          node='{"schema":"vox.pm.provenance/1","package":"fixture-pkg","version":"0.0.1","content_hash":"ab","built_at_epoch":99,"tool":"ci-fixture","registry":"http://127.0.0.1:9"}'
          printf '%s\n' "$node" > .vox_modules/provenance/fixture-pkg@0.0.1.json
          cargo run --locked -p vox-cli -- ci pm-provenance --strict
