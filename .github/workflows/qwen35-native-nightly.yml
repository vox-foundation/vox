name: Qwen3.5 Native Nightly

on:
  schedule:
    - cron: "20 6 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  qwen35-native-smoke:
    name: Native Qwen3.5 smoke ladder
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Build vox-cli (gpu)
        run: cargo build -p vox-cli --features gpu

      - name: Prepare Mens corpus mix inputs
        run: bash scripts/ci/prep_mens_mix_inputs.sh

      - name: Mix corpus (strict)
        run: cargo run -p vox-cli --quiet -- mens corpus mix --config mens/config/mix.yaml

      - name: Qwen3.5-0.8B native smoke
        run: |
          cargo run -p vox-cli --features gpu -- mens train \
            --backend qlora \
            --tokenizer hf \
            --preset qwen_4080_16g \
            --model Qwen/Qwen3.5-0.8B \
            --device cuda \
            --data-dir target/dogfood \
            --output-dir mens/runs/qwen35_native_nightly_0p8b \
            --seq-len 128 \
            --checkpoint-every 1 \
            --max-runtime-secs 300 \
            --require-gpu \
            --qlora-require-full-proxy-stack

      - name: Upload nightly smoke artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: qwen35-native-nightly
          path: |
            mens/runs/qwen35_native_nightly_0p8b/training_manifest.json
            mens/runs/qwen35_native_nightly_0p8b/telemetry.jsonl
            mens/runs/qwen35_native_nightly_0p8b/checkpoint_state.json
