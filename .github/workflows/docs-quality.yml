name: Docs Quality

on:
  pull_request:
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'contracts/**'
      - 'crates/vox-doc-pipeline/**'
      - 'crates/vox-cli/src/commands/ci/**'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'contracts/**'
      - 'crates/vox-doc-pipeline/**'
      - 'crates/vox-cli/src/commands/ci/**'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Build docs tooling
        run: cargo build -p vox-cli -p vox-doc-pipeline

      # Hard gate: invalid frontmatter (bad category/status/missing training_eligible)
      # blocks the PR.  Previously only in CI; now also in pre-push (see pre_push.rs).
      - name: Doc lint (frontmatter, code fences, training rationale)
        run: cargo run -p vox-doc-pipeline -- --lint-only

      # Hard gate: ```vox blocks in docs must compile via vox-compiler.
      - name: Doctest extraction and check (SSG-agnostic)
        run: cargo run -p vox-cli -- ci doctest-md --strict

      - name: Install docs-astro deps
        working-directory: docs-astro
        run: pnpm install --frozen-lockfile

      - name: Build Starlight
        id: starlight_build
        working-directory: docs-astro
        run: pnpm build

      # Bootstrap period: continue-on-error until baseline passes, then graduate
      # to a hard gate (same pattern as markdownlint above).
      - name: TypeScript lint (biome)
        continue-on-error: true
        run: npx @biomejs/biome@1.9.4 lint --reporter=github

      # Hard gate: was continue-on-error.  Markdownlint rules are explicitly
      # configured in .markdownlint.jsonc; no surprise failures from rule changes.
      - name: Markdown lint
        run: pnpm dlx markdownlint-cli2 "docs/src/contributors/**/*.md" "docs/src/architecture/research-index.md"

  generator-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build -p vox-cli

      # Hard gate: was continue-on-error.  Pre-commit hook regenerates + stages
      # these; CI verifies the result.  Silent drift is worse than a failed PR.
      - name: Check ignore-file sync
        run: cargo run -p vox-cli --quiet -- ci sync-ignore-files --verify

      # Hard gate: was continue-on-error.
      - name: Check plugin catalog docs
        run: cargo run -p vox-cli --quiet -- ci generate-plugin-catalog-docs --check

      # Hard gate: was continue-on-error.
      - name: Check CLI command surface
        run: cargo run -p vox-cli --quiet -- ci command-sync --check
