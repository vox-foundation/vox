name: Docs Quality

on:
  pull_request:
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'contracts/**'
      - 'crates/vox-doc-pipeline/**'
      - 'crates/vox-cli/src/commands/ci/**'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'contracts/**'
      - 'crates/vox-doc-pipeline/**'
      - 'crates/vox-cli/src/commands/ci/**'

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Build docs tooling
        run: cargo build -p vox-cli -p vox-doc-pipeline

      - name: Doc lint (frontmatter, code fences, training rationale)
        run: cargo run -p vox-doc-pipeline -- --lint-only

      - name: Doctest extraction and check (SSG-agnostic)
        run: cargo run -p vox-cli -- ci doctest-md --strict

      - name: Check internal docs links
        id: internal_links
        continue-on-error: true
        run: cargo run -p vox-cli --quiet -- ci check-links

      - name: Warn if internal link check failed
        if: steps.internal_links.outcome == 'failure'
        run: echo "::warning title=Internal docs links::Broken internal documentation links were detected; this workflow is advisory and will not block."

      - name: Install docs-astro deps
        working-directory: docs-astro
        run: pnpm install --frozen-lockfile

      - name: Build Starlight
        id: starlight_build
        working-directory: docs-astro
        run: pnpm build

      - name: Markdown lint
        id: markdown_lint
        continue-on-error: true
        run: pnpm dlx markdownlint-cli2 "docs/src/contributors/**/*.md" "docs/src/architecture/research-index.md"

      - name: Warn if markdown lint failed
        if: steps.markdown_lint.outcome == 'failure'
        run: echo "::warning title=Markdown lint::Markdown lint reported issues; this workflow is advisory and will not block."

  generator-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build -p vox-cli

      - name: Check ignore-file sync
        id: sync_ignore
        continue-on-error: true
        run: cargo run -p vox-cli --quiet -- ci sync-ignore-files --verify

      - name: Warn ignore drift
        if: steps.sync_ignore.outcome == 'failure'
        run: echo "::warning title=Ignore-file drift::.cursorignore/.aiignore/.aiexclude are out of sync with .voxignore. Run 'vox ci sync-ignore-files' locally or install hooks via 'vox run scripts/install-hooks.vox'."

      - name: Check plugin catalog docs
        id: plugin_catalog
        continue-on-error: true
        run: cargo run -p vox-cli --quiet -- ci generate-plugin-catalog-docs --check

      - name: Warn plugin catalog drift
        if: steps.plugin_catalog.outcome == 'failure'
        run: echo "::warning title=Plugin catalog drift::plugin-catalog.generated.md is out of sync. Run 'vox ci generate-plugin-catalog-docs' locally or install hooks."

      - name: Check CLI command surface
        id: command_sync
        continue-on-error: true
        run: cargo run -p vox-cli --quiet -- ci command-sync --check

      - name: Warn command surface drift
        if: steps.command_sync.outcome == 'failure'
        run: echo "::warning title=Command surface drift::cli-command-surface.generated.md is out of sync. Run 'vox ci command-sync' locally or install hooks."
