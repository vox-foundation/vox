name: Docs Quality

on:
  pull_request:
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'contracts/**'
      - 'crates/vox-doc-pipeline/**'
      - 'crates/vox-cli/src/commands/ci/**'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'AGENTS.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'contracts/**'
      - 'crates/vox-doc-pipeline/**'
      - 'crates/vox-cli/src/commands/ci/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  docs-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: '0.4.40'

      - name: Install mdBook tools
        run: |
          cargo install mdbook-metadata --locked
          cargo install mdbook-sitemap-generator --version 0.2.0 --locked
          cargo install mdbook-linkcheck2 --locked

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build docs tooling
        run: cargo build -p vox-cli -p vox-doc-pipeline

      - name: Doc pipeline strict check (lint + SUMMARY)
        run: cargo run -p vox-doc-pipeline -- --check

      - name: Run docs pipeline
        id: docs_pipeline
        continue-on-error: true
        run: cargo run -p vox-doc-pipeline

      - name: Warn if docs pipeline failed
        if: steps.docs_pipeline.outcome == 'failure'
        run: echo "::warning title=Docs pipeline failed::cargo run -p vox-doc-pipeline failed; this workflow is advisory and will not block."

      - name: Check internal docs links
        id: internal_links
        continue-on-error: true
        run: cargo run -p vox-cli --quiet -- ci check-links

      - name: Warn if internal link check failed
        if: steps.internal_links.outcome == 'failure'
        run: echo "::warning title=Internal docs links::Broken internal documentation links were detected; this workflow is advisory and will not block."

      - name: Build mdBook
        id: mdbook_build
        continue-on-error: true
        run: mdbook build docs

      - name: Warn if mdBook build failed
        if: steps.mdbook_build.outcome == 'failure'
        run: echo "::warning title=mdBook build failed::mdBook failed to build documentation; this workflow is advisory and will not block."

      - name: Markdown lint
        id: markdown_lint
        continue-on-error: true
        run: pnpm dlx markdownlint-cli2 "docs/src/contributors/**/*.md" "docs/src/architecture/architecture-index.md" "docs/src/architecture/research-index.md"

      - name: Warn if markdown lint failed
        if: steps.markdown_lint.outcome == 'failure'
        run: echo "::warning title=Markdown lint::Markdown lint reported issues; this workflow is advisory and will not block."
