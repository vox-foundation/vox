name: Vox Visus Audit

on:
  pull_request:
    branches: [ main, master ]
    paths:
      - 'crates/vox-browser/**'
      - 'crates/vox-compiler/**'
      - 'crates/vox-cli/**'
      - 'docs/src/**'

jobs:
  visus-audit:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      
    - name: Build Vox CLI
      # `vox visus` is compiled under #[cfg(feature = "dei")] — build with it
      run: cargo build -p vox-cli --release --features dei

    - name: Run Visus Audit
      shell: pwsh
      # Only runs when VOX_VISUS_STAGING_URL is set (e.g. a deploy-preview URL).
      # Skipped on PRs that lack a staging environment; no artifacts are produced.
      # Failures are advisory — they do not block merge.
      continue-on-error: true
      if: env.VOX_VISUS_STAGING_URL != ''
      run: |
        ./target/release/vox.exe visus audit "$env:VOX_VISUS_STAGING_URL" --viewport "1280x800" --screenshot "visus_report.png"
      env:
        VOX_WORKSPACE_JOURNEY_STORE: "visus_audit_db.sqlite"
        VOX_BROWSER_NO_SANDBOX: "1"
        VOX_VISUS_STAGING_URL: ${{ vars.VOX_VISUS_STAGING_URL }}

    - name: Upload Visus Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: visus-audit-results
        if-no-files-found: ignore
        path: |
          visus_report.png
          visus_audit_db.sqlite
