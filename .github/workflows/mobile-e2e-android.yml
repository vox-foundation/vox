name: Mobile E2E - Android
on:
  push:
    paths:
      - 'apps/vox-mental-tracker/**'
      - 'crates/vox-cli/**'
      - 'crates/vox-codegen/**'
      - 'crates/vox-tauri-codegen/**'
      - '.github/workflows/mobile-e2e-android.yml'
  pull_request:
    paths:
      - 'apps/vox-mental-tracker/**'
      - 'crates/vox-cli/**'
      - 'crates/vox-codegen/**'
      - 'crates/vox-tauri-codegen/**'
      - '.github/workflows/mobile-e2e-android.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android-e2e:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'
      - name: Install dependencies
        run: cd apps/vox-mental-tracker && pnpm install --frozen-lockfile
      - name: Build vox CLI
        run: cargo build -p vox-cli
      - name: Build web bundle
        run: cd apps/vox-mental-tracker && pnpm build
      - name: Tauri mobile codegen (Android)
        run: |
          cd apps/vox-mental-tracker
          ../../target/debug/vox compile --target mobile-android -o dist src/main.vox
      - name: Verify generated Tauri workspace
        run: test -f target/generated/src-tauri/tauri.conf.json
      - name: Run Playwright (web)
        run: cd apps/vox-mental-tracker && pnpm e2e
