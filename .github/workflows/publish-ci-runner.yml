name: Publish CI runner image (GHCR)

# Builds the self-hosted runner image and pushes it to GHCR so contributors
# can reproduce the heavy self-hosted lanes locally:
#
#   docker pull ghcr.io/${{ github.repository_owner }}/vox-ci-runner:latest
#
# Triggered on changes to the Dockerfile or runner tooling, or manually.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile.ci-runner
      - .github/workflows/publish-ci-runner.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ci-runner
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build and push vox-ci-runner image
    # Uses GitHub-hosted to bootstrap before the self-hosted fleet is available
    # (chicken-and-egg: self-hosted runner requires the image we are building).
    # Documented exception — see docs/src/ci/github-hosted-exceptions.md.
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/vox-ci-runner
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push (basic Linux profile)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci-runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache stored in GHCR alongside the image
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vox-ci-runner:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/vox-ci-runner:buildcache,mode=max
          build-args: |
            RUST_VERSION=1.92.0

      - name: Smoke test pulled image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/vox-ci-runner:latest
          docker run --rm ghcr.io/${{ github.repository_owner }}/vox-ci-runner:latest \
            bash -c "cargo --version && rustc --version"
