name: SSOT Drift Checker

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded versions
        run: |
          # Fails if any crate Cargo.toml has a hardcoded version instead of workspace inheritance
          if grep -rnE '^version\s*=\s*"[^"]+"' crates/*/Cargo.toml; then
            echo "::error title=SSOT Drift::Found hardcoded versions in crate Cargo.toml files. Use 'version.workspace = true'."
            exit 1
          fi
          echo "All crates use workspace versioning."

  check-dashboard-ssot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for commit-log check
      - name: Install Vox toolchain
        uses: ./.github/actions/install-vox
        continue-on-error: true  # gracefully degrade if action not present yet
      - name: Dashboard generated/ SSoT gate
        run: |
          if command -v vox &>/dev/null; then
            vox run scripts/check_dashboard_ssot.vox
          else
            # Fallback: at minimum check that no .tsx in generated/ was committed
            # without a .vox change in the same commit (git-only check).
            echo "vox CLI not installed — running fallback git-log check"
            violations=""
            generated="crates/vox-dashboard/app/src/generated"
            if [ -d "$generated" ]; then
              for tsx in "$generated"/*.tsx; do
                [ -f "$tsx" ] || continue
                commit=$(git log -1 --format="%H" -- "$tsx")
                [ -z "$commit" ] && continue
                if ! git show --name-only --format="" "$commit" | grep -q '\.vox$'; then
                  violations="$violations\n  $tsx (commit ${commit:0:8} touched no .vox)"
                fi
              done
            fi
            if [ -n "$violations" ]; then
              echo "::error title=Dashboard SSoT::Hand-edited .tsx files found in generated/:"
              printf "$violations\n"
              exit 1
            fi
            echo "Dashboard generated/ SSoT check passed."
          fi
