[package]
name = "marquee-app"
version = "0.1.0"
kind = "application"
description = "Vox marquee application — public demo"
license = "Apache-2.0"
authors = []
keywords = []
targets = []

[dependencies]

[dev-dependencies]

[features]

[skills]

[deploy]
# Target: OCI container pushed to GitHub Container Registry.
# Auth: GITHUB_TOKEN (already in env; Clavis resolves as ForgeToken).
# Registry login: docker login ghcr.io -u <username> -p $GITHUB_TOKEN
target = "container"
runtime = "auto"

[deploy.container]
# ghcr.io/<owner>/marquee-app — replace <owner> with your GitHub username/org.
# The full pushed tag will be: ghcr.io/<owner>/marquee-app:production
registry = "ghcr.io/owner"
dockerfile = "Dockerfile"
