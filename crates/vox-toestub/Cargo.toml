[package]
name = "vox-toestub"
description = "AI code quality stub detector — finds stubs, magic values, empty bodies, missing references, and DRY violations"
version.workspace = true
edition.workspace = true

[dependencies]
syn = { version = "2", features = ["full", "visit", "parsing", "extra-traits"] }
quote = "1"
proc-macro2 = { version = "1", features = ["span-locations"] }
walkdir = "2"
regex = "1"
serde = { workspace = true }
serde_json = { workspace = true }
miette = { workspace = true }
owo-colors = { workspace = true }
thiserror = { workspace = true }
similar = "2"
globset = "0.4"
reqwest = { workspace = true, default-features = false, features = ["json", "rustls-tls"] }
vox-reqwest-defaults = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
clap = { workspace = true, features = ["derive"] }
vox-scaling-policy = { workspace = true }
vox-bounded-fs = { workspace = true }
vox-socrates-policy = { workspace = true }
vox-jsonschema-util = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[lints]
workspace = true

