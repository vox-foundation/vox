[package]
name = "vox-toestub"
description = "AI code quality stub detector — finds stubs, magic values, empty bodies, missing references, and DRY violations"
version.workspace = true
edition.workspace = true

[dependencies]
syn = { workspace = true, features = ["full", "visit", "parsing", "extra-traits"] }
quote = { workspace = true }
proc-macro2 = { workspace = true, features = ["span-locations"] }
walkdir = { workspace = true }
regex = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
miette = { workspace = true }
owo-colors = { workspace = true }
thiserror = { workspace = true }
similar = { workspace = true }
globset = { workspace = true }
reqwest = { workspace = true, default-features = false, features = ["json", "rustls-tls"] }
vox-reqwest-defaults = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
clap = { workspace = true, features = ["derive"] }
vox-scaling-policy = { workspace = true }
vox-clavis = { workspace = true }
vox-config = { workspace = true }
vox-bounded-fs = { workspace = true }
vox-socrates-policy = { workspace = true }
vox-jsonschema-util = { workspace = true }
workspace-hack = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }

[lints]
workspace = true

