[package]
name = "vox-populi"
description = "Vox Populi: multi-node worker registry, HTTP control plane, and Mens native ML (Burn / Candle QLoRA)."
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["mens-gpu"]
# NVIDIA NVML probe → Populi `NodeRecord` gpu_* fields (optional; requires NVML at runtime).
nvml-gpu-probe = ["vox-repository/nvml-probe"]
# Enable live-hardware integration tests (requires real GPU hardware; do not enable on CI).
hw-probe-live-test = []
# HTTP control plane (join / heartbeat / list) for multi-node loopback or LAN (TLS in ops layer).
transport = [
    "dep:axum",
    "dep:tokio",
    "dep:reqwest",
    "dep:vox-reqwest-defaults",
    "dep:tower-http",
    "dep:subtle",
    "dep:vox-bounded-fs",
    "dep:jsonwebtoken",
    "dep:ed25519-dalek",
    "dep:blake3",
    "dep:data-encoding",
    "dep:base64",
    "dep:dashmap",
    "dep:vox-db",
    "dep:turso",
]
# Mens ML — core deps (absorbed former `vox-mens` crate).
mens = [
    "dep:anyhow",
    "dep:serde_yaml",
    "dep:ctrlc",
    "dep:tokio",
    "dep:chrono",
    "dep:dirs",
    "dep:sysinfo",
    "dep:rand",
    "dep:vox-tensor",
    "dep:vox-corpus",
    "dep:vox-db",
    "dep:vox-bounded-fs",
]
mens-gpu = ["mens", "dep:burn", "vox-tensor/gpu", "dep:tokenizers", "dep:safetensors", "dep:wgpu", "dep:nvml-wrapper", "dep:windows"]
mens-candle-qlora = [
    "mens",
    "dep:candle-core",
    "dep:candle-nn",
    "dep:safetensors",
    "dep:tokenizers",
    "dep:qlora-rs",
]
mens-candle-qlora-cuda = [
    "mens-candle-qlora",
    "candle-core/cuda",
    "candle-nn/cuda",
]
mens-train = ["mens-gpu", "vox-tensor/train", "mens-candle-qlora", "mens-hf-hub", "dep:vox-eval", "dep:vox-compiler", "dep:vox-plugin-host"]
mens-hf-hub = ["mens", "dep:hf-hub", "tokio/rt-multi-thread"]
mens-cloud = [
    "mens",
    "dep:reqwest",
    "dep:vox-reqwest-defaults",
]

[dependencies]
async-trait = { workspace = true }
owo-colors = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
vox-repository = { workspace = true }
vox-primitives = { workspace = true }
vox-clavis = { workspace = true }
vox-plugin-host = { workspace = true, optional = true }
vox-constrained-gen = { workspace = true }
vox-grammar-export = { workspace = true }
vox-crypto = { workspace = true }
vox-mesh-types = { workspace = true }

# Populi transport
axum = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true, default-features = false, features = ["json", "rustls-tls"] }
vox-reqwest-defaults = { workspace = true, optional = true }
tower-http = { workspace = true, optional = true, features = ["trace", "request-id"] }
vox-db = { workspace = true, optional = true }
turso = { workspace = true, optional = true }
subtle = { workspace = true, optional = true }
jsonwebtoken = { workspace = true, optional = true }
ed25519-dalek = { workspace = true, optional = true }
blake3 = { workspace = true, optional = true }
data-encoding = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
dashmap = { workspace = true, optional = true }

# Mens (optional)
anyhow = { workspace = true, optional = true }
serde_yaml = { workspace = true, optional = true }
ctrlc = { workspace = true, features = ["termination"], optional = true }
chrono = { workspace = true, optional = true }
dirs = { workspace = true, optional = true }
sysinfo = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
vox-tensor = { workspace = true, optional = true }
vox-corpus = { workspace = true, optional = true }
vox-bounded-fs = { workspace = true, optional = true }
burn = { workspace = true, optional = true, features = ["autodiff", "wgpu", "train"] }
hf-hub = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
safetensors = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }
qlora-rs = { workspace = true, optional = true }
futures = { workspace = true }
vox-eval = { workspace = true, optional = true }
vox-compiler = { workspace = true, optional = true }
wgpu = { workspace = true, optional = true }
nvml-wrapper = { workspace = true, optional = true }
windows = { version = "0.58", features = ["Win32_Graphics_Dxgi", "Win32_Foundation"], optional = true }

workspace-hack = { workspace = true }
hex = "0.4.3"

[dev-dependencies]
jsonschema = { workspace = true, default-features = false }
openapiv3 = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
reqwest = { workspace = true, default-features = false, features = ["json", "rustls-tls"] }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
jsonwebtoken = { workspace = true }
ed25519-dalek = { workspace = true }
blake3 = { workspace = true }
tracing-test = { workspace = true }
data-encoding = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
serial_test = { workspace = true }

[[test]]
name = "http_control_plane"
required-features = ["transport"]

[[test]]
name = "dispatch_persistence"
required-features = ["transport"]

[lints]
workspace = true
