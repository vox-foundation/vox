[package]
name = "vox-populi"
description = "Vox Populi: multi-node worker registry, HTTP control plane, and Mens native ML (Burn / Candle QLoRA)."
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
# NVIDIA NVML probe → Populi hardware pipeline (optional; requires NVML at runtime).
# NVML probing has moved to vox-plugin-nvml-probe; this feature now only gates the
# in-process fallback via mens/hardware/nvml.rs (used when the plugin is not loaded).
nvml-gpu-probe = []
# Enable live-hardware integration tests (requires real GPU hardware; do not enable on CI).
hw-probe-live-test = []
# Optional rustls TLS termination on the populi HTTP plane (P0-T5).
tls = ["dep:rustls", "dep:rustls-pemfile", "dep:tokio-rustls"]
# DEPRECATED: HTTP control plane code extracted to vox-plugin-populi-mesh; rewire of
# vox-cli/vox-ml-cli/vox-orchestrator callsites is pending (Unit 2 follow-up).
# Keep this feature until all callers are rewired through MeshDriver.
transport = [
    "dep:axum",
    "dep:tokio",
    "dep:reqwest",
    "dep:vox-reqwest-defaults",
    "dep:tower-http",
    "dep:subtle",
    "dep:vox-bounded-fs",
    "dep:jsonwebtoken",
    "dep:ed25519-dalek",
    "dep:blake3",
    "dep:data-encoding",
    "dep:base64",
    "dep:dashmap",
    "dep:vox-db",
    "dep:turso",
]
# Mens ML — core deps (absorbed former `vox-ml-cli` crate).
mens = [
    "dep:anyhow",
    "dep:serde_yaml",
    "dep:ctrlc",
    "dep:tokio",
    "dep:chrono",
    "dep:dirs",
    "dep:sysinfo",
    "dep:rand",
    "dep:vox-tensor",
    "dep:vox-corpus",
    "dep:vox-db",
    "dep:vox-bounded-fs",
]
mens-candle-qlora = [
    "mens",
    "dep:candle-core",
    "dep:candle-nn",
    "dep:safetensors",
    "dep:tokenizers",
    "dep:qlora-rs",
]
mens-candle-qlora-cuda = [
    "mens-candle-qlora",
    "candle-core/cuda",
    "candle-nn/cuda",
]
mens-train = ["mens", "mens-candle-qlora", "mens-hf-hub", "dep:vox-eval", "dep:vox-compiler", "dep:vox-plugin-host"]
mens-hf-hub = ["mens", "dep:hf-hub", "tokio/rt-multi-thread"]
mens-cloud = [
    "mens",
    "dep:reqwest",
    "dep:vox-reqwest-defaults",
]
# Opt-in grand-network discovery publishing via the Provider Atlas (P6-T6).
mesh-discovery-publish = [
    "dep:vox-publisher",
]

[dependencies]
async-trait = { workspace = true }
owo-colors = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
vox-repository = { workspace = true }
vox-primitives = { workspace = true }
vox-secrets = { workspace = true }
vox-plugin-host = { workspace = true, optional = true }
vox-constrained-gen = { workspace = true }
vox-grammar-export = { workspace = true }
vox-crypto = { workspace = true }
vox-identity = { workspace = true }
vox-mesh-types = { workspace = true }
vox-distributed-training = { workspace = true }

# TLS (optional, P0-T5)
rustls = { workspace = true, optional = true }
rustls-pemfile = { workspace = true, optional = true }
tokio-rustls = { workspace = true, optional = true }

# Populi transport
axum = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true, default-features = false, features = ["json", "rustls-tls"] }
vox-reqwest-defaults = { workspace = true, optional = true }
tower-http = { workspace = true, optional = true, features = ["trace", "request-id"] }
vox-db = { workspace = true, optional = true }
turso = { workspace = true, optional = true }
subtle = { workspace = true, optional = true }
jsonwebtoken = { workspace = true, optional = true }
ed25519-dalek = { workspace = true, optional = true }
blake3 = { workspace = true, optional = true }
data-encoding = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
dashmap = { workspace = true, optional = true }

# Mens (optional)
anyhow = { workspace = true, optional = true }
serde_yaml = { workspace = true, optional = true }
ctrlc = { workspace = true, features = ["termination"], optional = true }
chrono = { workspace = true, optional = true }
dirs = { workspace = true, optional = true }
sysinfo = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
vox-tensor = { workspace = true, optional = true }
vox-corpus = { workspace = true, optional = true }
vox-bounded-fs = { workspace = true, optional = true }
hf-hub = { workspace = true, optional = true }
candle-core = { workspace = true, optional = true }
candle-nn = { workspace = true, optional = true }
safetensors = { workspace = true, optional = true }
tokenizers = { workspace = true, optional = true }
qlora-rs = { workspace = true, optional = true }
futures = { workspace = true }
vox-eval = { workspace = true, optional = true }
vox-compiler = { workspace = true, optional = true }
vox-publisher = { workspace = true, optional = true }
workspace-hack = { workspace = true }
hex = "0.4.3"

[dev-dependencies]
jsonschema = { workspace = true, default-features = false }
openapiv3 = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
reqwest = { workspace = true, default-features = false, features = ["json", "rustls-tls"] }
serde_yaml = { workspace = true }
tempfile = { workspace = true }
jsonwebtoken = { workspace = true }
ed25519-dalek = { workspace = true }
blake3 = { workspace = true }
tracing-test = { workspace = true }
# TLS smoke test helpers (P0-T5)
rcgen = "0.13"
rustls = { workspace = true }
tokio-rustls = { workspace = true }
data-encoding = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
serial_test = { workspace = true }
mockito = "1"

[[test]]
name = "http_control_plane"
required-features = ["transport"]

[[test]]
name = "dispatch_persistence"
required-features = ["transport"]

[[test]]
name = "probe_pipeline"
required-features = ["mens"]

[[test]]
name = "probe_pipeline_live"
required-features = ["mens"]

[[test]]
name = "hf_load_config"
required-features = ["mens"]

[[test]]
name = "qwen35_native_parity"
required-features = ["mens"]

[[test]]
name = "training_presets_yaml_contract"
required-features = ["mens"]

[[test]]
name = "ed25519_envelope"
required-features = ["transport"]

[[test]]
name = "github_attestation"
required-features = ["transport"]

[[test]]
name = "quota_bucket"
required-features = ["transport"]

[[test]]
name = "pairing_e2e"
required-features = ["transport"]

[lints]
workspace = true
