[package]
name = "vox-populi"
description = "Local and multi-node populi registry for Vox workers (CPU-first capabilities)"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
# HTTP control plane (join / heartbeat / list) for multi-node loopback or LAN (TLS in ops layer).
transport = [
    "dep:axum",
    "dep:tokio",
    "dep:reqwest",
    "dep:tower-http",
    "dep:subtle",
]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
vox-repository = { workspace = true }
axum = { version = "0.8", optional = true }
tokio = { workspace = true, optional = true }
reqwest = { workspace = true, optional = true, default-features = false, features = ["json", "rustls-tls"] }
tower-http = { version = "0.6.2", optional = true, features = ["trace", "request-id"] }
subtle = { version = "2.6", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
reqwest = { workspace = true, default-features = false, features = ["json", "rustls-tls"] }
serde_yaml = { workspace = true }

[lints]
workspace = true
