[plugin]
id = "skill-rag"
name = "Vox RAG Skill"
version = "0.1.0"
description = "Agent-facing skill for retrieval-augmented generation."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "skill"
format-version = 1
skill-md = "rag.skill.md"

[plugin.payload.tools]
exposes = ["vox_rag_query", "vox_rag_index"]
