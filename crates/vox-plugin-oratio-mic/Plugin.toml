[plugin]
id = "oratio-mic"
name = "Oratio Microphone Capture"
version = "0.1.0"
description = "AudioCapture plugin for low-level microphone device access used by Oratio. SP7 scaffold — extraction from vox-oratio deferred."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 9

[plugin.payload.provides]
extension-points = ["AudioCapture"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_oratio_mic.dll"
"linux-x86_64"   = "libvox_plugin_oratio_mic.so"
"macos-aarch64"  = "libvox_plugin_oratio_mic.dylib"
