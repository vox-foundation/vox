[plugin]
id = "nvml-probe"
name = "NVIDIA NVML Hardware Probe"
version = "0.1.0"
description = "Probes NVIDIA GPUs via NVML for device count, names, memory, utilization, temperature."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 7

[plugin.payload.provides]
extension-points = ["HardwareProbe"]

[plugin.payload.requires]
os = ["windows", "linux"]
arch = ["x86_64"]
native-libs = [
    { name = "nvml" }
]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_nvml_probe.dll"
"linux-x86_64"   = "libvox_plugin_nvml_probe.so"
