[plugin]
id = "publication"
name = "Publication"
version = "0.1.0"
description = "RSS/Atom ingest with semantic dedup; multi-platform publish (Reddit, YouTube, scholarly feeds)."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 11

[plugin.payload.provides]
extension-points = ["Publication"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_publication.dll"
"linux-x86_64"   = "libvox_plugin_publication.so"
"macos-aarch64"  = "libvox_plugin_publication.dylib"
