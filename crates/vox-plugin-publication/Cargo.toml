[package]
name = "vox-plugin-publication"
version.workspace = true
edition.workspace = true
publish = false
description = "Publication plugin: RSS/Atom ingest with dedup, Reddit/YouTube publish, scholarly job feeds."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vox-plugin-api = { workspace = true }
vox-scientia-ingest = { workspace = true }
vox-publisher = { workspace = true, features = ["scientia-reddit", "scientia-youtube", "scholarly-external-jobs"] }
vox-db = { workspace = true }
# NOTE: `vox-actor-runtime` is intentionally NOT a dependency. Plugins must not pull
# the core agent runtime. The `LlmConfig` type used in `ingest.rs` is reached
# through `vox-search`'s re-export.
# Path dep (not `workspace = true`): Cargo forbids `default-features = false` overrides on inherited workspace deps.
vox-search = { path = "../vox-search", default-features = false, features = ["tantivy-lexical", "web-scrape"] }
abi_stable = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "sync"] }
tracing = { workspace = true }
workspace-hack = { workspace = true }

[lints]
workspace = true
