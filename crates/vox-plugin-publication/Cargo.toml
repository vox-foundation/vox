[package]
name = "vox-plugin-publication"
version.workspace = true
edition.workspace = true
publish = false
description = "Publication plugin: RSS/Atom ingest with dedup, Reddit/YouTube publish, scholarly job feeds."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vox-plugin-api = { workspace = true }
vox-scientia-ingest = { workspace = true }
vox-publisher = { workspace = true, features = ["scientia-reddit", "scientia-youtube", "scholarly-external-jobs"] }
abi_stable = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "sync"] }
tracing = { workspace = true }
workspace-hack = { workspace = true }

[lints]
workspace = true
