[package]
name = "vox-foundation"
description = "Utility umbrella: primitives (ids/backoff/agentos-mutation), protocol (daemon wire types), and tracing-init (tracing_subscriber presets). Consolidates vox-primitives, vox-protocol, and vox-tracing-init."
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
workspace-hack = { workspace = true }

[lints]
workspace = true
