[package]
name = "vox-db"
version.workspace = true
edition.workspace = true

[dependencies]
vox-compiler = { workspace = true }
vox-compiler-emit = { workspace = true }
vox-config.workspace = true
vox-db-types = { workspace = true }
vox-orchestrator-types = { workspace = true }
vox-plugin-types = { workspace = true }
async-trait = "0.1.89"
turso = { workspace = true }
tokio = { workspace = true }
thiserror = { workspace = true }
sha3 = { workspace = true }
bincode = { workspace = true }
vox-secrets = { workspace = true }
vox-repository = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
blake3 = { workspace = true }
data-encoding = { workspace = true }
keyring = { workspace = true }
uuid = { version = "1.0", features = ["v4", "serde"] }
vox-mesh-types = { workspace = true }
workspace-hack = { workspace = true }

[features]
default = ["local"]
local = []
replication = []

[dev-dependencies]
regex = { workspace = true }
tempfile = { workspace = true }
vox-test-harness = { path = "../vox-test-harness" }

[[test]]
name = "sync_embedded_replica_integration"
path = "tests/sync_embedded_replica_integration.rs"
required-features = ["replication"]

[lints]
workspace = true

