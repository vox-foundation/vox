[package]
name = "vox-schola"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "vox-schola — standalone ML training/serving binary. Mens QLoRA links Candle CUDA kernels when built; use --no-default-features for a CPU-only check without nvcc."
default-run = "vox-schola"

[[bin]]
name = "vox-schola"
path = "src/main.rs"



[dependencies]
vox-cli-core = { workspace = true }
which = "8"
anyhow = { workspace = true }
tokio = { workspace = true, features = ["full", "rt-multi-thread", "macros"] }
serde = { workspace = true }
clap = { workspace = true, features = ["derive"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[lints]
workspace = true
