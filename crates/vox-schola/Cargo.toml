[package]
name = "vox-schola"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "vox-schola — standalone ML training/serving binary. Mens QLoRA links Candle CUDA kernels when built; use --no-default-features for a CPU-only check without nvcc."
default-run = "vox-schola"

[[bin]]
name = "vox-schola"
path = "src/main.rs"

[features]
default = ["cuda"]
# NVIDIA Candle kernels (requires CUDA toolkit + MSVC toolchain on Windows).
cuda = ["vox-populi/mens-candle-qlora-cuda"]

[dependencies]
# Core ML (Mens) — Candle QLoRA + CUDA via default `cuda` feature (`mens-candle-qlora-cuda` on Populi).
vox-populi = { workspace = true, features = ["mens", "mens-train", "mens-hf-hub"] }
vox-corpus  = { workspace = true }
vox-db      = { workspace = true }
# CLI + async runtime
clap        = { workspace = true, features = ["derive"] }
anyhow      = { workspace = true }
tokio       = { workspace = true }
tracing     = { workspace = true }
tracing-subscriber = { workspace = true }
serde_json  = { workspace = true }
serde       = { workspace = true }
chrono      = { workspace = true }
ctrlc       = { version = "3.4", features = ["termination"] }
uuid        = { version = "1", features = ["v4"] }
which       = "8"
# HTTP inference server
axum        = { version = "0.8" }
tokio-stream = { version = "0.1" }

[lints]
workspace = true
