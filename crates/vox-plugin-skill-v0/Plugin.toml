[plugin]
id = "skill-v0"
name = "Vox v0 Skill"
version = "0.1.0"
description = "Agent-facing skill providing legacy v0 compatibility surface."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "skill"
format-version = 1
skill-md = "v0.skill.md"

[plugin.payload.tools]
exposes = ["vox_v0_compat"]
