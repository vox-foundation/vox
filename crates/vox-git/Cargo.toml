[package]
name = "vox-git"
description = "Pure-Rust Git bridge for Vox — bidirectional sync using gix (no C, no libgit2)"
version.workspace = true
edition.workspace = true

[features]
default = []
# Enable jj-lib for advanced conflict resolution during git sync.
# See src/jj_conflict.rs for usage.
jj-backend = ["dep:jj-lib"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
vox-bounded-fs = { workspace = true }
anyhow.workspace = true
tokio = { workspace = true }
# gix: pure Rust Git implementation — no C, no libgit2.
# Used for all low-level Git object / ref / transport operations.
gix = { version = "0.70", default-features = false, features = [
    "blocking-network-client",
    "blocking-http-transport-reqwest",
    "progress-tree",
    "revision",
] }
# Optional jj-lib for advanced conflict handling in git sync.
jj-lib = { version = "=0.27.0", optional = true, default-features = false }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
tokio = { workspace = true, features = ["full", "test-util"] }
tempfile = "3"

[lints]
workspace = true

