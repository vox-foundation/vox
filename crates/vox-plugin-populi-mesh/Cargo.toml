[package]
name = "vox-plugin-populi-mesh"
version = "0.1.0"
edition.workspace = true
publish = false
description = "Populi mesh transport plugin (composite: code + skill)."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vox-plugin-api = { workspace = true }
abi_stable = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
workspace-hack = { workspace = true }
hex = { workspace = true }

# Transport heavy deps (moved from vox-populi transport feature)
vox-populi = { workspace = true }
vox-secrets = { workspace = true }
vox-crypto = { workspace = true }
vox-mesh-types = { workspace = true }
vox-db = { workspace = true }
vox-bounded-fs = { workspace = true }
vox-reqwest-defaults = { workspace = true }
vox-primitives = { workspace = true }
vox-repository = { workspace = true }
axum = { workspace = true }
tower-http = { workspace = true, features = ["trace", "request-id"] }
tokio = { workspace = true, features = ["full"] }
reqwest = { workspace = true, default-features = false, features = ["json", "rustls-tls"] }
subtle = { workspace = true }
jsonwebtoken = { workspace = true }
ed25519-dalek = { workspace = true }
blake3 = { workspace = true }
data-encoding = { workspace = true }
base64 = { workspace = true }
dashmap = { workspace = true }
turso = { workspace = true }

[lints]
workspace = true
