[package]
name = "vox-distributed-training"
description = "Distributed MENS training session types: gradient shards, signed checkpoints, data-parallel scaffold (Mn-T1/Mn-T6)."
version.workspace = true
edition.workspace = true

[dependencies]
async-trait = { workspace = true }
hex = { workspace = true }
serde = { workspace = true, features = ["derive"] }
sha3 = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
uuid = { workspace = true }
vox-crypto = { workspace = true }
vox-orchestrator-queue = { workspace = true }
vox-package = { workspace = true }
vox-secrets = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }


[lints]
workspace = true
