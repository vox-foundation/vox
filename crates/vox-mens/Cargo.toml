[package]
name = "vox-mens"
version.workspace = true
edition.workspace = true
description = "Vox ML, AI, and Telemetry command-line interface."
default-run = "vox-mens"

[[bin]]
name = "vox-mens"
path = "src/main.rs"

[features]
default = ["mens-base"]
mens-base = ["dep:vox-populi"]
oratio = ["mens-base", "dep:vox-oratio"]
oratio-mic = ["oratio", "dep:cpal", "dep:hound"]
gpu = [
    "mens-base",
    "dep:vox-populi",
    "vox-populi/mens",
    "vox-populi/mens-train",
    "vox-populi/mens-hf-hub",
    "dep:vox-tensor",
    "vox-tensor/train",
    "vox-build-meta/gpu",
]
mens-qlora = ["gpu"]
mens-candle-cuda = ["gpu", "vox-populi/mens-candle-qlora-cuda", "vox-build-meta/mens-candle-cuda"]
cloud = ["gpu", "vox-populi/mens-cloud", "vox-build-meta/cloud"]
mens-dei = ["dep:vox-tensor", "vox-tensor/train", "dep:vox-orchestrator"]
workflow-runtime = ["mens-dei", "dep:vox-workflow-runtime", "vox-workflow-runtime/mens"]
populi = ["dep:vox-populi", "vox-populi/transport", "dep:blake3"]
codex = ["vox-cli/codex"]
broken_inference_stub = []
execution-api = ["dep:axum", "vox-cli/execution-api"]
database = ["vox-cli/database"]
mens = []
ars = ["vox-cli/ars"]
extras-ludus = ["vox-cli/extras-ludus"]
axum = ["dep:axum"]

[dependencies]
vox-cli = { workspace = true, features = ["coderabbit", "dei"] }
vox-compiler = { workspace = true }
vox-config = { workspace = true }
vox-db = { workspace = true }
vox-orchestrator = { workspace = true, optional = true }
vox-primitives = { workspace = true }
vox-eval = { workspace = true }
vox-search = { workspace = true }
vox-populi = { workspace = true, optional = true }
vox-tensor = { workspace = true, optional = true }
vox-oratio = { workspace = true, optional = true }
vox-workflow-runtime = { workspace = true, optional = true }
vox-build-meta = { workspace = true }
vox-clavis = { workspace = true }

clap = { workspace = true }
tokio = { workspace = true, features = ["io-std", "macros", "rt-multi-thread"] }
anyhow = { workspace = true }
tracing = { workspace = true }
tokio-stream = { version = "0.1" }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
blake3 = { workspace = true, optional = true }
cpal = { version = "0.15", optional = true }
hound = { version = "3.5", optional = true }
uuid = { version = "1.22.0", features = ["v4"] }
vox-bounded-fs.workspace = true
reqwest.workspace = true
owo-colors.workspace = true
regex.workspace = true
walkdir.workspace = true
vox-corpus.workspace = true
dialoguer = "0.12.0"
vox-runtime.workspace = true
vox-scaling-policy.workspace = true
vox-repository.workspace = true
vox-jsonschema-util.workspace = true
vox-identity.workspace = true
vox-crypto.workspace = true
vox-protocol.workspace = true
vox-publisher.workspace = true
vox-reqwest-defaults.workspace = true
sysinfo = { workspace = true }
which = { workspace = true }
base64 = { workspace = true }
windows-sys = { workspace = true, features = ["Win32_System_Threading", "Win32_Foundation"] }
vox-constrained-gen = { workspace = true }
axum = { workspace = true, optional = true }


[lints]
workspace = true
