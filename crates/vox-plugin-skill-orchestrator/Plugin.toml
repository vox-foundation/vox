[plugin]
id = "skill-orchestrator"
name = "Vox Orchestrator Skill"
version = "0.1.0"
description = "Agent-facing skill for task submission, status, budget, multi-agent coordination."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "skill"
format-version = 1
skill-md = "orchestrator.skill.md"

[plugin.payload.tools]
exposes = ["vox_orchestrator_submit", "vox_orchestrator_status", "vox_orchestrator_budget"]
