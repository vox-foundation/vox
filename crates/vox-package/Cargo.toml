[package]
name = "vox-package"
description = "Vox package manager: Vox.toml manifests, vox.lock, content-addressed artifact cache, registry client, dependency resolver."
version.workspace = true
edition.workspace = true

[features]
default = ["local"]
# File-backed and in-process databases (`Builder::new_local`).
local = ["vox-db/local"]
# Local path + remote sync (embedded replica).
replication = ["vox-db/replication"]

[dependencies]
vox-package-types = { workspace = true }
vox-db = { workspace = true }
vox-compiler = { workspace = true }
bincode = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha3 = { workspace = true }
data-encoding = { workspace = true }
thiserror = { workspace = true }
turso = { workspace = true }
tokio = { workspace = true }
toml = { workspace = true }
reqwest = { workspace = true }
vox-reqwest-defaults = { workspace = true }
glob = { workspace = true }
workspace-hack = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }


[lints]
workspace = true

