[package]
name = "vox-publisher"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Unified news syndication and publishing for vox"

[features]
default = []
scientia-reddit = []
scientia-twitter = []
scientia-linkedin = []
scientia-mastodon = []
scientia-bluesky = []
scientia-bluesky-sdk = ["dep:bsky-sdk", "dep:atrium-api"]
scientia-discord = []
scientia-opencollective = []
scientia-youtube = []
# Shared scholarly `external_submission_jobs` orchestration (CLI + MCP).
scholarly-external-jobs = [
    "dep:vox-db",
]
live-api-canary = []

[dependencies]
vox-scientia = { workspace = true }
# Phase E micro-track config — consumed by `JournalFitRecommender` to apply
# per-`FindingClass` venue routing on top of topic-overlap ranking.
vox-class-routing = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
flate2 = { workspace = true }
tar = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
anyhow = { workspace = true }
tracing = { workspace = true }
vox-forge = { path = "../vox-forge", features = ["github", "gitlab"] }
quick-xml = { workspace = true, features = ["serialize"] }
reqwest = { workspace = true, features = ["multipart"] }
vox-http-client = { workspace = true }
mime_guess = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
sha3 = { workspace = true }
regex = { workspace = true }
pulldown-cmark = { workspace = true }
vox-bounded-fs = { workspace = true }
vox-primitives = { workspace = true }
vox-secrets = { path = "../vox-secrets" }
vox-config = { path = "../vox-config" }
vox-jsonschema-util.workspace = true
unicode-segmentation = { workspace = true }
vox-db = { path = "../vox-db", optional = true }




bsky-sdk = { workspace = true, optional = true }
atrium-api = { workspace = true, optional = true }
workspace-hack = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tempfile = { workspace = true }
axum = { workspace = true, features = ["http1", "tokio", "json", "query"] }
jsonschema = { workspace = true, default-features = false }
wiremock = { workspace = true }
# Force deadpool's `rt_tokio_1` feature (see root Cargo.toml). Without it
# `cargo test` builds (which pull wiremock + deadpool transitively) hit a
# rustc-1.92 inference failure inside `deadpool::unmanaged::Pool::timeout_get`.
deadpool = { workspace = true }
