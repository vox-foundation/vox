[package]
name = "vox-publisher"
# Intentionally not `version.workspace`: publisher release line stays on 0.8.x while workspace default is 0.1.0.
version = "0.8.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Unified news syndication and publishing for vox"

[features]
default = []
scientia-reddit = []
scientia-youtube = []
# Shared scholarly `external_submission_jobs` orchestration (CLI + MCP).
scholarly-external-jobs = ["dep:vox-db"]

[dependencies]
async-trait = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
serde_json = { workspace = true }
flate2 = { version = "1", default-features = true, features = ["rust_backend"] }
tar = "0.4.45"
chrono = { workspace = true, features = ["serde"] }
anyhow = { workspace = true }
tracing = { workspace = true }
vox-forge = { path = "../vox-forge", features = ["github", "gitlab"] }
quick-xml = { version = "0.31", features = ["serialize"] }
reqwest = { workspace = true }
vox-reqwest-defaults = { workspace = true }
mime_guess = "2.0"
sha2 = { workspace = true }
sha3 = { workspace = true }
regex = { workspace = true }
pulldown-cmark = "0.13"
vox-bounded-fs = { workspace = true }
vox-primitives = { workspace = true }
vox-clavis = { path = "../vox-clavis" }
vox-db = { path = "../vox-db", optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
tempfile = { workspace = true }
axum = { version = "0.8", default-features = false, features = ["http1", "tokio", "json", "query"] }
jsonschema = { workspace = true, default-features = false }
