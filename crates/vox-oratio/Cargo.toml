[package]
name = "vox-oratio"
description = "Vox speech-to-text (Oratio) — Candle Whisper (Rust) STT and transcript refinement"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
keywords = ["vox", "speech", "stt", "whisper"]
categories = ["multimedia::audio"]

[features]
default = ["stt-candle"]
# Pure-Rust inference via Hugging Face Candle (no whisper.cpp / clang).
stt-candle = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:hf-hub",
    "dep:tokenizers",
    "dep:symphonia",
    "dep:rubato",
    "dep:rand",
    "dep:byteorder",
]
# Prefer transcript hypotheses that lex/parse/typecheck as Vox better (for speech-to-code).
compiler-rerank = ["dep:vox-compiler"]
cuda = ["candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda"]
stt-sherpa = ["dep:sherpa-rs"]

[dependencies]
anyhow = { workspace = true }
vox-compiler = { path = "../vox-compiler", optional = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
candle-core = { version = "0.9.1", optional = true }
candle-nn = { version = "0.9.1", optional = true }
candle-transformers = { version = "0.9.1", optional = true }
hf-hub = { workspace = true, optional = true }
tokenizers = { version = "0.21", optional = true }
symphonia = { version = "0.5.4", optional = true, default-features = false, features = [
    "aac",
    "alac",
    "flac",
    "mp3",
    "ogg",
    "pcm",
    "vorbis",
    "wav",
] }
rubato = { version = "0.15.0", optional = true }
rand = { version = "0.9", optional = true }
byteorder = { version = "1.5", optional = true }
uuid = { workspace = true }
tempfile = { workspace = true }
sherpa-rs = { version = "0.6", optional = true, features = ["download-binaries"] }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
