[package]
name = "vox-orchestrator"
description = "Slim coordinator for the multi-agent file-affinity router; queue/lock/oplog live in vox-orchestrator-queue, MCP tools in vox-orchestrator-mcp."
version.workspace = true
edition.workspace = true

[features]
default = [
    "toestub-gate",
    "runtime",
    "json-schema",
]
dashboard = ["dep:vox-dashboard"]
# Populi HTTP mesh client (`vox-populi` transport).
populi-transport = ["dep:vox-populi", "vox-populi/transport", "dep:aes-gcm"]
# `vox-oratio` speech-to-text / refinement tools.
oratio-rerank = ["dep:vox-oratio"]
# `vox-publisher` syndication / scientia surfaces.
news-publish = [
    "dep:vox-publisher",
    "vox-publisher/scientia-reddit",
    "vox-publisher/scientia-youtube",
    "vox-publisher/scholarly-external-jobs",
]
# JSON Schema generation for repository types (consumed by vox-orchestrator-mcp).
json-schema = ["vox-repository/json-schema"]
runtime = ["vox-actor-runtime", "vox-populi/mens"]
toestub-gate = ["vox-code-audit", "vox-lsp", "dep:tower-lsp-server", "dep:tower-lsp"]
lsp = ["dep:tower-lsp-server"]
system-metrics = ["dep:sysinfo"]
# Enable jj-lib as VCS backend. Pure Rust, no C. Pin to exact version for stability.
# All jj-lib calls are confined to src/jj_backend.rs — swap here if APIs break.
jj-backend = ["dep:jj-lib"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
vox-reqwest-defaults.workspace = true
globset = "0.4"
toml = { workspace = true }
vox-package.workspace = true
vox-gamify = { workspace = true }
dirs = { workspace = true }
parking_lot = "0.12"
futures-util = { workspace = true }
sysinfo = { version = "0.38.2", optional = true }
sha3 = { workspace = true }
xxhash-rust = { workspace = true }
hmac = "0.12.1"
sha2 = "0.10.8"
tiktoken-rs = "0.6"
hex = "0.4.3"
getrandom = "0.2"
vox-crypto.workspace = true
vox-agentos-mutation.workspace = true

# Optional dependencies behind feature flags
vox-actor-runtime = { workspace = true, optional = true }
vox-code-audit = { workspace = true, optional = true }
vox-lsp = { workspace = true, optional = true }
tower-lsp = { version = "0.20", optional = true }
tower-lsp-server = { version = "0.23", optional = true }
vox-db.workspace = true
vox-search.workspace = true
vox-orchestrator-types.workspace = true
vox-orchestrator-queue.workspace = true
vox-config.workspace = true
vox-repository.workspace = true
vox-dashboard = { workspace = true, optional = true }
vox-populi = { path = "../vox-populi", optional = true, default-features = false }
vox-publisher = { workspace = true, optional = true, default-features = false }
async-trait = "0.1.89"
anyhow.workspace = true
serde_yaml.workspace = true
vox-oratio = { workspace = true, optional = true, features = ["compiler-rerank"] }
governor = { workspace = true }
regex = "1"
vox-corpus = { workspace = true, features = ["database"] }
# jj-lib: optional VCS backend. Pure Rust (gix-backed, no C). Pinned for stability.
# See src/jj_backend.rs for the isolation wrapper. Use `--features jj-backend` to enable.
jj-lib = { version = "=0.27.0", optional = true, default-features = false }
uuid = { version = "1.22.0", features = ["v4"] }
chrono = { workspace = true }
walkdir.workspace = true
vox-bounded-fs.workspace = true
vox-protocol.workspace = true
aes-gcm = { version = "0.10.3", optional = true }
rand.workspace = true
base64.workspace = true
vox-secrets.workspace = true
vox-skill-runtime = { workspace = true }
vox-telemetry.workspace = true
vox-mesh-types.workspace = true
blake3.workspace = true
crossbeam-queue = "0.3.12"
workspace-hack = { workspace = true }
axum = { workspace = true, features = ["tokio", "http1", "json"] }
glob.workspace = true
ignore = "0.4.25"
rand_distr = "0.4"
async-stream.workspace = true
tempfile.workspace = true

# Daemon binary moved to crates/vox-orchestrator-d/ in 2026-05-08 reorg Phase 4.

[build-dependencies]
serde_yaml = { workspace = true }
serde = { workspace = true, features = ["derive"] }

[dev-dependencies]
proptest = "1.10.0"
serial_test = { workspace = true }
tempfile = { workspace = true }
vox-actor-runtime = { workspace = true }
vox-skills = { workspace = true }
axum = { workspace = true, features = ["tokio", "http1", "json"] }
tokio = { workspace = true, features = ["full", "test-util"] }
jsonschema = { workspace = true, default-features = false }
tower = { version = "0.5", features = ["util"] }

[[test]]
name = "skill_runtime_inproc"

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
# Cargo forbids selectively overriding `[lints.clippy]` while `workspace = true`.
# Duplicate the workspace rust lint above and suppress clippy in this oversized crate until
# a dedicated cleanup sprint (deploy gate runs `cargo clippy -D warnings`).
all = "allow"

