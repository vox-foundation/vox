[package]
name = "vox-orchestrator"
description = "Multi-agent file-affinity queue system for coordinating concurrent AI coding agents"
version.workspace = true
edition.workspace = true

[features]
default = [
    "toestub-gate",
    "runtime",
    "populi-transport",
    "news-publish",
    "json-schema",
    "mcp-native",
]
mcp-native = ["dep:schemars"]
# Populi HTTP mesh client (`vox-populi` transport). Disable for faster `cargo check -p vox-orchestrator --no-default-features --features runtime,toestub-gate`.
populi-transport = ["dep:vox-populi", "vox-populi/transport"]
# `vox-oratio` speech-to-text / refinement tools.
oratio-rerank = ["dep:vox-oratio"]
# `vox-publisher` syndication / scientia surfaces (`services::news`). Disable with `--no-default-features` slices.
news-publish = [
    "dep:vox-publisher",
    "vox-publisher/scientia-reddit",
    "vox-publisher/scientia-youtube",
    "vox-publisher/scholarly-external-jobs",
]
# `TaskCapabilityHints` JSON Schema for MCP tool registration (`vox-mcp` enables this).
json-schema = ["mcp-native", "vox-repository/json-schema"]
runtime = ["vox-runtime", "vox-populi/mens"]
toestub-gate = ["vox-toestub", "vox-lsp", "dep:tower-lsp-server", "dep:tower-lsp"]
lsp = ["dep:tower-lsp-server"]
system-metrics = ["dep:sysinfo"]
# Enable jj-lib as VCS backend. Pure Rust, no C. Pin to exact version for stability.
# All jj-lib calls are confined to src/jj_backend.rs — swap here if APIs break.
jj-backend = ["dep:jj-lib"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true, optional = true, features = ["derive"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
thiserror = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
vox-reqwest-defaults.workspace = true
globset = "0.4"
toml = { workspace = true }
vox-pm.workspace = true
vox-ludus = { workspace = true }
vox-skills = { workspace = true }
parking_lot = "0.12"
futures-util = { workspace = true }
sysinfo = { version = "0.38.2", optional = true }
sha3 = { workspace = true }
xxhash-rust = { workspace = true }
hmac = "0.12.1"
sha2 = "0.10.8"

# Optional dependencies behind feature flags
vox-runtime = { workspace = true, optional = true }
vox-toestub = { workspace = true, optional = true }
vox-lsp = { workspace = true, optional = true }
tower-lsp = { version = "0.20", optional = true }
tower-lsp-server = { version = "0.23", optional = true }
vox-db.workspace = true
vox-search.workspace = true
vox-config.workspace = true
vox-socrates-policy.workspace = true
vox-eval.workspace = true
vox-repository.workspace = true
vox-populi = { path = "../vox-populi", optional = true, default-features = false }
vox-publisher = { workspace = true, optional = true, default-features = false }
async-trait = "0.1.89"
anyhow.workspace = true
serde_yaml.workspace = true
vox-mcp-registry.workspace = true
vox-capability-registry.workspace = true
vox-oratio = { workspace = true, optional = true, features = ["compiler-rerank"] }
rmcp = { version = "0.16", features = ["server", "client", "transport-io"] }
axum = { version = "0.8", default-features = false, features = ["http1", "json", "tokio", "ws"] }
governor = { workspace = true }
vox-grammar-export.workspace = true
vox-browser.workspace = true
axum-extra = { version = "0.12.5", features = ["typed-header"] }
regex = "1"
vox-corpus = { workspace = true, features = ["database"] }
# jj-lib: optional VCS backend. Pure Rust (gix-backed, no C). Pinned for stability.
# See src/jj_backend.rs for the isolation wrapper. Use `--features jj-backend` to enable.
jj-lib = { version = "=0.27.0", optional = true, default-features = false }
uuid = { version = "1.22.0", features = ["v4"] }
turso.workspace = true
chrono = { workspace = true }
walkdir.workspace = true
vox-bounded-fs.workspace = true
vox-protocol.workspace = true
aes-gcm = "0.10.3"
rand.workspace = true
base64.workspace = true
vox-clavis.workspace = true
blake3.workspace = true
crossbeam-queue = "0.3.12"
workspace-hack = { workspace = true }
vox-compiler.workspace = true
glob.workspace = true
ignore = "0.4.25"
rmp-serde = { workspace = true }
vox-openai-wire.workspace = true
async-stream.workspace = true
vox-project-scaffold.workspace = true

[[bin]]
name = "vox-orchestrator-d"
path = "src/bin/vox_orchestrator_d.rs"

[dev-dependencies]
proptest = "1.10.0"
serial_test = { workspace = true }
tempfile = { workspace = true }
vox-runtime = { workspace = true }
tokio = { workspace = true, features = ["full", "test-util"] }
jsonschema = { workspace = true, default-features = false }

[lints]
workspace = true

