[plugin]
id = "tensor-burn-wgpu"
name = "Tensor Backend: Burn + wgpu"
version = "0.1.0"
description = "Generic tensor compute backend using the Burn framework with wgpu. SP7 scaffold — extraction from vox-tensor deferred."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 9

[plugin.payload.provides]
extension-points = ["TensorBackend"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_tensor_burn_wgpu.dll"
"linux-x86_64"   = "libvox_plugin_tensor_burn_wgpu.so"
"macos-aarch64"  = "libvox_plugin_tensor_burn_wgpu.dylib"
