[plugin]
id = "script-execution"
name = "Script Executor"
version = "0.1.0"
description = "ScriptExecutor plugin for sandboxed execution of .vox scripts. Used by 'vox run' and embedder APIs. SP7 scaffold — extraction from vox-eval deferred."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 8

[plugin.payload.provides]
extension-points = ["ScriptExecutor"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_script_execution.dll"
"linux-x86_64"   = "libvox_plugin_script_execution.so"
"macos-aarch64"  = "libvox_plugin_script_execution.dylib"
