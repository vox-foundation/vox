[package]
name = "vox-ml-cli"
version.workspace = true
edition.workspace = true
description = "Vox ML, AI, and Telemetry command-line interface."
default-run = "vox-ml-cli"

[[bin]]
name = "vox-ml-cli"
path = "src/main.rs"

[features]
default = ["mens-base"]
mens-base = ["dep:vox-populi", "vox-bounded-fs/async", "database"]
oratio = ["mens-base", "dep:vox-oratio", "vox-oratio/serve", "dep:vox-plugin-host"]
oratio-mic = ["oratio", "dep:cpal", "dep:hound"]
gpu = [
    "mens-base",
    "dep:vox-populi",
    "vox-populi/mens",
    "vox-populi/mens-train",
    "vox-populi/mens-hf-hub",
    "dep:vox-tensor",
    "dep:vox-plugin-host",
]
mens-qlora = ["gpu"]
mens-candle-cuda = ["gpu", "vox-populi/mens-candle-qlora-cuda"]
cloud = ["gpu", "vox-populi/mens-cloud"]
mens-dei = ["dep:vox-tensor", "dep:vox-orchestrator", "dep:vox-cli"]
workflow-runtime = ["mens-dei", "dep:vox-workflow-runtime", "vox-workflow-runtime/mens"]
populi = ["dep:vox-populi", "vox-populi/transport", "dep:blake3"]
codex = []
broken_inference_stub = []
execution-api = ["dep:axum"]
database = ["vox-corpus/database"]
mens = []
ars = []
extras-ludus = []
axum = ["dep:axum"]

[dependencies]
vox-cli = { workspace = true, optional = true }
vox-cli-core = { workspace = true }
vox-config = { workspace = true }
vox-mesh-types = { workspace = true }
vox-compiler = { workspace = true }
vox-db = { workspace = true }
vox-orchestrator = { workspace = true, optional = true }
vox-foundation = { workspace = true }
vox-eval = { workspace = true }
vox-populi = { workspace = true, optional = true }
vox-tensor = { workspace = true, optional = true }
vox-oratio = { workspace = true, optional = true, features = ["compiler-rerank"] }
vox-plugin-host = { workspace = true, optional = true }
vox-workflow-runtime = { workspace = true, optional = true }
vox-secrets = { workspace = true }

clap = { workspace = true }
tokio = { workspace = true, features = ["io-std", "macros", "rt-multi-thread"] }
anyhow = { workspace = true }
tracing = { workspace = true }
tokio-stream = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
blake3 = { workspace = true, optional = true }
cpal = { workspace = true, optional = true }
hound = { workspace = true, optional = true }
uuid = { workspace = true, features = ["v4"] }
vox-bounded-fs.workspace = true
reqwest.workspace = true
owo-colors.workspace = true
regex.workspace = true
walkdir.workspace = true
vox-corpus.workspace = true
dialoguer = { workspace = true }
vox-actor-runtime.workspace = true
vox-scaling-policy.workspace = true
vox-repository.workspace = true
vox-jsonschema-util.workspace = true
vox-crypto.workspace = true
vox-http-client.workspace = true
sysinfo = { workspace = true }
which = { workspace = true }
base64 = { workspace = true }
hex = { workspace = true }
windows-sys = { workspace = true, features = ["Win32_System_Threading", "Win32_Foundation"] }
vox-constrained-gen = { workspace = true }
axum = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
