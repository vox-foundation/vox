[package]
name = "vox-tensor"
version.workspace = true
edition.workspace = true

[features]
default = []
gpu = ["dep:burn"]
train = ["gpu"]
lstm = ["gpu"]

[dependencies]
burn = { workspace = true, optional = true, features = ["wgpu", "autodiff", "train"] }
vox-compiler = { workspace = true }
vox-runtime = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
workspace-hack = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

# Burn is available in tests via the 'gpu' feature (declared optional in [dependencies]).
# Run GPU/Burn tests with: cargo test -p vox-tensor --features gpu
