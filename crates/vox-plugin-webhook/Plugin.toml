[plugin]
id = "webhook"
name = "Vox Webhook Gateway"
version = "0.1.0"
description = "Inbound webhook HTTP listener with HMAC signature verification (GitHub, GitLab, generic)."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 12

[plugin.payload.provides]
extension-points = ["HttpListener"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_webhook.dll"
"linux-x86_64"   = "libvox_plugin_webhook.so"
"macos-aarch64"  = "libvox_plugin_webhook.dylib"
