[plugin]
id = "grammar-export"
name = "Grammar Export"
version = "0.1.0"
description = "Export Vox grammar in Lark, EBNF, JSON Schema, XGrammar-2, and SSOT-Markdown formats."

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 12

[plugin.payload.provides]
extension-points = ["GrammarExport"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_grammar_export.dll"
"linux-x86_64"   = "libvox_plugin_grammar_export.so"
"macos-aarch64"  = "libvox_plugin_grammar_export.dylib"
