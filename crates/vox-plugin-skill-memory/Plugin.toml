[plugin]
id = "skill-memory"
name = "Vox Memory Skill"
version = "0.1.0"
description = "Agent-facing skill for memory and context management."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "skill"
format-version = 1
skill-md = "memory.skill.md"

[plugin.payload.tools]
exposes = ["vox_memory_get", "vox_memory_set", "vox_memory_search"]
