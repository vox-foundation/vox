[package]
name = "vox-plugin-oratio"
version = "0.1.0"
edition.workspace = true
publish = false
description = "Speech-to-text plugin: Candle Whisper backend extracted from vox-oratio."

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["stt-candle"]
# Pure-Rust Candle Whisper inference (HF Hub weights).
stt-candle = [
    "dep:candle-core",
    "dep:candle-nn",
    "dep:candle-transformers",
    "dep:hf-hub",
    "dep:tokenizers",
    "dep:symphonia",
    "dep:rubato",
    "dep:rand",
    "dep:byteorder",
]
# CUDA acceleration (opt-in).
cuda = ["candle-core/cuda", "candle-nn/cuda", "candle-transformers/cuda"]

[dependencies]
vox-plugin-api = { workspace = true }
abi_stable = { workspace = true }
vox-secrets = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
tempfile = { workspace = true }

# Heavy STT deps — pulled in only when stt-candle feature is enabled
candle-core         = { workspace = true, optional = true }
candle-nn           = { workspace = true, optional = true }
candle-transformers = { workspace = true, optional = true }
hf-hub        = { workspace = true, optional = true }
tokenizers    = { workspace = true, optional = true }
symphonia     = { version = "0.5.4", optional = true, default-features = false, features = [
    "aac", "alac", "flac", "mp3", "ogg", "pcm", "vorbis", "wav",
] }
rubato        = { version = "0.15.0", optional = true }
rand          = { version = "0.9", optional = true }
byteorder     = { version = "1.5", optional = true }
workspace-hack = { workspace = true }

[lints]
workspace = true
