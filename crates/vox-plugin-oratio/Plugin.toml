[plugin]
id = "oratio"
name = "Oratio Speech-to-Code"
version = "0.1.0"
description = "AudioCapture plugin for the Oratio speech-to-code pipeline. SP7 scaffold — extraction from vox-oratio deferred."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 7

[plugin.payload.provides]
extension-points = ["AudioCapture"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_oratio.dll"
"linux-x86_64"   = "libvox_plugin_oratio.so"
"macos-aarch64"  = "libvox_plugin_oratio.dylib"
