[plugin]
id = "oratio"
name = "Oratio Speech-to-Code"
version = "0.1.0"
description = "Audio capture + speech-to-text (Candle Whisper). Extracted from vox-oratio in Unit 4."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 10

[plugin.payload.provides]
extension-points = ["AudioCapture", "SpeechToText"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_oratio.dll"
"linux-x86_64"   = "libvox_plugin_oratio.so"
"macos-aarch64"  = "libvox_plugin_oratio.dylib"
