[package]
name = "vox-repository"
description = "Repository discovery, stable identity, layout probes, and agent scope helpers for external and internal Vox workspaces"
version.workspace = true
edition.workspace = true

[dependencies]
blake3 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
thiserror = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
vox-bounded-fs = { workspace = true }
schemars = { workspace = true, optional = true }
nvml-wrapper = { workspace = true, optional = true }
regex = { workspace = true }
glob = { workspace = true }
walkdir = { workspace = true }
workspace-hack = { workspace = true }

[features]
default = []
json-schema = ["dep:schemars"]
# NVIDIA NVML probe for Populi Layer A GPU fields (`NodeRecord` heartbeat/join).
nvml-probe = ["dep:nvml-wrapper"]

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
