[package]
name = "vox-search"
description = "Shared local-first retrieval execution: memory hybrid, repo inventory, Codex chunks, policy, and optional lexical/vector backends"
version.workspace = true
edition.workspace = true

[features]
default = ["tantivy-lexical", "qdrant-vector", "tavily"]
tantivy-lexical = ["dep:tantivy"]
qdrant-vector = ["dep:reqwest"]
tavily = ["dep:tavily"]

[dependencies]
anyhow = { workspace = true }
urlencoding = "2"
vox-db = { workspace = true, features = ["local"] }
vox-runtime = { workspace = true }
vox-bounded-fs = { workspace = true }
vox-clavis = { workspace = true }
vox-config = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
regex = { workspace = true }
walkdir = { workspace = true }
tracing = { workspace = true }
blake3 = { workspace = true }
tantivy = { workspace = true, optional = true, default-features = true }
reqwest = { workspace = true, optional = true }
scraper = { workspace = true }
html2text = { workspace = true }
workspace-hack = { workspace = true }
tavily = { version = "2.1.0", optional = true }

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }

[lints]
workspace = true
