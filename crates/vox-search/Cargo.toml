[package]
name = "vox-search"
description = "Shared local-first retrieval execution: memory hybrid, repo inventory, document chunks (RAG), policy, and optional lexical/vector backends"
version.workspace = true
edition.workspace = true

[features]
# Heavy lexical / scraping stacks are opt-in per consumer (`vox-cli`, `vox-orchestrator`, …).
default = ["qdrant-vector", "tavily"]
tantivy-lexical = ["dep:tantivy"]
web-scrape = ["dep:scraper", "dep:html2text"]
qdrant-vector = []
tavily = ["dep:tavily"]

[dependencies]
anyhow = { workspace = true }
urlencoding = { workspace = true }
vox-db = { workspace = true, features = ["local"] }
vox-actor-runtime = { workspace = true }
vox-bounded-fs = { workspace = true }
vox-secrets = { workspace = true }
vox-config = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
regex = { workspace = true }
walkdir = { workspace = true }
tracing = { workspace = true }
blake3 = { workspace = true }
tantivy = { workspace = true, optional = true, default-features = true }
reqwest = { workspace = true }
scraper = { workspace = true, optional = true }
html2text = { workspace = true, optional = true }
workspace-hack = { workspace = true }
tavily = { workspace = true, optional = true }

[dev-dependencies]
serde_json = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
wiremock = { workspace = true }

[lints]
workspace = true
