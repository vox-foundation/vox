[package]
name = "vox-cli"
version.workspace = true
edition.workspace = true
# `cargo run -p vox-cli` without `--bin` (binaries: `vox`, `vox-compilerd`, `vox-populi` when `populi-base`).
default-run = "vox"

[[bin]]
name = "vox"
path = "src/main.rs"

[[bin]]
name = "vox-compilerd"
path = "src/bin/vox-compilerd.rs"

# Thin entrypoint: `vox-populi train` ≡ `vox populi train` (inserts the `populi` subcommand).
[[bin]]
name = "vox-populi"
path = "src/bin/vox-populi.rs"
required-features = ["populi-base"]

[features]
default = ["populi-base"]
# Corpus paths, `train-uv`, plan (daemon), status, eval-gate, bench-completion, system-prompt-template.
# Does **not** include Oratio (Candle Whisper stack) — use `populi-oratio` for `vox populi oratio`.
populi-base = []
# Enables Arca telemetry replay and persistent DB features (shared with vox-corpus).
database = ["vox-corpus/database"]
# Speech-to-text (`vox populi oratio`); pulls heavy `vox-oratio` / Candle deps.
populi-oratio = ["populi-base", "dep:vox-oratio"]
# Native Burn LoRA training + HF metadata (`vox populi train`, probe, merge-weights, eval-local).
gpu = [
    "populi-base",
    "dep:vox-populi",
    "dep:vox-tensor",
    "vox-populi/train",
    "vox-populi/hf-hub",
    "vox-tensor/train",
]
# Back-compat alias: `gpu` already enables `vox-populi/candle-qlora` (native `--backend qlora`).
populi-qlora = ["gpu"]
# Candle qlora on NVIDIA CUDA (requires CUDA toolkit when compiling `candle-core`).
populi-candle-cuda = ["gpu", "vox-populi/candle-qlora-cuda"]
# Candle qlora on Apple Metal (macOS only).
populi-candle-metal = ["gpu", "vox-populi/candle-qlora-metal"]
# Inline `vox run` script compilation (native / WASI + Wasmtime) and OS sandbox helpers.
script-execution = [
    "dep:dirs",
    "dep:twox-hash",
    "dep:which",
    "dep:wasmtime",
    "dep:wasmtime-wasi",
    "dep:landlock",
    "dep:win32job",
]
# Axum inference server (`vox populi serve`) + REST execution API; implies `script-execution`.
execution-api = ["script-execution", "gpu", "dep:axum", "dep:tokio-stream"]
# TOESTUB + `commands::diagnostics` (`vox stub-check` shim, architect/clean/compact, Codex persistence in stub_check).
stub-check = [
    "dep:vox-toestub",
    "dep:toml",
    "dep:dirs",
    "dep:vox-ludus",
]
# No-op reserved flag: legacy `vox populi` agent/dei/chat/learn and `runtime/info/status` referred to excluded `vox-dei`.
# Dashboard: `cargo run -p vox-codex-api --bin vox-codex-dashboard` and the VS Code extension (see `docs/src/ref-cli.md`).
dashboard = []
# Pulls `vox-ars` + `vox-skills` for OpenClaw / skill registry (`openclaw`, ARS extras).
ars = ["dep:vox-ars", "dep:vox-skills"]
# Ludus gamification CLI (`commands::extras::ludus`); implies `vox-ludus` (uses `vox-db`).
extras-ludus = ["dep:vox-ludus", "dep:vox-toestub"]
# Terminal live event dashboard: `vox live` + `commands::live` (in-process `vox-orchestrator` demo bus).
live = ["dep:vox-orchestrator"]
# BYOK / config slices in `populi status`, extended `vox doctor`, scope checks (`vox_eval`).
codex = [
    "dep:dirs",
    "dep:walkdir",
    "dep:vox-eval",
]
# Extended DeI surfaces: generate, review, workflow, check, fix (`vox populi …`).
# Pulls `vox-tensor` for the legacy in-process dogfood trainer (`crate::training::native`).
populi-dei = ["dep:vox-tensor", "vox-tensor/train"]
# GitHub CodeRabbit batch PRs (`vox review coderabbit …`).
coderabbit = [
    "dep:vox-forge",
    "dep:vox-git",
    "dep:blake3",
    "dep:walkdir",
    "dep:toml",
    "dep:vox-toestub",
]
# v0.dev React islands: `vox island generate|upgrade|list|add|cache` (`islands/`, `V0_API_KEY`).
island = ["dep:comfy-table", "dep:dirs", "dep:walkdir", "dep:which"]
# Local mesh registry + `vox mesh status|serve` (`vox-mesh` / optional HTTP control plane).
mesh = ["dep:vox-mesh", "vox-mesh/transport"]
# Interpreted `vox populi workflow run` (journal + mesh activities); implies mesh hooks.
workflow-runtime = ["populi-dei", "dep:vox-workflow-runtime", "vox-workflow-runtime/mesh"]

[dependencies]
vox-lexer = { workspace = true }
vox-ast = { workspace = true }
vox-parser = { workspace = true }
vox-hir = { workspace = true }
vox-typeck = { workspace = true }
vox-codegen-ts = { workspace = true }
vox-codegen-rust = { workspace = true }
vox-ssg = { workspace = true }
clap = { workspace = true }
clap_complete = { workspace = true }
miette = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
reqwest = { workspace = true, features = ["multipart"] }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
jsonschema = { workspace = true }
sha2 = "0.10"
tokio = { workspace = true }
base64 = { workspace = true }
vox-pm = { workspace = true }
vox-ars = { workspace = true, optional = true }
vox-skills = { workspace = true, optional = true }
vox-ludus = { workspace = true, optional = true }
vox-config = { workspace = true }
vox-db = { path = "../vox-db" }
vox-doc-inventory = { path = "../vox-doc-inventory" }
vox-toestub = { workspace = true, optional = true }
toml = { workspace = true, optional = true }
vox-orchestrator = { workspace = true, optional = true }
vox-mesh = { workspace = true, optional = true }
vox-workflow-runtime = { workspace = true, optional = true }
vox-repository = { workspace = true }
turso = { workspace = true }
logos = { workspace = true }
owo-colors = { workspace = true }
comfy-table = { workspace = true, optional = true }
chrono = { workspace = true }
regex = { workspace = true }
glob = { workspace = true }
vox-corpus = { workspace = true }
vox-populi = { workspace = true, optional = true, default-features = false }
vox-tensor = { workspace = true, optional = true }
vox-runtime = { workspace = true }
vox-oratio = { workspace = true, optional = true }
uuid = { version = "1", features = ["v4"] }
notify = "7"
axum = { version = "0.8", optional = true }
tokio-stream = { version = "0.1", optional = true }
dirs = { version = "6", optional = true }
walkdir = { version = "2", optional = true }
vox-eval = { workspace = true, optional = true }
vox-forge = { workspace = true, optional = true, features = ["github"] }
vox-git = { workspace = true, optional = true }
blake3 = { workspace = true, optional = true }
twox-hash = { version = "2", optional = true }
which = { version = "8", optional = true }
wasmtime = { version = "42.0.1", optional = true }
wasmtime-wasi = { version = "42.0.1", optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
landlock = { version = "0.4.4", optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
win32job = { version = "2", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = ["Win32_System_Threading"] }

[dev-dependencies]
safetensors = { workspace = true }
tempfile = { workspace = true }
vox-orchestrator = { workspace = true }

[[test]]
name = "live_feature_wiring"
path = "tests/live_feature_wiring.rs"
required-features = ["live"]

[[test]]
name = "run_mode_dispatch"
path = "tests/run_mode_dispatch.rs"
required-features = ["script-execution"]

[[test]]
name = "workflow_mesh_golden"
path = "tests/workflow_mesh_golden.rs"
required-features = ["workflow-runtime"]

[lints]
workspace = true
