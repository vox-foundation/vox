[package]
name = "vox-gui"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Native Tauri GUI for Vox"
build = "build.rs"

[features]
gui = []
default = ["gui"]

[dependencies]
vox-cli = { workspace = true }
vox-orchestrator = { workspace = true }
serde_json = { workspace = true }
serde = { workspace = true }
tauri = { version = "2" }
tauri-plugin-shell = { version = "2" }

[build-dependencies]
vox-build-meta = { workspace = true }
tauri-build = { version = "2", features = [] }
