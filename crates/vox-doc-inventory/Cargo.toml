[package]
name = "vox-doc-inventory"
description = "Generate and verify docs/agents/doc-inventory.json (schema v3) without Python."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
vox-build-meta = { workspace = true }
anyhow.workspace = true
vox-repository = { workspace = true }
chrono = { workspace = true, default-features = false, features = ["clock", "std"] }
regex.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
walkdir = "2"
vox-bounded-fs = { workspace = true }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[[bin]]
name = "doc-inventory-generate"
path = "src/bin/doc-inventory-generate.rs"

# Naming-parity alias for the same entrypoint (prefer in new docs/scripts).
[[bin]]
name = "vox-doc-inventory-generate"
path = "src/bin/vox-doc-inventory-generate.rs"

[lints]
workspace = true
