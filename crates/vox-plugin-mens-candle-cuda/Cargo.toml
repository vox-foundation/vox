[package]
name = "vox-plugin-mens-candle-cuda"
version = "0.1.0"
edition.workspace = true
publish = false
description = "ML training backend plugin: Candle + CUDA. Implements MlBackend."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
vox-plugin-api = { workspace = true }
vox-tensor = { workspace = true }
vox-db = { workspace = true }
vox-clavis = { workspace = true }
vox-eval = { workspace = true }
vox-compiler = { workspace = true }
abi_stable = { workspace = true }
candle-core = { workspace = true }
candle-nn = { workspace = true }

qlora-rs = { workspace = true }
peft-rs = { workspace = true }
safetensors = { workspace = true }
tokenizers = { workspace = true }
memmap2 = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
ctrlc = { workspace = true }
owo-colors = { workspace = true }
rand = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "sync"] }

[features]
default = []
# Opt-in CUDA kernel compilation. Requires working nvcc + MSVC toolchain.
# Without this feature, the plugin compiles against CPU candle and GPU-only
# ops return a clear runtime error.
cuda = ["candle-core/cuda", "candle-nn/cuda"]

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
