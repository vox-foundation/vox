[package]
name = "vox-openclaw-runtime"
version = "0.1.0"
edition.workspace = true
license.workspace = true
authors.workspace = true
publish = false
description = "OpenClaw client + ARS runtime adapter, executor, context bundles, hooks. Extracted from vox-skills::ars_shim."

[dependencies]
vox-plugin-host = { workspace = true }
vox-db       = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
tokio        = { workspace = true }
reqwest      = { workspace = true }
vox-reqwest-defaults = { workspace = true }
anyhow       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
toml         = { workspace = true }
sha3         = { workspace = true }
data-encoding = { workspace = true }
uuid         = { workspace = true, features = ["v4", "serde"] }
async-trait  = { workspace = true }
futures-util = { workspace = true }
tokio-tungstenite = { workspace = true, default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
semver       = { workspace = true }
vox-clavis.workspace = true
secrecy      = { workspace = true }
workspace-hack = { workspace = true }

[lints]
workspace = true
