[package]
name = "vox-workflow-runtime"
description = "Interpreted workflow execution MVP (local + mens activity hooks)"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["mens"]
mens = ["dep:vox-populi", "vox-populi/transport"]

[dependencies]
anyhow = { workspace = true }
base64 = "0.22"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
vox-compiler = { workspace = true }
vox-db = { workspace = true }
vox-populi = { workspace = true, optional = true }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[dev-dependencies]
vox-compiler = { workspace = true }
jsonschema = { workspace = true, default-features = false, features = ["resolve-file"] }

[lints]
workspace = true
