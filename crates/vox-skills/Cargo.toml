[package]
name = "vox-skills"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Skill marketplace and plugin architecture for the Vox agent system"

[dependencies]
vox-db       = { workspace = true }
vox-pm       = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
tokio        = { workspace = true }
reqwest      = { workspace = true }
vox-reqwest-defaults = { workspace = true }
anyhow       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
toml         = { workspace = true }
sha3         = { workspace = true }
data-encoding = { workspace = true }
uuid         = { workspace = true, features = ["v4", "serde"] }
async-trait  = { workspace = true }
futures-util = { workspace = true }
tokio-tungstenite = { workspace = true, default-features = false, features = ["connect", "rustls-tls-webpki-roots"] }
semver       = { workspace = true }
vox-container = { workspace = true }
vox-clavis.workspace = true
secrecy      = { workspace = true }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[features]
default = []
# Enable the Vox Skills registry bridge (makes HTTP calls to the registry)
skills-registry = []

[lints]
workspace = true

[dev-dependencies]
# dev dependencies

