[package]
name = "vox-skills"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description = "Skill marketplace and plugin architecture for the Vox agent system"

[dependencies]
vox-plugin-host = { workspace = true }
vox-ars-runtime = { workspace = true }
vox-db       = { workspace = true }
vox-pm       = { workspace = true }
serde        = { workspace = true }
serde_json   = { workspace = true }
tokio        = { workspace = true }
reqwest      = { workspace = true }
vox-reqwest-defaults = { workspace = true }
anyhow       = { workspace = true }
thiserror    = { workspace = true }
tracing      = { workspace = true }
toml         = { workspace = true }
uuid         = { workspace = true, features = ["v4", "serde"] }
vox-container = { workspace = true }
vox-skill-runtime = { workspace = true }
workspace-hack = { workspace = true }

[features]
default = []
# Enable the Vox Skills registry bridge (makes HTTP calls to the registry)
skills-registry = []

[lints]
workspace = true

