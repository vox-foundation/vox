[plugin]
id = "browser"
name = "Browser Automation (CDP)"
version = "0.1.0"
description = "Chrome DevTools Protocol browser automation via chromiumoxide."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 9

[plugin.payload.provides]
extension-points = ["BrowserAutomation"]

[plugin.payload.requires]
os = ["windows", "linux", "macos"]
arch = ["x86_64", "aarch64"]
native-libs = []

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_browser.dll"
"linux-x86_64" = "libvox_plugin_browser.so"
"macos-aarch64" = "libvox_plugin_browser.dylib"
