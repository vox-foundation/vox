[package]
name = "vox-orchestrator-mcp"
description = "MCP (Model Context Protocol) tool layer for vox-orchestrator. Extracted in 2026-05-08 reorg Phase 4."
version.workspace = true
edition.workspace = true

[features]
default = ["news-publish", "toestub-gate", "json-schema"]
# Mirrors the parent orchestrator features. The crate is always compiled with
# axum/rmcp/schemars (mcp-native is the whole point), so those are not optional.
news-publish = [
    "dep:vox-publisher",
    "vox-publisher/scientia-reddit",
    "vox-publisher/scientia-youtube",
    "vox-publisher/scholarly-external-jobs",
]
toestub-gate = ["vox-orchestrator/toestub-gate"]
json-schema = ["vox-orchestrator/json-schema"]
populi-transport = ["vox-orchestrator/populi-transport"]
oratio-rerank = ["dep:vox-oratio"]

[dependencies]
vox-orchestrator = { path = "../vox-orchestrator", default-features = false, features = ["runtime"] }

# MCP-stack deps (always compiled when this crate is in the build)
axum = { version = "0.8", default-features = false, features = ["http1", "json", "tokio", "ws"] }
axum-extra = { version = "0.12.5", features = ["typed-header"] }
rmcp = { version = "0.16", features = ["server", "client", "transport-io"] }
schemars = { workspace = true, features = ["derive"] }
tower-http = { workspace = true, features = ["cors"] }

# Workspace deps the moved code references
vox-compiler.workspace = true
vox-grammar-export.workspace = true
vox-mcp-registry.workspace = true
vox-capability-registry.workspace = true
vox-openai-wire.workspace = true
vox-project-scaffold.workspace = true
vox-skills.workspace = true
vox-openclaw-runtime.workspace = true
vox-plugin-host.workspace = true
vox-plugin-types.workspace = true
vox-orchestrator-types.workspace = true
vox-db.workspace = true
vox-search.workspace = true
vox-config.workspace = true
vox-repository = { workspace = true, features = ["json-schema"] }
vox-package.workspace = true
vox-gamify.workspace = true
vox-corpus = { workspace = true, features = ["database"] }
vox-secrets.workspace = true
vox-bounded-fs.workspace = true
vox-protocol.workspace = true
vox-mesh-types.workspace = true
vox-crypto.workspace = true
vox-actor-runtime.workspace = true
vox-code-audit.workspace = true
vox-lsp.workspace = true
vox-populi = { workspace = true }
tower-lsp = "0.20"
tower-lsp-server = "0.23"
vox-reqwest-defaults.workspace = true
vox-publisher = { workspace = true, optional = true, default-features = false }
vox-oratio = { workspace = true, optional = true, features = ["compiler-rerank"] }

# Standard deps
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml.workspace = true
toml = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
async-trait = "0.1.89"
anyhow.workspace = true
futures-util = { workspace = true }
async-stream.workspace = true
parking_lot = "0.12"
chrono = { workspace = true }
uuid = { version = "1.22.0", features = ["v4"] }
regex = "1"
glob.workspace = true
ignore = "0.4.25"
walkdir.workspace = true
sha2 = "0.10.8"
sha3 = { workspace = true }
hex = "0.4.3"
hmac = "0.12.1"
blake3.workspace = true
base64.workspace = true
rand.workspace = true
governor = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
tempfile.workspace = true
xxhash-rust = { workspace = true }
tiktoken-rs = "0.6"
dirs = { workspace = true }
crossbeam-queue = "0.3.12"
globset = "0.4"
workspace-hack = { workspace = true }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
serial_test.workspace = true
jsonschema.workspace = true

[lints.rust]
unsafe_code = "warn"

[lints.clippy]
all = "allow"
