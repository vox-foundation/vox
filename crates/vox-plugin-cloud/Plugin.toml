[plugin]
id = "cloud"
name = "Cloud Sync"
version = "0.1.0"
description = "CloudSync plugin for syncing model artifacts with HF Hub, S3, and other providers. SP7 scaffold — extraction from cloud integration code deferred."
license = "Apache-2.0"

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 9

[plugin.payload.provides]
extension-points = ["CloudSync"]

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_cloud.dll"
"linux-x86_64"   = "libvox_plugin_cloud.so"
"macos-aarch64"  = "libvox_plugin_cloud.dylib"
