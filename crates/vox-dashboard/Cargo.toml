[package]
name = "vox-dashboard"
description = "Local Axum-served orchestration dashboard (SPA host)"
version.workspace = true
edition.workspace = true

[features]
default = []
# embed built SPA dist/ bytes into binary; disable for dev (Vite serves separately)
embedded-assets = ["dep:include_dir"]

[dependencies]
axum = { workspace = true, features = ["http1", "json", "tokio"] }
tokio = { workspace = true }
tower-http = { workspace = true, features = ["fs", "cors"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
workspace-hack = { workspace = true }
include_dir = { version = "0.7", optional = true }
mime_guess = { workspace = true }
