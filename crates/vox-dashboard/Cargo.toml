[package]
name = "vox-dashboard"
description = "Local Axum-served orchestration dashboard (SPA host)"
version.workspace = true
edition.workspace = true
build = "build.rs"

[features]
default = []
# embed built SPA dist/ bytes into binary; disable for dev (Vite serves separately)
embedded-assets = ["dep:include_dir"]

[dependencies]
axum = { workspace = true, features = ["http1", "json", "tokio"] }
tokio = { workspace = true }
tower-http = { workspace = true, features = ["fs", "cors"] }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
anyhow = { workspace = true }
workspace-hack = { workspace = true }
include_dir = { version = "0.7", optional = true }
mime_guess = { workspace = true }
const-fnv1a-hash = "1.1.0"
# Live mesh state + event bus (Phase 4)
vox-orchestrator = { path = "../vox-orchestrator" }
# QR code SVG generation for the Add-a-Node wizard (P4-T2)
qrcode = "0.14"
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
tower = { version = "0.5", features = ["util"] }
tokio = { workspace = true }
# Serializes tests that mutate process-wide env vars (env::set_var is unsafe in
# Rust 2024 and races with parallel test threads).
serial_test = "3"
