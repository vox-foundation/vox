[plugin]
id = "noop-bad-abi"
name = "Noop Bad ABI"
version = "0.1.0"
description = "Test fixture: a code plugin with a deliberately wrong ABI version for rejection tests."

[plugin.host]
min-vox-version = "0.5.0"

[plugin.payload]
kind = "code"
abi-version = 1

[plugin.payload.provides]
extension-points = []

[plugin.payload.artifacts]
"windows-x86_64" = "vox_plugin_noop_code_bad_abi.dll"
"linux-x86_64"   = "libvox_plugin_noop_code_bad_abi.so"
"macos-aarch64"  = "libvox_plugin_noop_code_bad_abi.dylib"
