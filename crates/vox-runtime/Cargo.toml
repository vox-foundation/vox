[package]
name = "vox-runtime"
version.workspace = true
edition.workspace = true

[features]
default = []
## Enables [`crate::db`] — global **Codex** (`vox_db::VoxDb`) connection using `VOX_DB_*` (canonical) with legacy `TURSO_*` fallback.
database = ["dep:vox-db"]

[dependencies]
tokio = { workspace = true }
tokio-stream = { workspace = true }
async-stream = { workspace = true }
vox-openai-sse = { workspace = true }
vox-openai-wire = { workspace = true }
futures-util = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
vox-config = { path = "../vox-config" }
vox-primitives = { path = "../vox-primitives" }
vox-clavis = { workspace = true }
vox-socrates-policy = { workspace = true }
vox-browser = { path = "../vox-browser" }
vox-skills = { path = "../vox-skills" }
vox-db = { path = "../vox-db", optional = true }
reqwest = { workspace = true, features = ["stream"] }
vox-reqwest-defaults = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
glob = { workspace = true }
which = "8"
xxhash-rust = { workspace = true }
blake3 = { workspace = true }
rust_decimal = { workspace = true }
workspace-hack = { version = "0.1", path = "../workspace-hack" }

[lints]
workspace = true

