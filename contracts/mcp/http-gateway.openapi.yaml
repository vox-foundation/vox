openapi: 3.0.3
info:
  title: Vox MCP HTTP Gateway API
  description: |
    Optional bounded HTTP/WebSocket gateway exposed by `vox-mcp` when `VOX_MCP_HTTP_ENABLED=1`.
    This surface is intended for remote/mobile control of a host running the Vox workspace and
    toolchain, with auth/rate-limit/allowlist guardrails.
    Auth can be configured with a write token (`VOX_MCP_HTTP_BEARER_TOKEN`) and optional read token
    (`VOX_MCP_HTTP_READ_BEARER_TOKEN`) where read role visibility comes from MCP registry
    metadata (`http_read_role_eligible`) intersected with `VOX_MCP_HTTP_ALLOWED_TOOLS`, plus
    optional narrowing via `VOX_MCP_HTTP_READ_ROLE_ALLOWED_TOOLS`.
    Cloudless hard-cut target is Clavis-managed token resolution, with direct env token reads
    retained only as compatibility inputs in non-strict profiles during cutover.
  version: 1.0.0
servers:
  - url: http://127.0.0.1:3921
    description: Default local MCP gateway (`VOX_MCP_HTTP_HOST` / `VOX_MCP_HTTP_PORT`)
paths:
  /health:
    get:
      summary: Gateway liveness check
      responses:
        "200":
          description: Gateway process is reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "401":
          description: Unauthorized (when `VOX_MCP_HTTP_HEALTH_AUTH=1`)
        "429":
          description: Rate limit exceeded
  /v1/info:
    get:
      summary: Gateway runtime policy snapshot
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Policy and allowlist details
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                  bind_host:
                    type: string
                  bind_port:
                    type: integer
                  auth_required:
                    type: boolean
                  require_forwarded_https:
                    type: boolean
                  allowed_tools:
                    type: array
                    items:
                      type: string
                  read_role_allowed_tools:
                    type: array
                    description: Effective read-role tool set after metadata/env/global-allowlist intersections.
                    items:
                      type: string
                  calls_per_minute:
                    type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forwarded HTTPS requirement failed
        "429":
          description: Rate limit exceeded
  /v1/tools:
    get:
      summary: List allowlisted tools and input schemas
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tool descriptors
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  tools:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        description:
                          type: string
                        input_schema:
                          type: object
                        product_lane:
                          type: string
                          nullable: true
        "401":
          description: Unauthorized
        "403":
          description: Forwarded HTTPS requirement failed
        "429":
          description: Rate limit exceeded
  /v1/tools/call:
    post:
      summary: Invoke an allowlisted tool
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                args:
                  type: object
      responses:
        "200":
          description: Tool result envelope
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  is_error:
                    type: boolean
                  result:
                    type: object
        "401":
          description: Unauthorized
        "403":
          description: Forwarded HTTPS requirement failed
        "429":
          description: Rate limit exceeded
  /v1/ws:
    get:
      summary: WebSocket session for bounded tool operations
      description: |
        Upgrades to WebSocket. Accepted message types:
        - `list_tools`
        - `call_tool`
      security:
        - bearerAuth: []
      responses:
        "101":
          description: Switching Protocols
        "401":
          description: Unauthorized
        "403":
          description: Forwarded HTTPS requirement failed
        "429":
          description: Rate limit exceeded
  /v1/mobile:
    get:
      summary: Minimal phone-oriented workspace UI
      security:
        - bearerAuth: []
      responses:
        "200":
          description: HTML app
          content:
            text/html:
              schema:
                type: string
        "401":
          description: Unauthorized
        "403":
          description: Forwarded HTTPS requirement failed
        "429":
          description: Rate limit exceeded
  /v1/mobile/status:
    get:
      summary: Aggregated lightweight status for mobile UI
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Git/orchestrator snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  git_status:
                    type: object
                  orchestrator_status:
                    type: object
        "401":
          description: Unauthorized
        "403":
          description: Forwarded HTTPS requirement failed
        "429":
          description: Rate limit exceeded
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
