# Template ids crossed with each workspace crate to build the scaling backlog (see vox ci scaling-audit emit-reports).
schema_version: 1
categories:
  - id: async-io
    pattern: scaling/blocking-in-async
    impact: latency_under_load
    risk: medium
    title: "Replace blocking filesystem I/O in async surfaces with `tokio::fs` or `spawn_blocking`"
    verification: "cargo test -p {crate}; measure p99 under concurrent load"
  - id: memory-slurp
    pattern: scaling/unbounded-read
    impact: memory
    risk: low
    title: "Cap or stream `read_to_string` / JSONL validation for large inputs"
    verification: "Load test with files > policy `max_file_bytes_hint`"
  - id: io-cache-loop
    pattern: scaling/cache-miss-hot-read
    impact: latency
    risk: medium
    title: "Remove per-iteration disk reads in loops; batch, cache paths, or mmap"
    verification: "Benchmark hot loop; `toestub --mode audit` clean on touched files"
  - id: env-ssot
    pattern: scaling/env-default-duplication
    impact: maintainability
    risk: low
    title: "Deduplicate `std::env::var` defaults into one const or policy module"
    verification: "grep for repeated defaults; `vox ci scaling-audit verify`"
  - id: regex-compile
    pattern: scaling/regex-new-hot
    impact: cpu
    risk: low
    title: "Hoist `Regex::new` into `LazyLock`/`OnceLock` for hot paths"
    verification: "Profile before/after; `cargo build -p {crate}`"
  - id: sql-bounds
    pattern: scaling/sql-no-limit
    impact: db_load
    risk: medium
    title: "Ensure queries have LIMIT/pagination for unbounded result sets"
    verification: "Integration test with large table; EXPLAIN review"
  - id: http-timeouts
    pattern: scaling/http-client-no-timeout
    impact: reliability
    risk: medium
    title: "Configure HTTP client timeouts and connection limits"
    verification: "Chaos / slow-backend tests"
  - id: path-ssot
    pattern: scaling/path-literal
    impact: maintainability
    risk: low
    title: "Replace repeated `mens/runs*` literals with `vox_scaling_policy` / env"
    verification: "vox ci scaling-audit verify; grep audit clean"
  - id: numeric-ssot
    pattern: scaling/magic-limit
    impact: policy_drift
    risk: low
    title: "Centralize token/batch limits in `contracts/scaling/policy.yaml`"
    verification: "Policy parse + doc cross-link"
  - id: index-memory
    pattern: scaling/large-in-memory-accumulator
    impact: memory
    risk: high
    title: "Bound in-memory indexes (RAG, search, tensor maps); prefer mmap or disk"
    verification: "Heap profile; corpus 10x growth test"
  - id: concurrency-structure
    pattern: scaling/nested-pairwise-loop
    impact: cpu
    risk: low
    title: "Review O(n^2) lock/graph paths; document max N or replace algorithm"
    verification: "Stress test at max supported N"
  - id: ci-throughput
    pattern: repo/ci
    impact: developer_time
    risk: low
    title: "Scoped `cargo check`/nextest for this crate in CI feature matrix"
    verification: "vox ci feature-matrix; wall time budget"
