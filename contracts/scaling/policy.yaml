# Scaling SSOT policy — thresholds, literals, and rollout metadata.
# Validated by contracts/scaling/policy.schema.json; embedded by vox-scaling-policy.
schema_version: 1
baseline_id: "2025-03-25"

thresholds:
  max_file_bytes_hint: 67108864
  corpus_validate_batch_lines: 10000

path_literals:
  mens_runs_variants:
    - "mens/runs/v1"
    - "mens/runs/latest"
    - "mens/runs/"
    - "mens/runs"
  extra_flag_literals:
    - "/tmp/"
    - "mens/runs/qwen35_qlora"

magic_numeric_hints:
  - 1024
  - 2048
  - 4096
  - 8192
  - 16384
  - 32768
  - 65536

per_crate_overrides:
  - crate_name: "vox-toestub"
    allow_blocking_fs_in_async: true
    notes: "Scanner uses sync read_to_string by design."
  - crate_name: "vox-integration-tests"
    allow_blocking_fs_in_async: true
    notes: "Integration tests use blocking FS for harness simplicity."
