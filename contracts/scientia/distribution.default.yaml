version: 1
channels:
  - rss
  - github
  - twitter
  - open_collective
  - reddit
  - hacker_news
  - youtube
distribution_policy:
  retry_profile: conservative
  rate_limit_profile: platform_default
  approval_required: true
  dry_run: true
  channel_policy:
    rss:
      enabled: true
      template_profile: archive_default
    twitter:
      enabled: true
      template_profile: short_insight_thread
      topic_filters:
        include_tags: [benchmark, release, infra_release, video_demo]
        min_topic_score: 0.2
      worthiness_floor: 0.75
    github:
      enabled: true
      template_profile: release_digest
      worthiness_floor: 0.8
    open_collective:
      enabled: true
      template_profile: impact_update
      worthiness_floor: 0.8
    reddit:
      enabled: true
      template_profile: deep_dive_selfpost
      topic_filters:
        include_tags: [research_breakthrough, benchmark, video_demo]
        exclude_tags: [internal_only]
      worthiness_floor: 0.82
    hacker_news:
      enabled: true
      template_profile: launch_title
      topic_filters:
        include_tags: [research_breakthrough, infra_release, benchmark]
      worthiness_floor: 0.84
    youtube:
      enabled: true
      template_profile: demo_explainer
      topic_filters:
        include_tags: [video_demo, tutorial, benchmark]
      worthiness_floor: 0.8
channel_payloads:
  twitter:
    thread: true
  open_collective:
    collective_slug: vox-foundation
  hacker_news:
    mode: manual_assist
