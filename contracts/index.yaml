  - id: openclaw-connect-hello-ok-fixture
    path: contracts/openclaw/protocol/connect.hello-ok.json
    owner: ars
    kind: json
    description: OpenClaw WS hello-ok response fixture.
    enforced_by:
      - vox ci openclaw-contract

  - id: openclaw-subscriptions-list-response-fixture
    path: contracts/openclaw/protocol/subscriptions.list.response.json
    owner: ars
    kind: json
    description: OpenClaw WS subscriptions list response fixture.
    enforced_by:
      - vox ci openclaw-contract

  - id: openclaw-discovery-well-known-response-fixture
    path: contracts/openclaw/discovery/well-known.response.json
    owner: ars
    kind: json
    description: OpenClaw well-known discovery response fixture with gateway and catalog endpoints.
    enforced_by:
      - vox ci openclaw-contract

  - id: openclaw-discovery-well-known-minimal-fixture
    path: contracts/openclaw/discovery/well-known.minimal.json
    owner: ars
    kind: json
    description: Minimal OpenClaw well-known discovery fixture used for fallback compatibility checks.
    enforced_by:
      - vox ci openclaw-contract

  - id: scientia-publication-worthiness-schema
    path: contracts/scientia/publication-worthiness.schema.json
    owner: scientia
    kind: json-schema
    description: JSON Schema for scientia publication worthiness policy contracts.
    enforced_by:
      - vox ci scientia-worthiness-contract
      - vox ci ssot-drift

  - id: scientia-publication-worthiness-default
    path: contracts/scientia/publication-worthiness.default.yaml
    owner: scientia
    kind: yaml
    description: Default publication worthiness thresholds, red lines, and advisory venue profile notes.
    enforced_by:
      - vox ci scientia-worthiness-contract
      - vox ci ssot-drift

  - id: scientia-arxiv-handoff-schema
    path: contracts/scientia/arxiv-handoff.schema.json
    owner: scientia
    kind: json-schema
    description: JSON Schema for operator-facing arXiv assist handoff exports (`arxiv_handoff.json`).
    enforced_by:
      - cargo test -p vox-publisher submission_package
      - vox ci ssot-drift

  - id: scientia-distribution-schema
    path: contracts/scientia/distribution.schema.json
    owner: scientia
    kind: json-schema
    description: JSON Schema for scientia social distribution metadata_json.syndication payload (legacy scientia_distribution still hydrates with warnings).
    enforced_by:
      - vox ci ssot-drift

  - id: scientia-distribution-default
    path: contracts/scientia/distribution.default.yaml
    owner: scientia
    kind: yaml
    description: Default scientia social distribution policy and channel payload baseline.
    enforced_by:
      - vox ci ssot-drift

  - id: scientia-distribution-topic-packs
    path: contracts/scientia/distribution.topic-packs.yaml
    owner: scientia
    kind: yaml
    description: Topic-to-channel policy packs used for balanced social routing defaults.
    enforced_by:
      - vox ci ssot-drift

  - id: scientia-social-execution-board-template
    path: contracts/scientia/social-execution-board.template.yaml
    owner: scientia
    kind: yaml
    description: Template used to generate WSx-Tyyy Scientia social execution task IDs.
    enforced_by:
      - vox ci ssot-drift

  - id: scientia-social-execution-board-generated
    path: contracts/scientia/social-execution-board.generated.yaml
    owner: scientia
    kind: yaml
    description: Generated Scientia social execution board metadata (task ranges and counts).
    enforced_by:
      - vox ci ssot-drift

  - id: scaling-policy
    path: contracts/scaling/policy.yaml
    owner: platform-ci
    kind: yaml
    description: Scaling SSOT — thresholds, path literals, magic numeric hints, per-crate overrides.
    enforced_by:
      - vox ci scaling-audit
      - cargo test -p vox-scaling-policy

  - id: scaling-policy-schema
    path: contracts/scaling/policy.schema.json
    owner: platform-ci
    kind: json-schema
    description: JSON Schema for scaling policy YAML.
    enforced_by:
      - vox ci scaling-audit

  - id: sql-write-ownership-rev-c
    path: contracts/reports/sql-write-ownership-rev-c.json
    owner: platform-ci
    kind: json
    description: Incremental SQL write ownership audit placeholder (Rev C).
    enforced_by: []

  - id: toestub-run-json-v1-schema
    path: contracts/toestub/toestub-run-json.v1.schema.json
    owner: platform-ci
    kind: json-schema
    description: TOESTUB CLI JSON v1 envelope (findings + run telemetry).
    enforced_by: []

  - id: toestub-suppression-v1-schema
    path: contracts/toestub/suppression.v1.schema.json
