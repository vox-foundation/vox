# Machine-readable inventory of repo contract artifacts (see contracts/index.schema.json).
schema_version: 1

contracts:
  - id: cli-command-registry
    path: contracts/cli/command-registry.yaml
    owner: platform-ci
    kind: yaml
    description: Shipped CLI and surface registry for command-compliance.
    enforced_by:
      - vox ci command-compliance

  - id: cli-command-registry-schema
    path: contracts/cli/command-registry.schema.json
    owner: platform-ci
    kind: json-schema
    description: JSON Schema for command-registry.yaml.
    enforced_by:
      - vox ci command-compliance

  - id: codex-api-openapi
    path: contracts/codex-api.openapi.yaml
    owner: codex-api
    kind: openapi-yaml
    description: Codex HTTP API surface for dashboard / run_dashboard.
    enforced_by:
      - vox ci check-codex-ssot

  - id: dei-rpc-envelope-schema
    path: contracts/dei/rpc-methods.schema.json
    owner: dei
    kind: json-schema
    description: DeI daemon JSON-line RPC envelope (version, method, params).
    enforced_by:
      - vox ci command-compliance

  - id: eval-benchmark-matrix
    path: contracts/eval/benchmark-matrix.json
    owner: mens
    kind: json
    description: Milestone benchmark matrix data.
    enforced_by:
      - vox ci eval-matrix

  - id: eval-benchmark-matrix-schema
    path: contracts/eval/benchmark-matrix.schema.json
    owner: mens
    kind: json-schema
    description: JSON Schema for benchmark-matrix.json.
    enforced_by:
      - vox ci eval-matrix

  - id: eval-syntax-k-event-schema
    path: contracts/eval/syntax-k-event.schema.json
    owner: mens
    kind: json-schema
    description: JSON Schema for syntax_k_event telemetry payloads in research_metrics.metadata_json.
    enforced_by:
      - vox ci contracts-index

  - id: eval-runtime-generation-kpi-schema
    path: contracts/eval/runtime-generation-kpi.schema.json
    owner: mens
    kind: json-schema
    description: JSON Schema for normalized runtime generation KPI artifacts emitted by CLI and MCP generation paths.
    enforced_by:
      - vox ci contracts-index

  - id: eval-external-serving-handoff-schema
    path: contracts/eval/external-serving-handoff.schema.json
    owner: mens
    kind: json-schema
    description: JSON Schema for exported external-serving handoff metadata from QLoRA-style deployment paths.
    enforced_by:
      - vox ci contracts-index

  - id: eval-mens-scorecard-spec
    path: contracts/eval/mens-scorecard.baseline.json
    owner: mens
    kind: json
    description: Baseline Mens scorecard benchmark specification fixture.
    enforced_by:
      - vox ci mens-scorecard verify

  - id: eval-mens-scorecard-invalid-spec
    path: contracts/eval/mens-scorecard.invalid.json
    owner: mens
    kind: json
    description: Negative fixture for Mens scorecard benchmark schema validation.
    enforced_by:
      - vox ci mens-scorecard verify

  - id: eval-mens-scorecard-schema
    path: contracts/eval/mens-scorecard.schema.json
    owner: mens
    kind: json-schema
    description: JSON Schema for Mens scorecard benchmark specifications.
    enforced_by:
      - vox ci mens-scorecard verify

  - id: eval-mens-scorecard-event-schema
    path: contracts/eval/mens-scorecard-event.schema.json
    owner: mens
    kind: json-schema
    description: JSON Schema for Mens scorecard per-task event rows.
    enforced_by:
      - vox ci mens-scorecard verify

  - id: eval-mens-scorecard-summary-schema
    path: contracts/eval/mens-scorecard-summary.schema.json
    owner: mens
    kind: json-schema
    description: JSON Schema for Mens scorecard summary artifacts.
    enforced_by:
      - vox ci mens-scorecard verify

  - id: contracts-index
    path: contracts/index.yaml
    owner: platform-ci
    kind: yaml
    description: This file — canonical list of contract artifacts.
    enforced_by:
      - vox ci contracts-index

  - id: baseline-version-policy
    path: contracts/db/baseline-version-policy.yaml
    owner: platform-ci
    kind: yaml
    description: Canonical baseline integer vs digest policy for Arca/Codex.
    enforced_by:
      - vox ci check-codex-ssot

  - id: db-retention-policy
    path: contracts/db/retention-policy.yaml
    owner: platform-ci
    kind: yaml
    description: Table retention hints for vox db prune-plan / prune-apply.
    enforced_by: []

  - id: ssot-evidence-snapshot
    path: contracts/reports/evidence-snapshot-rev-c.json
    owner: platform-ci
    kind: json
    description: Machine-readable SSOT drift findings snapshot.
    enforced_by:
      - vox ci check-codex-ssot

  - id: mcp-tool-registry
    path: contracts/mcp/tool-registry.canonical.yaml
    owner: platform-ci
    kind: yaml
    description: Canonical MCP tool names and descriptions; built into Rust via vox-mcp-registry.
    enforced_by:
      - vox ci command-compliance
      - cargo build -p vox-mcp-registry

  - id: openclaw-connect-challenge-fixture
    path: contracts/openclaw/protocol/connect.challenge.json
    owner: ars
    kind: json
    description: OpenClaw WS event fixture for connect challenge framing.
    enforced_by:
