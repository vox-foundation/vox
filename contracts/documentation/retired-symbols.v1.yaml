x-vox-version: 1
# Vox Documentation: Retired Symbols and Canonical Replacements
# Used by `vox ci retired-symbol-check` to prevent hallucination-prone identifiers from appearing in docs.

symbols:
  # Note: `\bvox-dei\b` also matches the `vox-dei` prefix inside `vox-dei-d`; `retired_symbol_check`
  # skips lines containing `vox-dei-d`, `crates/vox-dei`, or the word "retired".
  - id: vox-dei-old-crate
    pattern: "\\bvox-dei\\b"
    replacement: "vox-orchestrator"
    rationale: "Old large orchestrator crate. The new small vox-dei crate is for HITL only. If referring to HITL, ensure context is clear."
  - id: vox-ars-crate
    pattern: "\\bvox-ars(?:[^-\\w]|$)"
    replacement: "vox-openclaw-runtime"
    rationale: "Crate retired; ARS runtime types live in vox-openclaw-runtime. (vox-openclaw-runtime itself is the canonical replacement and is not flagged.)"
  - id: vox-lexer-crate
    pattern: "\\bvox-lexer\\b"
    replacement: "vox-compiler"
    rationale: "Merged into vox-compiler monolith."
  - id: vox-parser-crate
    pattern: "\\bvox-parser\\b"
    replacement: "vox-compiler"
    rationale: "Merged into vox-compiler monolith."
  - id: vox-hir-crate
    pattern: "\\bvox-hir\\b"
    replacement: "vox-compiler"
    rationale: "Merged into vox-compiler monolith."
  - id: vox-typeck-crate
    pattern: "\\bvox-typeck\\b"
    replacement: "vox-compiler"
    rationale: "Merged into vox-compiler monolith."
  - id: component-fn-decorator
    pattern: "@component fn"
    replacement: "component Name() {}"
    rationale: "Retired syntax form. Use the native component keyword."
  - id: turso-url-env
    pattern: "TURSO_URL"
    replacement: "VOX_DB_URL"
    rationale: "Legacy Turso env var. Use VOX_DB_URL for Codex."
  - id: turso-token-env
    pattern: "TURSO_AUTH_TOKEN"
    replacement: "VOX_DB_TOKEN"
    rationale: "Legacy Turso env var. Use VOX_DB_TOKEN for Codex."
  - id: vox-turso-url-env
    pattern: "VOX_TURSO_URL"
    replacement: "VOX_DB_URL"
    rationale: "Retired compatibility alias. Use VOX_DB_URL."
  - id: vox-turso-token-env
    pattern: "VOX_TURSO_TOKEN"
    replacement: "VOX_DB_TOKEN"
    rationale: "Retired compatibility alias. Use VOX_DB_TOKEN."
  - id: sync-recall-api
    pattern: "\\brecall\\("
    replacement: "recall_async()"
    rationale: "Deprecated synchronous memory recall. Use recall_async()."
  - id: persist-fact-api
    pattern: "persist_fact\\("
    replacement: "sync_to_db()"
    rationale: "Renamed to sync_to_db() for clarity."
  - id: vox-ml-cli-standalone
    pattern: "\\bvox-ml-cli\\b"
    replacement: "vox-populi"
    rationale: "Now part of vox-populi."
