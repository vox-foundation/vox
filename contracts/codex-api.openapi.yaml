openapi: 3.0.3
info:
  title: Vox Codex HTTP API (vox-codex-api)
  description: |
    Self-hosted dashboard + Codex reactive surface served by `vox-codex-dashboard` / `run_dashboard`.
    Baseline Arca schema is manifest-driven; the applied `schema_version` row matches
    `BASELINE_VERSION` in `crates/vox-db/src/schema/manifest.rs` (see `contracts/db/baseline-version-policy.yaml`).
  version: 1.0.0
servers:
  - url: http://127.0.0.1:3847
    description: Default local dashboard (`VOX_DASH_HOST` / `VOX_DASH_PORT`)
paths:
  /health:
    get:
      summary: Process liveness
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /ready:
    get:
      summary: Baseline schema + required tables + digest
      responses:
        "200":
          description: Codex API surface is usable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  schema_version:
                    type: integer
                  baseline_digest:
                    type: string
                  capabilities:
                    type: object
        "503":
          description: Missing tables or wrong schema version
  /api/codex/query/{name}:
    get:
      summary: Latest named query snapshot
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Snapshot JSON
        "404":
          description: Unknown query name
  /api/codex/mutate/{name}:
    post:
      summary: Append codex_change_log row (topic = name)
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MutateBody"
      responses:
        "200":
          description: Change log id
  /api/codex/subscribe/{topic}:
    get:
      summary: SSE stream of change-log rows
      parameters:
        - name: topic
          in: path
          required: true
          schema:
            type: string
        - name: after_id
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: text/event-stream
  /api/search/status:
    get:
      summary: Row counts for search ingest tables
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  search_documents:
                    type: integer
                  search_document_chunks:
                    type: integer
                  search_indexing_jobs:
                    type: integer
  /api/codex/research-session:
    post:
      summary: Upsert research_sessions by session_key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchSessionUpsertBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  session_key:
                    type: string
                  repository_id:
                    type: string
  /api/codex/conversations/{conv_id}/versions:
    post:
      summary: Append conversation_versions row
      parameters:
        - name: conv_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationVersionBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
  /api/codex/conversation-edges:
    post:
      summary: Insert conversation_edges row
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationEdgeBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
  /api/codex/topics/{topic_id}/evolution-events:
    post:
      summary: Append topic_evolution_events row
      parameters:
        - name: topic_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicEvolutionBody"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
  /api/audio/status:
    get:
      summary: Oratio / Candle status
      responses:
        "200":
          description: JSON status
  /api/audio/transcribe:
    post:
      summary: Transcribe audio file via Oratio
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
      responses:
        "200":
          description: Transcript JSON
components:
  schemas:
    MutateBody:
      type: object
      required: [change_kind]
      properties:
        change_kind:
          type: string
        entity_kind:
          type: string
        entity_id:
          type: string
        payload:
          type: object
    ResearchSessionUpsertBody:
      type: object
      required: [session_key]
      properties:
        session_key:
          type: string
        title:
          type: string
        status:
          type: string
        repository_id:
          type: string
        config_json:
          type: object
        summary_json:
          type: object
    ConversationVersionBody:
      type: object
      required: [version_index]
      properties:
        version_index:
          type: integer
        label:
          type: string
        snapshot_json:
          type: object
    ConversationEdgeBody:
      type: object
      required: [from_conversation_id, to_conversation_id]
      properties:
        from_conversation_id:
          type: integer
        to_conversation_id:
          type: integer
        edge_kind:
          type: string
        weight:
          type: number
        metadata_json:
          type: object
    TopicEvolutionBody:
      type: object
      required: [event_kind]
      properties:
        event_kind:
          type: string
        prior_label:
          type: string
        new_label:
          type: string
        detail_json:
          type: object
