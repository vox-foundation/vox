schema_version: 1

repositories:
  - display_name: vox
    repository_id: null
    root_path: .
    origin_url: https://github.com/vox-foundation/vox.git
    provider: github
    default_ref: main
    access_mode: local
    capabilities:
      - read_file
      - list_files
      - text_search
      - history_search

  - display_name: shared-sdk
    repository_id: null
    root_path: ../shared-sdk
    origin_url: https://github.com/example/shared-sdk.git
    provider: github
    default_ref: main
    access_mode: local
    capabilities:
      - read_file
      - list_files
      - text_search
      - history_search

  - display_name: org-search
    repository_id: sourcegraph-org-search
    origin_url: https://sourcegraph.example.com
    provider: sourcegraph
    default_ref: main
    access_mode: remote_search_service
    capabilities:
      - text_search
      - semantic_search
      - read_file
    remote:
      search_service_url: https://sourcegraph.example.com/.api/mcp
      search_namespace: org/*
