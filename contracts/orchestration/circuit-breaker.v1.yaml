# contracts/orchestration/circuit-breaker.v1.yaml
# Five-signal circuit breaker thresholds for D6 doom-loop detection.
# Mirrored by `crates/vox-orchestrator/src/circuit_breaker.rs::CircuitBreakerConfig::default`.
version: 1
description: "Five-signal circuit breaker for orchestrator doom-loop detection (D6)"

trip_thresholds:
  # Consecutive plan loops with no new tool results.
  no_progress_loops: 3
  # Consecutive loops returning the same error class.
  same_error_loops: 5
  # Total redundant tool calls in this plan cycle.
  tool_thrash_count: 15
  # Jaccard similarity of action bigrams vs prior bigrams.
  ngram_overlap: 0.85
  # Z-score of current embedding vs session baseline.
  semantic_drift_sigma: 2.0

graduated_alarms:
  caution:
    no_progress_loops: 1
    same_error_loops: 2
    tool_thrash_count: 8
  warning:
    no_progress_loops: 2
    same_error_loops: 3
    tool_thrash_count: 12

# Replan attempts after a trip before escalating to HITL.
replan_limit: 3
