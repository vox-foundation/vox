x-vox-version: 3
schema_version: 3

# SSOT for quality-first routing, exploration, and outage fallback (overridable via Clavis).
routing_objective:
  kind: quality_first


exploration:
  algorithm: thompson_beta
  epsilon_floor: 0.02
  epsilon_ceiling: 0.12
  min_samples_per_arm: 3
  max_concurrent_explorations: 2
  budget_usd_per_day: 50.0
  exploration_boost_for_novel: 0.5

safety:
  max_cost_usd_per_request: 5.0

# Ordered cascade when primary route fails (symbolic provider names; engine maps to registry).
fallback_graph:
  - OpenRouter
  - PopuliMesh
  - Ollama

tiers:
  - Unknown
  - Local
  - Light
  - Pro
  - Elite

strengths:
  - codegen
  - debugging
  - logic
  - research
  - parsing
  - review
  - planning
  - inter_agent
  - visus
  - security
  - vision
  - ui-codegen
  - frontend
  - generalist
  - long-context

task_categories:
  - CodeGen
  - Testing
  - Debugging
  - TypeChecking
  - Research
  - Parsing
  - Review
  - General
  - Ars
  - Planning
  - InterAgent
  - ToolOrchestration
  - Visus

# VOX_AUTO_ROUTING_PRIORITY env var is the SSOT for weight distributions (efficiency, precision, etc).
latency_bands:
  excellent_ms: 500
  poor_ms: 8000

premium_alias:
  # 2026-Q2 refresh — see docs/src/architecture/model-selection-2026-q2.md
  # for rationale, benchmarks, and rollback guidance. Mythos preview retired
  # from premium aliases (preview-tier at $125/MTok; #3 on BFCL); replaced
  # with Opus 4.7 GA (87.6% SWE-bench Verified at $5/$25). Gemini 2.5 Pro
  # Preview rotated to Gemini 3.1 Pro (current GA; ARC-AGI-2 + GPQA leader).
  codegen: "anthropic/claude-opus-4.7"
  debugging: "anthropic/claude-opus-4.7"
  security: "anthropic/claude-opus-4.7"
  research: "google/gemini-3.1-pro"
  planning: "openai/gpt-5.5-pro"
  review: "anthropic/claude-sonnet-4.6"
  logic: "deepseek/deepseek-r1"
  visus: "qwen/qwen-3.5-vl"

economy_cost_ceiling_usd_per_1k: 0.1

capability_policy:
  default_profile: "balanced"
  profiles:
    balanced:
      fs_read: true
      fs_write: true
      net: true
      child_process: true
      worker: true
      wasi: false
      inspector: false
      provider_network: true
      local_model_http: true
    restricted:
      fs_read: true
      fs_write: false
      net: false
      child_process: false
      worker: false
      wasi: false
      inspector: false
      provider_network: false
      local_model_http: false
  env_overrides:
    profile: "VOX_ROUTE_POLICY_PROFILE"
    allow_net: "VOX_ROUTE_ALLOW_NET"
    allow_provider_network: "VOX_ROUTE_ALLOW_PROVIDER_NETWORK"
    allow_local_model_http: "VOX_ROUTE_ALLOW_LOCAL_MODEL_HTTP"

lifecycle:
  maturity: "experimental"
  migration_window_days: 90

strength_inference:
  - type: parameter_graph
    rules:
      - parameters: ["tools", "tool_use", "response_format", "structured_outputs"]
        strengths: ["codegen", "logic"]
      - parameters: ["reasoning", "thinking"]
        strengths: ["logic", "debugging"]
      - parameters: ["web_search", "search"]
        strengths: ["research"]

  - type: provider_family
    rules:
      - match: "anthropic"
        strengths: ["codegen", "logic", "review", "research", "ui-codegen", "frontend"]
      - match: "openai"
        strengths: ["codegen", "logic", "research"]
      - match: "google"
        strengths: ["research", "codegen", "logic"]
      - match: "deepseek"
        strengths: ["codegen", "logic", "debugging"]
      - match: "qwen"
        strengths: ["codegen", "logic"]
      - match: "qwen2"
        strengths: ["codegen", "logic"]
      - match: "qwen2.5"
        strengths: ["codegen", "logic"]
      - match: "qwen3"
        strengths: ["codegen", "logic"]
      - match: "qwen3.5"
        strengths: ["codegen", "logic"]
      - match: "qwen3_5"
        strengths: ["codegen", "logic"]
      - match: "mistral"
        strengths: ["codegen", "logic"]
      - match: "mistralai"
        strengths: ["codegen", "logic"]
      - match: "meta-llama"
        strengths: ["codegen", "logic", "research"]
      - match: "meta"
        strengths: ["codegen", "logic", "research"]
      - match: "cohere"
        strengths: ["research", "review"]
      - match: "perplexity"
        strengths: ["research"]
      - match: "x-ai"
        strengths: ["research", "logic"]
      - match: "nvidia"
        strengths: ["codegen", "logic"]
      - match: "01-ai"
        strengths: ["logic", "codegen"]
      - match: "amazon"
        strengths: ["codegen", "research"]
      - match: "microsoft"
        strengths: ["codegen", "logic"]

  - type: name_regex
    rules:
      - pattern: "(code|coder|program|software)"
        strengths: ["codegen"]
      - pattern: "(reason|logic|math|proof)"
        strengths: ["logic"]
      - pattern: "(debug|fix)"
        strengths: ["debugging"]
      - pattern: "(research|analysis|science|academic)"
        strengths: ["research"]
      - pattern: "(review|critic)"
        strengths: ["review"]
      - pattern: "(parse|extract)"
        strengths: ["parsing"]

  - type: default
    rules:
      - strengths: ["generalist"]

capability_inference:
  parameters_to_capabilities:
    - parameters: ["tools", "tool_use", "tool_choice"]
      capability: "supports_tool_use"
    - parameters: ["response_format", "structured_outputs", "json_mode"]
      capability: "supports_json"
    - parameters: ["reasoning", "thinking", "reasoning_effort"]
      capability: "supports_reasoning"
    - parameters: ["web_search", "search", "web_search_options"]
      capability: "supports_web_search"
  modalities_to_capabilities:
    - input_modality: "image"
      capability: "supports_vision"
    - input_modality: "audio"
      capability: "supports_audio_input"
    - output_modality: "image"
      capability: "supports_image_generation"
    - output_modality: "audio"
      capability: "supports_audio_output"
  default_capabilities: []

intent_to_required_capabilities:
  image_generation:
    - supports_image_generation
  vision_understanding:
    - supports_vision
  tool_calling:
    - supports_tool_use
  web_search:
    - supports_web_search
  reasoning:
    - supports_reasoning
  json_mode:
    - supports_json

prompt_intent_inference:
  - kind: name_regex
    rules:
      - pattern: "(generate|create|draw|render).*(image|picture|illustration|art|logo|icon)"
        intents: ["image_generation"]
      - pattern: "(analyze|describe|read).*(image|photo|screenshot|chart)"
        intents: ["vision_understanding"]
      - pattern: "(call|use).*(tool|function|api)"
        intents: ["tool_calling"]
      - pattern: "(think|reason|step.by.step|chain.of.thought)"
        intents: ["reasoning"]
      - pattern: "(search the web|web search|look up|latest|current event|today's |news)"
        intents: ["web_search"]
      - pattern: "(json|schema|structured|valid object)"
        intents: ["json_mode"]
