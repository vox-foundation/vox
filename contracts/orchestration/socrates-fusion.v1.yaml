# contracts/orchestration/socrates-fusion.v1.yaml
# Composite confidence fusion thresholds for D3 Socrates invocation decision.
# Mirrored by `crates/vox-orchestrator/src/confidence_fusion.rs::FusionConfig::default`.
version: 1
description: "Composite confidence fusion for Socrates invocation decision (D3)"

# Score >= answer_threshold -> AnswerDirectly
# invoke_threshold <= score < answer_threshold -> InvokeSocrates
# score < invoke_threshold -> Insufficient (block / escalate)
thresholds:
  answer_threshold: 0.75
  invoke_threshold: 0.55

# Weights MUST sum to 1.0.
weights:
  evidence_quality: 0.35
  citation_coverage: 0.25
  source_diversity: 0.15
  contradiction_penalty: 0.15
  entropy_score: 0.10
