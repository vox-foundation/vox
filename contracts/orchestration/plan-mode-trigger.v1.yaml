# Mirrored by `crates/vox-orchestrator/src/planning/plan_mode_trigger.rs::PlanModeTriggerConfig::default`.
version: 1
description: "Plan-mode vs. ReAct mode decision trigger (D2)"

# Any signal at or above its threshold selects PlanAndExecute; otherwise React.
thresholds:
  complexity: 6
  dependency_count: 3
  tool_hint_count: 4
  prior_adequacy_score: 0.60  # below this triggers PlanAndExecute
