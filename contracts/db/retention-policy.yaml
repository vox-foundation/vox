# Table retention hints for `vox db prune-plan` / `vox db prune-apply`.
# SSOT path: contracts/db/retention-policy.yaml
#
# kind:
#   - keep_forever — listed for documentation only; no automated deletion
#   - manual — operator must run targeted SQL or domain tools
#   - days — delete rows older than `days` relative to `time_column` using SQLite datetime('now', '-N day')
#     (suited to TEXT/ISO timestamps; not INTEGER Unix millis)
#   - ms_days — same as `days` but `time_column` is INTEGER Unix milliseconds
#   - expires_lt_now — delete rows where `time_column` IS NOT NULL AND `time_column` < datetime('now')
#     (TEXT `datetime(...)` values; used for TTL columns like `expires_at`)

tables:
  memories:
    kind: days
    days: 30
    time_column: created_at
  behavior_events:
    kind: days
    days: 90
    time_column: created_at
  conversation_messages:
    kind: manual
  orchestration_lineage_events:
    kind: ms_days
    days: 90
    time_column: created_at_ms
  agent_session_events:
    kind: ms_days
    days: 365
    time_column: created_at_ms
  agents:
    kind: keep_forever
  skill_manifests:
    kind: keep_forever
  research_metrics:
    kind: days
    days: 365
    time_column: created_at
  trusted_evidence_bundles:
    kind: expires_lt_now
    time_column: expires_at
