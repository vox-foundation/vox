# Table retention hints for `vox db prune-plan` / `vox db prune-apply`.
# SSOT path: contracts/db/retention-policy.yaml
#
# kind:
#   - keep_forever — listed for documentation only; no automated deletion
#   - manual — operator must run targeted SQL or domain tools
#   - days — delete rows older than `days` relative to `time_column` using SQLite datetime('now', '-N day')
#     (suited to TEXT/ISO timestamps; not INTEGER Unix millis)
#   - ms_days — same as `days` but `time_column` is INTEGER Unix milliseconds
#   - expires_lt_now — delete rows where `time_column` IS NOT NULL AND `time_column` < datetime('now')
#     (TEXT `datetime(...)` values; used for TTL columns like `expires_at`)

tables:
  memories:
    kind: days
    days: 30
    time_column: created_at
  behavior_events:
    kind: days
    days: 90
    time_column: created_at
  conversation_messages:
    kind: manual
  orchestration_lineage_events:
    kind: ms_days
    days: 90
    time_column: created_at_ms
  agent_session_events:
    kind: ms_days
    days: 365
    time_column: created_at_ms
  agents:
    kind: keep_forever
  skill_manifests:
    kind: keep_forever
  research_metrics:
    kind: days
    days: 365
    time_column: created_at
  # Build telemetry baseline (`vox ci build-timings --deep`): prune parent runs; child rows cascade
  # (`build_crate_sample`, `build_warning`, `build_run_dependency_shape`).
  build_run:
    kind: days
    days: 365
    time_column: recorded_at
  # CI completion audit (ingest: vox ci completion-ingest). S2 workspace-adjacent; see
  # docs/src/architecture/telemetry-retention-sensitivity-ssot.md and completion-policy-ssot.md.
  # Child rows (finding, detector_snapshot) use ON DELETE CASCADE — no separate prune rows.
  ci_completion_run:
    kind: days
    days: 365
    time_column: finished_at
  # Rows with NULL expires_at are long-lived suppressions; TTL rows delete when expires_at < now.
  ci_completion_suppression:
    kind: expires_lt_now
    time_column: expires_at
  trusted_evidence_bundles:
    kind: expires_lt_now
    time_column: expires_at
  agent_exec_history:
    kind: ms_days
    days: 90
    time_column: recorded_at
