# Single interpretation of Arca / Codex schema_version vs repository BASELINE_VERSION.
# SSOT for runtime: crates/vox-db/src/schema/manifest.rs (BASELINE_VERSION) and VoxDb::migrate.
schema_version: 1

policy:
  # Integer stored in DB `schema_version` table after baseline migration succeeds.
  repository_baseline_integer: 52
  # Keccak-256 (0x-prefixed) of `vox_db::schema::baseline_sql()` — `vox ci check-codex-ssot` enforces parity when set.
  repository_baseline_digest_hex: "0x51e55e155fdf2018bd6da5eddb2f1991246bcf87a8506386ebdee8557052c41d"
  # Keccak-256 over `vox_db::schema::baseline_sql()` (= ordered SCHEMA_FRAGMENTS + spec append DDL).
  digest_source: vox_db_schema_manifest_baseline_sql
  # Human-facing product name for the DB API layer.
  product_api_name: Codex
  # Internal schema + SQL owner crate.
  schema_owner_crate: vox-db

notes:
  - >-
    Docs and OpenAPI historically referred to baseline "1" as a conceptual greenfield label.
    The authoritative migration integer is `repository_baseline_integer` above and must match
    `pub const BASELINE_VERSION` in crates/vox-db/src/schema/manifest.rs.
    When baseline SQL changes, update `repository_baseline_digest_hex` to `vox_db::schema::schema_baseline_digest_hex()`
    (CI: `vox ci check-codex-ssot`).
  - >-
    Authoritative **bundle order** for concatenated Arca baseline DDL is `SCHEMA_FRAGMENTS` in
    `crates/vox-db/src/schema/manifest.rs` (foundation → … → publish_cloud), then the `schema::spec`
    append slice; a future logical-spec generator should emit those same two tiers.
