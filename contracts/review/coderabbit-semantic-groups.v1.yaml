# CodeRabbit semantic grouping — version 1
# Loaded by `vox review coderabbit semantic-submit` (bundled default; override with
# `[review.coderabbit] groups_config` in Vox.toml). Workspace crate rules are inserted
# between `prefix_rules` and `suffix_rules` when `semantic_workspace_crates = true`.

version: 1
unassigned:
  order: 199
  name: "99_unassigned"

workspace_crates:
  # One rule per `cargo metadata` workspace member under `crates/<name>/`, order 80, name `crate_<pkg>`.
  enabled: true
  rule_order: 80
  name_prefix: "crate_"

prefix_rules:
  - order: 10
    name: "02_github_agents"
    any_prefix: [".github/", ".agents/"]
  - order: 15
    name: "03_dotfiles_config"
    any_prefix:
      - ".cargo/"
      - ".config/"
      - ".gitlab-ci.yml"
      - ".gitignore"
      - ".aiignore"
      - ".cursorignore"
      - ".cursorrules"
      - ".dockerignore"
      - ".git-hooks/"
      - "config/"
      - "rust-toolchain.toml"
  - order: 17
    name: "04_opencode_retire"
    any_prefix: [".opencode/"]
  - order: 19
    name: "01_scaffold"
    root_files_only: true
  - order: 25
    name: "05_contracts"
    any_prefix: ["contracts/"]
  - order: 30
    name: "06_docs_src"
    any_prefix: ["docs/src/"]
  - order: 35
    name: "07_docs_other"
    any_prefix: ["docs/"]
  - order: 40
    name: "08_frontend"
    any_prefix: ["frontend/", "islands/", "packages/"]
  - order: 45
    name: "09_examples"
    any_prefix: ["examples/"]
  - order: 50
    name: "10_vscode_ext"
    any_prefix: ["vox-vscode/"]
  - order: 55
    name: "11_scripts_xtask"
    any_prefix:
      - "scripts/"
      - "xtask/"
      - "fuzz/"
      - "infra/"
      - "tree-sitter-vox/"
      - "tools/"
      - "editors/"
  - order: 60
    name: "12_populi_ml"
    any_prefix: ["mens/"]
  - order: 65
    name: "13_tests"
    any_prefix: ["tests/"]

suffix_rules:
  - order: 105
    name: "21_crate_other"
    any_prefix: ["crates/"]
  - order: 110
    name: "22_deploy_outputs"
    any_prefix: ["deploy/", "dist/", "dist1/", "lib/", "static/"]
