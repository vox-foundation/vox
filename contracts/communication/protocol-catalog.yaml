      - crates/vox-db/src/store/ops_questioning.rs
      - crates/vox-db/src/populi_registry_telemetry.rs
    auth_model: Bearer or HS256 JWT with mesh role separation.
    x-orchestrator-placement-reasons:
      - local_queue_default
      - populi_remote_lease_hold
      - local_queue_fallback_after_remote_relay_error
    retirement_decision: keep
    coexistence_notes: ADR 008 keeps HTTP-first in-tree and rejects adding parallel gRPC/QUIC defaults without a replacement ADR. Optional build feature `mesh-nvml-probe` on `vox-cli` enables NVML-backed Layer A `gpu_*` fields on join/heartbeat `NodeRecord`s. Orchestrator remote result drain uses cursor-paged mesh inbox reads so deep inboxes do not hide `remote_task_result` rows.

