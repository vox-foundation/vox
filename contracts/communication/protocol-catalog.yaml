# Prose SSOT: docs/src/reference/communication-protocols.md
# Advisory (lanes, gaps, external research): docs/src/architecture/protocol-convergence-research-2026.md
schema_version: 1

delivery_planes:
  - id: local_ephemeral
    name: Local ephemeral
    scope: same_process
    pattern: push
    ordering: Best-effort FIFO per receiver on the current process only.
    durability: none
    retry_model: Caller retries explicitly; restarts drop in-flight state.
    ack_semantics: Receiver-local ack or mailbox consumption only.
    idempotency: caller_defined
    auth_boundary: host_session
    use_for: Low-latency same-node coordination and mailbox-style agent messaging.

  - id: local_durable
    name: Local durable
    scope: same_host
    pattern: push
    ordering: Store-defined retrieval order; durability is preferred over latency.
    durability: durable
    retry_model: Poll/retry until ack or terminal pruning policy removes the row.
    ack_semantics: Explicit durable ack against stored inbox or outbox records.
    idempotency: caller_defined
    auth_boundary: host_session
    use_for: Cross-process local delivery, persistence degradation, and replayable inbox workflows.

  - id: remote_mesh
    name: Remote mesh
    scope: remote_network
    pattern: request_response
    ordering: Per-message HTTP request ordering only; inbox lease order is transport-defined.
    durability: durable
    retry_model: Client retries with idempotency keys and control-plane backoff.
    ack_semantics: >-
      Explicit inbox ack and lease renewal on the Populi control plane, plus optional remote
      execution lease grant/renew/release (`/v1/populi/exec/lease/*`) for correlation ids.
    idempotency: optional
    auth_boundary: bearer_or_jwt
    use_for: Cross-node coordination, remote task envelopes, and mesh-delivered A2A.

  - id: broadcast
    name: Broadcast / fanout
    scope: mixed
    pattern: fanout
    ordering: Receiver-local only; no global ordering across subscribers.
    durability: mixed
    retry_model: Usually none for in-memory fanout; durable fanout must layer its own replay store.
    ack_semantics: Usually none; explicit ack is protocol-specific when present.
    idempotency: not_applicable
    auth_boundary: mixed
    use_for: Subscription notifications, bulletin/event buses, and webhook-style fanout.

  - id: stream
    name: Stream
    scope: mixed
    pattern: stream
    ordering: Ordered within each stream connection or byte stream.
    durability: mixed
    retry_model: Reconnect or resume is transport-specific.
    ack_semantics: Transport-specific; SSE is usually fire-and-forget, WebSocket depends on protocol.
    idempotency: mixed
    auth_boundary: mixed
    use_for: Token streaming, live updates, incremental parser output, and reactive UI feeds.

