# SSOT for `vox ci artifact-prune` (age + size; mens runs + transient targets + scratch).
# Validated informally by `vox ci artifact-prune`; add JSON Schema when CI requires it.
schema_version: 1

# Cargo / CI isolated target trees under OS temp (`vox-targets/<repo-hash>/…`).
transient:
  max_age_days: 7

# Repo-root scratch files (logs, err dumps) matching audit heuristics.
# 7d matches typical agent-session cruft; raise locally if you need longer retention.
scratch:
  max_age_days: 7

mens:
  max_age_days: 90
  max_total_bytes: 53687091200
  min_keep: 2
  protected_names: []
  latest_pointer: mens/runs/latest
