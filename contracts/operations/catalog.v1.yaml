x-vox-version: 1
schema_version: 1
capability:
  auto_mcp_capabilities: true
  auto_cli_capabilities: true
  runtime_builtin_maps:
  - namespace: fs
    method: read
    capability_id: script.fs.read
  - namespace: fs
    method: write
    capability_id: script.fs.write
  - namespace: fs
    method: exists
    capability_id: script.fs.exists
  - namespace: fs
    method: mkdir
    capability_id: script.fs.mkdir
  - namespace: fs
    method: list_dir
    capability_id: script.fs.list_dir
  - namespace: fs
    method: glob
    capability_id: script.fs.glob
  - namespace: fs
    method: copy
    capability_id: script.fs.copy
  - namespace: fs
    method: remove
    capability_id: script.fs.remove
  - namespace: fs
    method: remove_dir_all
    capability_id: script.fs.remove_dir_all
  - namespace: fs
    method: read_bytes
    capability_id: script.fs.read_bytes
  - namespace: path
    method: join
    capability_id: script.path.join
  - namespace: path
    method: join_many
    capability_id: script.path.join_many
  - namespace: process
    method: run
    capability_id: script.process.run
  - namespace: process
    method: run_capture
    capability_id: script.process.run_capture
  exemptions:
    mcp_tools: []
    cli_paths:
    - - commands
    - - ci
    - - diag
    - - fabrica
    - - mens
    - - ars
    - - recensio
    - - codex
    - - db
    - - scientia
    - - telemetry
    - - pm
