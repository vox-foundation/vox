council_ratification_log:
  - id: plan-fidelity-wave-definition
    decision: >
      Wave 1 = single-file edits; Wave 2 = multi-file with decorator
      discipline (matches [CR-D1] usage); Wave 3 = cross-cutting
      (effects/workflow purity/retirement migration).
    ratified_at: "2026-05-15"
    rationale: "Preserves existing [CR-D1] 'Wave 2' semantics; renaming would re-open the April approval."
  - id: plan-fidelity-source
    decision: >
      Harvest from orchestrator session transcripts (post-P2.1 telemetry) +
      hand-curate for quality. Author-from-scratch reserved for filling
      wave-distribution gaps if harvested transcripts skew toward one wave.
    ratified_at: "2026-05-15"
    rationale: "Real transcripts produce realistic plans; gaps filled by hand."
