[alias]
# Dedicated vox-schola binary (Candle QLoRA + CUDA by default) — fastest incremental (~15 s).
vox-schola-dev       = "run -p vox-schola --"

[build]
# Use all available CPU cores for rustc parallelism
jobs = 8
rustdocflags = ["-D", "warnings"]

[target.x86_64-pc-windows-msvc]
# Use lld linker for faster linking on Windows (rustup component add llvm-tools)
# Uncomment the line below if lld is available:
# linker = "lld-link"
rustflags = ["-C", "link-arg=/DEBUG:NONE", "-C", "link-arg=/STACK:8388608"]

[env]
# Force all cargo build/test invocations (including scripts) to use a unified target dir.
# `relative = true` resolves the path from this config file's directory, so git
# worktrees under .claude/worktrees/ also write to the shared root target/
# instead of creating per-worktree target-agent/ target-doc-inv/ etc. dirs.
# Table form also merges cleanly with the global ~/.cargo/config.toml.
CARGO_TARGET_DIR = { value = "target", relative = true }
