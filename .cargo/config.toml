[alias]
# Habitual CUDA QLoRA binary (NVIDIA). On Windows run from **x64 Native Tools** / `vcvars64.bat` so `nvcc` finds `cl.exe`.
vox-cuda-release = "build -p vox-cli --release --features gpu,populi-candle-cuda"

[build]
# Use all available CPU cores for rustc parallelism
jobs = 8

[target.x86_64-pc-windows-msvc]
# Use lld linker for faster linking on Windows (rustup component add llvm-tools)
# Uncomment the line below if lld is available:
# linker = "lld-link"
rustflags = ["-C", "link-arg=/DEBUG:NONE"]

[env]
# Force all cargo build/test invocations (including scripts) to use a unified target dir.
# Prevents sprawl of rogue target-agent/, target-doc-inv/, etc. directories.
CARGO_TARGET_DIR = "target"
