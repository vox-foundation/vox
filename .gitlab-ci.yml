# .gitlab-ci.yml — Vox GitLab CI/CD Pipeline
#
# Equivalent to .github/workflows/ci.yml for GitLab.
# All steps use portable `cargo` commands — no GitHub Marketplace actions.
#
# To use:
#   1. Set up a GitLab Runner (any OS, or use shared runners)
#   2. For GPU training: register a self-hosted runner with the `gpu` tag
#   3. For docs: enable GitLab Pages in project settings

stages:
  - check
  - test
  - coverage
  - docs
  - ml-extract
  - ml-train

variables:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  # CI cache key
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  # Abstract VCS SHA (equivalent to github.sha)
  VCS_SHA: "${CI_COMMIT_SHA}"

# ── Cache ──────────────────────────────────────────────────────────────────
.cargo-cache: &cargo-cache
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .cargo/registry
      - .cargo/git
      - target/

# ── Rust setup ─────────────────────────────────────────────────────────────
.rust-setup: &rust-setup
  before_script:
    - rustup update stable && rustup default stable
    - rustup component add rustfmt clippy llvm-tools-preview

# ── Base template ──────────────────────────────────────────────────────────
.base:
  image: rust:latest
  <<: *cargo-cache
  <<: *rust-setup

# ── fmt ───────────────────────────────────────────────────────────────────
fmt:
  extends: .base
  stage: check
  script:
    - cargo fmt --all -- --check

# ── vox ci guards (parity with GitHub Actions) ─────────────────────────────
vox-ci-guards:
  extends: .base
  stage: check
  script:
    - cargo build -p vox-cli
    - cargo run -p vox-cli --quiet -- ci line-endings
    - cargo run -p vox-cli --quiet -- ci manifest
    - cargo run -p vox-cli --quiet -- ci check-codex-ssot
    - cargo run -p vox-cli --quiet -- ci check-docs-ssot
    - cargo run -p vox-cli --quiet -- ci command-compliance
    - cargo run -p vox-cli --quiet -- ci doc-inventory verify
    - cargo run -p vox-cli --quiet -- ci eval-matrix verify
    - cargo run -p vox-cli --quiet -- ci eval-matrix run --milestone m3-dei-contracts
    - cargo check -p vox-cli --features gpu
    - cargo run -p vox-cli --quiet -- ci workflow-scripts
    # GitHub `ci.yml` “Repository SSOT + MCP smoke” + mesh / workflow-runtime + `build-timings --crates`
    - cargo test -p vox-repository --lib && cargo test -p vox-orchestrator --lib detect_layout_node_workspaces && cargo test -p vox-mcp --lib && cargo check -p vox-git
    - cargo test -p vox-mesh --features transport
    - cargo test -p vox-workflow-runtime
    - cargo check -p vox-cli --features mesh,workflow-runtime
    - cargo run -p vox-cli --quiet -- ci build-timings --crates
    - cargo run -p vox-cli --quiet -- ci feature-matrix
    - cargo run -p vox-cli --quiet -- ci no-vox-dei-import
    - cargo run -p vox-cli --quiet -- ci toestub-scoped
    - cargo run -p vox-cli --quiet -- ci cuda-features
    - cargo run -p vox-cli --quiet -- ci mens-gate --profile ci_full

# ── build ─────────────────────────────────────────────────────────────────
build:
  extends: .base
  stage: check
  script:
    - cargo build --workspace
  artifacts:
    paths:
      - target/debug/vox
    expire_in: 1 hour

# ── clippy ────────────────────────────────────────────────────────────────
clippy:
  extends: .base
  stage: check
  script:
    - cargo clippy --workspace --all-targets -- -D warnings

# ── test ──────────────────────────────────────────────────────────────────
test:
  extends: .base
  stage: test
  script:
    # Integration/unit tests under llvm-cov run in `coverage`; keep doc tests + named integration here.
    - cargo test --workspace --doc
    # Integration tests
    - cargo test -p vox-integration-tests prompt_canonical_guardrails
    - cargo test -p vox-integration-tests parity_contract
    - cargo test -p vox-integration-tests greaterfool_reference
    - cargo test -p vox-integration-tests compression_layer
    - cargo test -p vox-integration-tests codegen_table_app_compiles -- --ignored

# ── Cranelift backend parity ─────────────────────────────────────────────
cranelift-parity:
  extends: .base
  stage: test
  allow_failure: true  # Soft failure for 2 weeks, then promote to required
  before_script:
    - rustup update stable && rustup default stable
    - rustup component add rustfmt clippy rustc-codegen-cranelift-preview
  variables:
    RUSTFLAGS: "-Zcodegen-backend=cranelift"
  script:
    - cargo build --workspace
    - cargo test --workspace
    - cargo test -p vox-integration-tests --test codegen_parity


# ── doc test ──────────────────────────────────────────────────────────────
doc-check:
  extends: .base
  stage: test
  script:
    - RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps

# ── coverage ──────────────────────────────────────────────────────────────
coverage:
  extends: .base
  stage: coverage
  script:
    - cargo install cargo-llvm-cov --locked
    - cargo install cargo-nextest --locked
    - cargo llvm-cov nextest --workspace --profile ci
    - cargo llvm-cov report --workspace --lcov --output-path lcov.info
    - cargo llvm-cov report --workspace --cobertura --output-path cobertura.xml
    - cargo llvm-cov report --workspace --text --summary-only
    - cargo llvm-cov report --workspace --json --summary-only --output-path llvm-cov-summary.json
    - cargo run -p vox-cli --quiet -- ci coverage-gates --summary-json llvm-cov-summary.json --mode enforce
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml
    paths:
      - lcov.info
      - cobertura.xml
      - llvm-cov-summary.json
    expire_in: 1 week

# ── TOESTUB ───────────────────────────────────────────────────────────────
toestub:
  extends: .base
  stage: check
  script:
    - cargo build -p vox-cli --bin vox --features stub-check --quiet 2>/dev/null || true
    - |
      if cargo run -p vox-cli --bin vox --features stub-check --quiet -- stub-check crates/ --severity error 2>/dev/null; then
        echo "OK: TOESTUB passed"
      else
        echo "WARN: TOESTUB found issues"
      fi

# ── link checker ──────────────────────────────────────────────────────────
link-check:
  extends: .base
  stage: check
  script:
    - cargo install lychee --locked
    - lychee --base . --verbose --no-progress '**/*.md' || true
  only:
    - main
    - merge_requests

# ── docs ──────────────────────────────────────────────────────────────────
build-docs:
  extends: .base
  stage: docs
  variables:
    MDBOOK_SITEMAP_DOMAIN: "https://vox-foundation.github.io/vox/"
  script:
    # Match .github/workflows/docs-deploy.yml (peaceiris/actions-mdbook mdbook-version).
    - cargo install mdbook --version 0.4.40 --locked
    - cargo install mdbook-sitemap-generator --version 0.2.0 --locked
    - cargo build -p vox-doc-pipeline
    - cargo run -p vox-doc-pipeline
    # Parity with .github/workflows/docs-deploy.yml: catch SUMMARY drift / structural issues before mdBook.
    - cargo run -p vox-doc-pipeline -- --check
    - mdbook build docs
    - cd docs && mdbook-sitemap-generator --domain "${MDBOOK_SITEMAP_DOMAIN}" --output book/html/sitemap.xml
  artifacts:
    paths:
      - docs/book/
    expire_in: 1 week
  only:
    - main

# GitLab Pages deployment (equivalent to GitHub Pages)
pages:
  stage: docs
  needs: [build-docs]
  script:
    - mv docs/book/ public/
  artifacts:
    paths:
      - public/
  only:
    - main

# ── ML: extract ───────────────────────────────────────────────────────────
ml-extract:
  extends: .base
  stage: ml-extract
  script:
    - cargo build -p vox-cli --release --quiet
    - ./target/release/vox ci grammar-drift --emit gitlab
    # Extract corpus (canonical flow aligned with GitHub Actions)
    - mkdir -p populi/data target/dogfood
    - ./target/release/vox corpus extract examples/ -o populi/data/validated.jsonl
    - ./target/release/vox corpus extract docs/ -o populi/data/validated.jsonl 2>/dev/null || true
    - ./target/release/vox corpus validate populi/data/validated.jsonl --no-recheck -o populi/data/validated.jsonl
    - ./target/release/vox corpus pairs populi/data/validated.jsonl -o target/dogfood/train.jsonl --docs docs/src/ --docs docs/src/research/ --docs docs/src/adr/
    - ./target/release/vox corpus prompt -o scripts/vox_system_prompt.txt
    - ./target/release/vox corpus eval target/dogfood/train.jsonl -o target/dogfood/eval_results.json --print-summary 2>/dev/null || true
    # Compute train hash for change detection
    - |
      if [ -f target/dogfood/train.jsonl ]; then
        sha256sum target/dogfood/train.jsonl | cut -d' ' -f1 > populi/data/train_hash.txt
      else
        echo "no-train-file" > populi/data/train_hash.txt
      fi
    # Commit if changed (portable git)
    - |
      if ! git diff --quiet populi/data/validated.jsonl 2>/dev/null || \
         ! git diff --quiet populi/data/grammar_fingerprint.txt 2>/dev/null || \
         ! git diff --quiet populi/data/train_hash.txt 2>/dev/null; then
        git config user.name "vox-ci"
        git config user.email "ci@vox-lang.dev"
        git add populi/data/validated.jsonl populi/data/grammar_fingerprint.txt populi/data/train_hash.txt scripts/vox_system_prompt.txt
        git diff --cached --quiet || git commit -m "chore: update validated ML training corpus [skip ci]"
        git push "https://oauth2:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:main
      fi
  artifacts:
    paths:
      - target/dogfood/train.jsonl
      - target/dogfood/eval_results.json
      - populi/data/
    expire_in: 30 days
  only:
    - main
  # Equivalent to GitHub's schedule trigger:
  # Set up a GitLab Pipeline Schedule at 4 AM UTC in CI/CD → Schedules

# ── ML: train (GPU, self-hosted) ──────────────────────────────────────────
# Native-only training (parity with GitHub). `NATIVE_TRAIN=false` is rejected.
ml-train:
  stage: ml-train
  needs: [ml-extract]
  tags:
    - gpu  # requires a self-hosted GitLab Runner with GPU
  variables:
    NATIVE_TRAIN: "true"
  rules:
    - if: '$FORCE_TRAIN == "true"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  script:
    - rustup update stable && rustup default stable
    - cargo build -p vox-cli --release --quiet
    - |
      COUNT=$(wc -l < target/dogfood/train.jsonl 2>/dev/null || echo 0)
      if [ "$COUNT" -lt "50" ]; then
        echo "WARNING: Only $COUNT training pairs (minimum 50). Skipping fine-tuning."
        exit 0
      fi
    - |
      if [ "${NATIVE_TRAIN:-true}" = "false" ]; then
        echo "ERROR: NATIVE_TRAIN=false is not supported; native training only (parity with GitHub)."
        exit 1
      fi
    - |
      export VOX_BACKEND=cpu
      export VOX_EVAL_MIN_PARSE_RATE=0.70
      export VOX_EVAL_MIN_COVERAGE=0.50
      export VOX_EVAL_STRICT=1
      ./target/release/vox train --native \
        --data-dir target/dogfood \
        --output-dir target/dogfood/run
  artifacts:
    paths:
      - target/dogfood/run/
    expire_in: 90 days

# ── Docker / Compose (parity with GitHub Actions; see docs/src/ci/workflow-enumeration.md) ──
mesh-compose-config:
  stage: check
  image: docker:26-cli
  variables:
    GIT_STRATEGY: fetch
  script:
    - docker compose -f examples/mesh-compose.yml config

docker-vox-image-smoke:
  stage: check
  image: docker:26-cli
  services:
    - name: docker:26-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    GIT_STRATEGY: fetch
  script:
    - |
      for i in $(seq 1 30); do docker info && break || sleep 1; done
    - docker build -t vox:ci-smoke .
    - docker build --build-arg VOX_CLI_FEATURES=populi,script-execution -t vox:ci-mesh .
  allow_failure: true
