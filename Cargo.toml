[workspace]
resolver = "2"
members = ["crates/*","crates/workspace-hack"]
exclude = [
    "crates/vox-arch-check/tests/fixtures/missing-desc",
    "crates/vox-plugin-host/tests/fixtures/noop-code",
    "crates/vox-plugin-host/tests/fixtures/noop-code-bad-abi",
    "crates/vox-plugin-noop-skill",
    "crates/vox-plugin-skill-compiler",
    "crates/vox-plugin-skill-git",
    "crates/vox-plugin-skill-memory",
    "crates/vox-plugin-skill-orchestrator",
    "crates/vox-plugin-skill-rag",
    "crates/vox-plugin-skill-testing",
    "crates/vox-plugin-skill-testing-validate",
    "crates/vox-plugin-skill-v0",
]
default-members = ["crates/vox-cli"]

[workspace.package]
version = "0.5.0"
edition = "2024"
license = "Apache-2.0"
authors = ["Bert Brainerd"]
repository = "https://github.com/vox-foundation/vox.git"
rust-version = "1.92"
keywords = ["vox", "language", "compilers"]
categories = ["development-tools", "compilers"]

[workspace.lints.rust]
unsafe_code = "warn"

[workspace.lints.clippy]
all = "warn"

[profile.dev]
incremental = true
split-debuginfo = "unpacked"
# Line tables only (vs full DWARF at debug=2). Backtraces and breakpoints still
# work. Cuts rlib size for first-party crates by ~70-80%; the 1.7 GB
# libvox_orchestrator rlib was the largest single contributor to the 86 GB
# target/ before this change.
debug = 1

[profile.dev.package."*"]
# Keep opt-level=1 for deps: parsing and serde noticeably faster at dev time.
# But strip their debug info — you almost never step into dep source in a
# debugger, and the savings compound across 40+ stale rlib copies in deps/.
opt-level = 1
debug = 0

