[workspace]
resolver = "2"
members = ["crates/*","crates/workspace-hack"]
default-members = ["crates/vox-cli"]

[workspace.package]
version = "0.4.0"
edition = "2024"
license = "Apache-2.0"
authors = ["Bert Brainerd"]
repository = "https://github.com/vox-foundation/vox.git"
rust-version = "1.92"
keywords = ["vox", "language", "compilers"]
categories = ["development-tools", "compilers"]

[workspace.lints.rust]
unsafe_code = "warn"

[workspace.lints.clippy]
all = "warn"

[profile.dev]
incremental = true
split-debuginfo = "unpacked"

[profile.dev.package."*"]
opt-level = 1

[workspace.dependencies]
workspace-hack            = { path = "crates/workspace-hack" }
# Internal crates

vox-capability-registry   = { path = "crates/vox-capability-registry" }
vox-clavis                = { path = "crates/vox-clavis" }
vox-cli                   = { path = "crates/vox-cli" }
vox-bounded-fs            = { path = "crates/vox-bounded-fs" }
vox-browser               = { path = "crates/vox-browser" }
vox-compiler              = { path = "crates/vox-compiler" }
vox-config                = { path = "crates/vox-config" }
vox-container             = { path = "crates/vox-container" }
vox-checksum-manifest     = { path = "crates/vox-checksum-manifest" }
vox-install-policy        = { path = "crates/vox-install-policy" }
vox-jsonschema-util       = { path = "crates/vox-jsonschema-util" }
vox-corpus                = { path = "crates/vox-corpus" }
vox-db                    = { path = "crates/vox-db" }
vox-eval                  = { path = "crates/vox-eval" }
vox-forge                 = { path = "crates/vox-forge" }
vox-crypto                = { path = "crates/vox-crypto" }
vox-identity              = { path = "crates/vox-identity" }

vox-audio-ingress         = { path = "crates/vox-audio-ingress" }
vox-build-meta            = { path = "crates/vox-build-meta" }
vox-doc-inventory         = { path = "crates/vox-doc-inventory" }
vox-doc-pipeline          = { path = "crates/vox-doc-pipeline" }
vox-integration-tests     = { path = "crates/vox-integration-tests" }
vox-mcp-meta              = { path = "crates/vox-mcp-meta" }
vox-mcp-registry          = { path = "crates/vox-mcp-registry" }
vox-schola                = { path = "crates/vox-schola" }
vox-scientia-api          = { path = "crates/vox-scientia-api" }
vox-scientia-core         = { path = "crates/vox-scientia-core" }
vox-scientia-runtime      = { path = "crates/vox-scientia-runtime" }
vox-scientia-social       = { path = "crates/vox-scientia-social" }
vox-scientia-ingest       = { path = "crates/vox-scientia-ingest" }
vox-test-harness          = { path = "crates/vox-test-harness" }
vox-tools                 = { path = "crates/vox-tools" }
vox-webhook               = { path = "crates/vox-webhook" }
vox-git                   = { path = "crates/vox-git" }
vox-constrained-gen       = { path = "crates/vox-constrained-gen" }
vox-grammar-export        = { path = "crates/vox-grammar-export" }
vox-lsp                   = { path = "crates/vox-lsp" }
vox-ludus                 = { path = "crates/vox-ludus" }
vox-populi                = { path = "crates/vox-populi" }
vox-mens                  = { path = "crates/vox-mens" }
vox-mesh-types            = { path = "crates/vox-mesh-types" }

vox-oratio                = { path = "crates/vox-oratio" }
