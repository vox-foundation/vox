# External dependencies (centralized versions)
logos              = "0.16"
clap               = { version = "4.5", features = ["derive"] }
clap_complete      = { version = "4.5" }
serde              = { version = "1", features = ["derive"] }
serde_json         = "1"
serde_yaml         = "0.9"
toml               = "0.8"
miette             = { version = "7.6", features = ["fancy"] }
aho-corasick       = "1"
tokio              = { version = "1", features = ["rt", "macros", "sync", "time", "net", "process", "io-util", "fs", "rt-multi-thread", "signal"] }
tokio-stream       = { version = "0.1", default-features = false }
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
anyhow             = "1"
reqwest            = { version = "0.12", features = ["json", "rustls-tls", "stream"], default-features = false }
bsky-sdk = { version = "0.1", default-features = false, features = ["atrium-xrpc-client", "rich-text", "default-client"] }
atrium-api = { version = "0.25", default-features = false, features = ["bluesky"] }
sha2               = "0.10"
sha3               = "0.10"
bincode            = "2"
data-encoding      = "2"
thiserror          = "1"
base64             = "0.22"
owo-colors         = "4"
chrono             = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
regex              = "1"
comfy-table        = "7"
tempfile           = "3"
turso              = { version = "0.4", default-features = false, features = ["sync"] }
blake3             = "1"
jsonwebtoken       = { version = "9", default-features = false }
ed25519-dalek      = { version = "2", default-features = false }
insta              = { version = "1", features = ["json"] }
async-trait        = "0.1"
futures-util       = "0.3"
glob               = "0.3"
hound              = "3.5.1"
dirs               = "6"
uuid               = { version = "1", features = ["v4", "serde"] }
async-stream       = "0.3"
xxhash-rust        = { version = "0.8", features = ["xxh3"] }
sysinfo            = "0.38"
walkdir            = "2"
rayon              = "1.10"
rand               = { version = "0.8", features = ["small_rng", "std_rng"] }
burn               = { version = "0.19", default-features = false, features = ["std", "ndarray"] }
candle-core        = { version = "0.9", default-features = false }
candle-nn          = { version = "0.9", default-features = false }
safetensors        = "0.4"
tokenizers         = "0.21"
memmap2            = "0.9"
# 0.4+ resolves Hugging Face relative `Location` redirects in tokio metadata (0.3 breaks with `relative URL without a base`).
hf-hub             = { version = "0.4" }
keyring            = "3"
qlora-rs           = "1.0.5"
peft-rs            = "1.0"
bytes              = "1"
schemars           = { version = "1", features = ["derive"] }
jsonschema         = { version = "0.26", default-features = false }
openapiv3          = "2"
governor           = "0.10"
strum              = { version = "0.26", features = ["derive"] }
serial_test        = "3"
wiremock           = "0.6"
tantivy            = "0.22"
scraper            = "0.20"
html2text          = "0.12"
# Optional NVIDIA management library bindings (runtime `nvml.dll` / `libnvidia-ml.so`).
nvml-wrapper       = { version = "0.11", default-features = false }
# Wave 5: Async mesh results
dashmap            = { version = "6", default-features = false }
rust_decimal       = { version = "1.36", features = ["serde", "db-diesel-postgres"], default-features = false }
aes-gcm            = "0.10"
unicode-segmentation = "1.12"
argon2             = "0.5"

# [VOX AUDIT 2026-04-13] Centralized sprawling versions found in sub-crates
axum               = { version = "0.8", default-features = false }
axum-extra         = "0.12.5"
tower-http         = "0.6.2"
subtle             = "2.6"
futures            = "0.3"
chacha20poly1305   = "0.10"
aead               = { version = "0.5", features = ["std"] }
gix                = { version = "0.70", default-features = false }
jj-lib             = { version = "=0.27.0", default-features = false }
wasmtime           = "42.0.1"
wasmtime-wasi      = "42.0.1"
zip                = "8.4.0"
self_update        = "0.43.1"
landlock           = "0.4.4"
win32job           = "2"
windows-sys        = "0.59"
tavily             = "2.1.0"
quick-xml          = "0.31"
flate2             = "1"
tokio-tungstenite  = { version = "0.24", default-features = false }
rubato             = "0.15.0"
symphonia          = "0.5.4"
sherpa-onnx        = "1.12"
