[patch.crates-io]
# Vox: stabilize deep o_proj proxy stacks + correct grad-accum scaling in `training_step_lm`.
qlora-rs = { path = "patches/qlora-rs-1.0.5" }
# Vox: pass -ccbin MSVC cl path via cc::Build to avoid missing cl.exe when running cargo build without developer prompt.
candle-kernels = { path = "patches/candle-kernels-0.9.2" }
# Vox: enable pure-rust crypto on all targets so MSVC builds do not require clang-cl (aegis C backend).
aegis = { path = "patches/aegis-0.9.8" }

[profile.release]
lto = "thin"
strip = "debuginfo"

[profile.ci]
inherits = "release"
lto = "thin"
strip = "debuginfo"

# Distribution profile: fat LTO + single codegen unit + symbol stripping.
# Produces the smallest, fastest binaries for shipping.
# Use: cargo build --profile dist -p vox-cli
# (Keep --release for fast local builds; --profile dist is for CI ship artifacts.)
[profile.dist]
inherits = "release"
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"


