# Examples layout — single source of truth for CI and contributors.
# Policy:
# - Every `*.vox` under `examples/` must lie under `golden_roots` (full golden pipeline)
#   or `negative_roots` (intentionally invalid parser fixtures).
# - mdBook `{{#include}}` paths in `doc_roots` must resolve to files under `examples/golden/`.
schema_version: 1

golden_roots:
  - examples/golden

negative_roots:
  - examples/parser-inventory

doc_roots:
  - docs/src
