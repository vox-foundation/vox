[book]
title = "Vox: The Engineering Manual"
authors = ["The Vox Core Team"]
description = "Official documentation for the Vox AI-native programming language."
src = "src"

[output.html]
mathjax-support = false
git-repository-url = "https://github.com/vox-foundation/vox"
# mdbook 0.5: use `fab-` (brands) for GitHub. `fa-github` maps to the "regular" set and fails with "Missing font github".
git-repository-icon = "fab-github"
edit-url-template = "https://github.com/vox-foundation/vox/edit/main/docs/src/{path}"

[output.html.search]
enable = true
limit-results = 100
teaser-word-count = 50
use-boolean-and = true
expand = true
heading-split-level = 3
copy-js = true
