# Toolchain: CI uses mdBook **0.4.40** (GitHub `peaceiris/actions-mdbook`, GitLab job below).
# Newer mdBook releases may break `mdbook-metadata` / preprocessor stdin compatibility — align locally before debugging build failures.
[book]
title = "Vox: The AI-Native Programming Language"
authors = ["The Vox Core Team"]
description = "Official documentation for Vox, the AI-native full-stack programming language that compiles to Rust and TypeScript. Tutorials, API reference, architecture guides, and examples."
src = "src"

[preprocessor.metadata]
# Reads YAML frontmatter and injects <meta> tags into <head>.
# Requires: mdbook-metadata
renderer = ["html"]

# Sitemap: generated **after** `mdbook build` via `mdbook-sitemap-generator` (standalone CLI; not an mdBook preprocessor).
# CI: `.github/workflows/docs-deploy.yml` and `.gitlab-ci.yml` `build-docs`. Local: `cargo install mdbook-sitemap-generator --locked`
# then from `docs/`: `mdbook-sitemap-generator --domain <origin> --output book/sitemap.xml`

[output.html]
additional-css = ["theme/custom.css"]
additional-js = ["theme/highlight-vox.js", "theme/mermaid.min.js", "theme/mermaid-init.js"]
copy-fonts = true
mathjax-support = false
git-repository-url = "https://github.com/vox-foundation/vox"
git-repository-icon = "fab-github"
edit-url-template = "https://github.com/vox-foundation/vox/edit/main/docs/{path}"

[preprocessor.mermaid]
command = "mdbook-mermaid"


[output.html.search]
enable = true
limit-results = 100
teaser-word-count = 50
use-boolean-and = true
expand = true
heading-split-level = 3
copy-js = true


