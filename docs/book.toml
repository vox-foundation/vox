[book]
title = "Vox: The AI-Native Programming Language"
authors = ["The Vox Core Team"]
description = "Official documentation for Vox, the AI-native full-stack programming language that compiles to Rust and TypeScript. Tutorials, API reference, architecture guides, and examples."
src = "src"

[preprocessor.metadata]
# Reads YAML frontmatter and injects <meta> tags into <head>.
# Requires: mdbook-metadata
renderer = ["html"]

[preprocessor.sitemap]
# Requires: mdbook-sitemap-generator
command = "mdbook-sitemap-generator"
domain = "https://vox-foundation.github.io/vox/"
optional = true

[output.html]
mathjax-support = false
git-repository-url = "https://github.com/vox-foundation/vox"
git-repository-icon = "fab-github"
edit-url-template = "https://github.com/vox-foundation/vox/edit/main/docs/src/{path}"

[output.html.search]
enable = true
limit-results = 100
teaser-word-count = 50
use-boolean-and = true
expand = true
heading-split-level = 3
copy-js = true


