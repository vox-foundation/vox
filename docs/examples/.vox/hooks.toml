# Vox DEI Shell Hook Configuration — Example
#
# Place this file at `.vox/hooks.toml` in your workspace root or reference
# it via `OrchestratorConfig.hooks` in `vox.toml` under `[dei.hooks]`.
#
# Each [[hooks]] block registers a shell hook for a specific lifecycle event.
# Hooks receive a JSON payload on stdin and may return a JSON response on stdout.
# Blocking hooks (PreToolUse) can reject the task by exiting with a non-zero code
# and optionally writing { "decision": "block", "reason": "..." } to stdout.
#
# Supported events:
#   pre_tool_use       - Fires before a task is enqueued. Blocking by default.
#   post_tool_use      - Fires after a task completes. Non-blocking.
#   session_start      - Fires when a new agent session is created. Non-blocking.
#   session_stop       - Fires when an archived session is removed. Non-blocking.
#   user_prompt_submit - Fires when a user message is added to a session. Non-blocking.
#   notification       - Fires on system events (conflicts, escalations). Non-blocking.

# ─────────────────────────────────────────────────────────────────────────────
# Pre-tool-use: block task submission if cargo check fails for the affected crate.
# The hook receives the full file manifest, so the script can determine which
# crate(s) are affected and run a targeted check.
# ─────────────────────────────────────────────────────────────────────────────
[[hooks]]
event = "pre_tool_use"
command = [".vox/hooks/cargo-check-gate.sh"]
blocking = true
timeout_ms = 30_000

# ─────────────────────────────────────────────────────────────────────────────
# Post-tool-use: log every completed task to a local JSONL audit log.
# Non-blocking — the task has already succeeded; a slow log write doesn't matter.
# ─────────────────────────────────────────────────────────────────────────────
[[hooks]]
event = "post_tool_use"
command = [".vox/hooks/log-task.sh"]
blocking = false

# ─────────────────────────────────────────────────────────────────────────────
# Notification: forward conflict and escalation events to a Slack webhook.
# ─────────────────────────────────────────────────────────────────────────────
[[hooks]]
event = "notification"
command = [".vox/hooks/notify-slack.sh"]
blocking = false
timeout_ms = 5_000

# ─────────────────────────────────────────────────────────────────────────────
# Session lifecycle: emit OpenTelemetry spans for session creation and teardown.
# ─────────────────────────────────────────────────────────────────────────────
[[hooks]]
event = "session_start"
command = ["python3", ".vox/hooks/otel_span.py", "session_start"]
blocking = false

[[hooks]]
event = "session_stop"
command = ["python3", ".vox/hooks/otel_span.py", "session_stop"]
blocking = false
