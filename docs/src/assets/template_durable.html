<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Durable State Architecture</title>
    <style>
        :root {
            --violet: #b57cff;
            --emerald: #33ff99;
            --amber: #ffaa00;
            --cyan: #00f0ff;
            --err: #ff4444;
            --grid: rgba(255,255,255,0.06);
        }

        body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: #050508;
            font-family: 'Consolas', 'Courier New', monospace;
            color: white; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #composite-stage {
            width: 80vh; max-width: 90vw;
            aspect-ratio: 1 / 1;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(20,20,30,0.8), rgba(0,0,0,1));
            border-radius: 1vmin; border: 1px solid rgba(255,255,255,0.1);
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 4% 4%; /* Square grid to match 1:1 */
            overflow: hidden;
        }

        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 25%; height: 26%;
            z-index: 10;
            transform: translate(-50%, -50%);
        }
        
        .node .asset {
            max-width: 100%; max-height: 70%;
            object-fit: contain;
            filter: brightness(1.5) contrast(1.2) drop-shadow(0 1% 2% rgba(0,0,0,0.8));
            transition: filter 0.2s ease;
        }
        
        /* Aligning the MCP Portal Staff perfectly */
        #img-portal { transform: translateX(4%) translateY(8%); }

        #node-vault .asset { animation: arca-flare 20s infinite; }
        @keyframes arca-flare {
            0%, 46% { filter: brightness(1.5) contrast(1.2); }
            48%, 55% { filter: brightness(2) contrast(1.5) drop-shadow(0 0 4% var(--cyan)); }
            58%, 100% { filter: brightness(1.5) contrast(1.2); }
        }

        .node .label {
            margin-top: -2%;
            background: rgba(10,10,15,0.9);
            border: 0.2cqw solid #444;
            padding: 2% 4%;
            border-radius: 0.5rem;
            font-size: 1.5cqw; font-weight: bold;
            box-shadow: 0 1% 2% rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
            text-align: center;
        }

        /* Adjusted Fixed Node Positioning for perfectly dense 1:1 space */
        #node-portal { left: 30%; top: 15%; width: 35%; height: 26%; }
        #node-workflow { left: 30%; top: 50%; width: 35%; height: 26%; }
        #node-vault { left: 30%; top: 85%; width: 38%; height: 26%; }
        #node-worker1 { left: 75%; top: 30%; width: 30%; height: 26%; }
        #node-worker2 { left: 75%; top: 70%; width: 30%; height: 26%; }

        #node-portal .label { border-left-color: white; color: white; }
        #node-workflow .label { border-left-color: var(--violet); color: var(--violet); }
        #node-vault .label { border-left-color: var(--cyan); color: var(--cyan); }
        
        /* DATA PACKETS */
        .packet {
            position: absolute;
            background: white; color: black;
            font-weight: bold; font-size: 1.3cqw;
            padding: 0.6% 1.5%; border-radius: 20px;
            z-index: 20; transform: translate(-50%, -50%);
            opacity: 0; white-space: nowrap; pointer-events: none;
        }

        /* SVG TRACKS & CABLES */
        svg.routing { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; }
        
        /* Stopped the spine at 25 instead of 15 so it connects cleanly into the staff of the projector, not behind it entirely */
        .track-base { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 0.5%; stroke-linecap: round; }
        
        .track-w1 { fill: none; stroke-width: 0.5%; stroke-linecap: round; animation: w1-track-die 20s infinite; }
        @keyframes w1-track-die {
            0%, 25% { stroke: rgba(255,255,255,0.08); stroke-dasharray: none; }
            26%, 28% { stroke: var(--err); stroke-width: 0.8%; }
            29%, 100% { stroke: rgba(255,0,0,0.2); stroke-dasharray: 2 10; }
        }

        .track-w2 { fill: none; stroke-width: 0.5%; stroke-linecap: round; stroke: rgba(255,255,255,0.08); animation: w2-track-born 20s infinite; }
        @keyframes w2-track-born {
            0%, 55% { opacity: 0; }
            56%, 60% { opacity: 1; stroke: white; }
            61%, 100% { opacity: 1; stroke: rgba(255,255,255,0.08); }
        }

        /* SCENE ANIMATION SEQUENCES */

        /* 1) 0-2s: Workflow Commits to Vault */
        #pkt-commit { animation: p-cmt 20s infinite ease-in-out; background: var(--violet); color: white; box-shadow: 0 0 2% var(--violet); }
        @keyframes p-cmt {
            0%, 2% { left: 30%; top: 50%; opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
            4% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            12% { left: 30%; top: 85%; opacity: 1; transform: translate(-50%,-50%) scale(1); }
            13%, 100% { left: 30%; top: 85%; opacity: 0; }
        }

        /* 2) 2-4s: Workflow dispatches to Worker 1 */
        #pkt-exec1 { animation: p-ex1 20s infinite ease-in-out; background: var(--amber); box-shadow: 0 0 2% var(--amber); }
        @keyframes p-ex1 {
            0%, 14% { left: 30%; top: 50%; opacity: 0; }
            15% { opacity: 1; }
            24% { left: 75%; top: 30%; opacity: 1; }
            25%, 100% { left: 75%; top: 30%; opacity: 0; }
        }

        /* 3) 4-6.5s: FAULT - Slower Splintering Read */
        #pkt-err { animation: p-err 20s infinite cubic-bezier(0.2, 1, 0.3, 1); background: var(--err); color: white; box-shadow: 0 0 4% var(--err); }
        @keyframes p-err {
            0%, 25% { left: 75%; top: 30%; opacity: 0; }
            26% { opacity: 1; transform: translate(-50%,-50%); }
            33% { left: 65%; top: 45%; opacity: 1; transform: translate(-50%,-50%) rotate(-10deg); } /* Floats readably */
            36% { left: 55%; top: 60%; opacity: 0; transform: translate(-50%,-50%) rotate(-20deg); } /* Then falls */
            37%, 100% { opacity: 0; }
        }
        
        #node-worker1 .asset { animation: w1-crash 20s infinite; }
        @keyframes w1-crash {
            0%, 25% { filter: brightness(1.5) contrast(1.2); }
            26%, 28% { filter: brightness(3) sepia(1) hue-rotate(330deg) drop-shadow(0 0 4% var(--err)); }
            29%, 100% { filter: brightness(0.1) grayscale(1); }
        }
        #node-worker1 .label::after { animation: w1-label 20s infinite; content: "Worker: RACK_A"; color: #555; }
        @keyframes w1-label {
            0%, 25% { content: "Worker: RACK_A"; color: #555; }
            26%, 28% { content: "EXEC: charge_card()"; color: white; border-color: var(--amber); }
            29%, 100% { content: "CONNECTION LOST"; color: var(--err); border-color: var(--err); text-decoration: line-through; }
        }

        /* 4) 5.5s-6.5s: Fetch from Vault */
        #pkt-fetch { animation: p-fch 20s infinite ease-in-out; background: var(--amber); color: black; box-shadow: 0 0 1% var(--amber); }
        @keyframes p-fch {
            0%, 35% { left: 30%; top: 50%; opacity: 0; }
            37% { opacity: 1; }
            45% { left: 30%; top: 85%; opacity: 1; }
            46%, 100% { left: 30%; top: 85%; opacity: 0; }
        }

        /* 5) 6.5s-8.5s: DATA MASSING */
        #pkt-rehyd { animation: p-reh 20s infinite ease-out; background: transparent; color: var(--cyan); border: 0.3cqw solid var(--cyan); box-shadow: 0 0 5% var(--cyan) inset, 0 0 5% var(--cyan); font-size: 2cqw; border-radius: 0; }
        @keyframes p-reh {
            0%, 46% { left: 30%; top: 85%; opacity: 0; }
            48% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            58% { left: 30%; top: 50%; opacity: 1; transform: translate(-50%, -50%) scale(1); }
            60%, 100% { left: 30%; top: 50%; opacity: 0; }
        }

        /* 6) 8.5s-10.5s: NEW LANE DISPATCH */
        #pkt-exec2 { animation: p-ex2 20s infinite ease-in-out; background: var(--amber); box-shadow: 0 0 2% var(--amber); }
        @keyframes p-ex2 {
            0%, 61% { left: 30%; top: 50%; opacity: 0; }
            63% { opacity: 1; }
            72% { left: 75%; top: 70%; opacity: 1; }
            74%, 100% { left: 75%; top: 70%; opacity: 0; }
        }

        /* 7) 10.5s-12.5s: Success */
        #node-worker2 .asset { animation: w2-alive 20s infinite; filter: brightness(0.2) grayscale(1); }
        @keyframes w2-alive {
            0%, 65% { filter: brightness(0.2) grayscale(1); }
            68%, 85% { filter: brightness(1.5) contrast(1.2) drop-shadow(0 0 2% var(--emerald)); }
            88%, 100% { filter: brightness(0.2) grayscale(1); }
        }
        #node-worker2 .label::after { animation: w2-label 20s infinite; content: "Worker: RACK_B"; color: #555; }
        @keyframes w2-label {
            0%, 65% { content: "Worker: RACK_B"; color: #555; }
            66%, 80% { content: "EXEC: charge_card()"; color: white; border-color: var(--emerald); }
            81%, 100% { content: "Worker: RACK_B"; color: #555; }
        }

        #pkt-res { animation: p-res 20s infinite ease-in-out; background: var(--emerald); color: black; box-shadow: 0 0 2% var(--emerald); }
        @keyframes p-res {
            0%, 78% { left: 75%; top: 70%; opacity: 0; }
            80% { opacity: 1; }
            88% { left: 30%; top: 50%; opacity: 1; }
            90%, 100% { left: 30%; top: 50%; opacity: 0; }
        }

        /* 8) 12.5s-14.5s: Portal Broadcast */
        #pkt-out { animation: p-out 20s infinite ease-in-out; background: white; color: black; box-shadow: 0 0 3% white; }
        /* Stops at 25% height perfectly tracking the dish instead of tearing entirely out of bound */
        @keyframes p-out {
            0%, 88% { left: 30%; top: 50%; opacity: 0; }
            90% { opacity: 1; }
            96% { left: 30%; top: 25%; opacity: 1; }
            98%, 100% { left: 30%; top: 25%; opacity: 0; }
        }
        
        #node-portal .asset { animation: pl-flare 20s infinite; }
        @keyframes pl-flare {
            0%, 91% { filter: brightness(1) drop-shadow(0 0 0 transparent); }
            94%, 97% { filter: brightness(2.5) drop-shadow(0 0 4% white); }
            100% { filter: brightness(1) drop-shadow(0 0 0 transparent); }
        }
    </style>
</head>
<body>
    <div id="composite-stage">
        
        <svg class="routing" viewBox="0 0 100 100" preserveAspectRatio="none">
            <!-- Adjusted SVG line to stop exactly at 25% Y on new 30% X Spine -->
            <path class="track-base" d="M 30 25 L 30 85" />
            <path class="track-w1" d="M 30 50 L 75 30" />
            <path class="track-w2" d="M 30 50 L 75 70" />
        </svg>

        <div class="node" id="node-portal">
            <img id="img-portal" class="asset" />
            <div class="label">@mcp.tool</div>
        </div>
        
        <div class="node" id="node-workflow">
            <img id="img-workflow" class="asset" />
            <div class="label">workflow checkout()</div>
        </div>
        
        <div class="node" id="node-vault">
            <img id="img-vault" class="asset" />
            <div class="label">SQLite [ APPEND ONLY ]</div>
        </div>

        <div class="node" id="node-worker1">
            <img id="img-worker1" class="asset" />
            <div class="label"></div>
        </div>

        <div class="node" id="node-worker2">
            <img id="img-worker2" class="asset" />
            <div class="label"></div>
        </div>

        <!-- PACKETS -->
        <div id="pkt-commit" class="packet">log_state(04A)</div>
        <div id="pkt-exec1" class="packet">charge_card(req)</div>
        <div id="pkt-err" class="packet">[ DEAD OOM EVENT ]</div>
        <div id="pkt-fetch" class="packet">query(ID:04A)</div>
        <div id="pkt-rehyd" class="packet">>> REHYDRATED_STATE_BLOB <<</div>
        <div id="pkt-exec2" class="packet">charge_card(req)</div>
        <div id="pkt-res" class="packet">Result: Ok(tx_123)</div>
        <div id="pkt-out" class="packet">Exposing MCP State</div>
    </div>

<script>
const imgs = [
    {id: 'img-portal', b64: 'data:image/png;base64,{{PORTAL_B64}}'},
    {id: 'img-workflow', b64: 'data:image/png;base64,{{WORKFLOW_B64}}'},
    {id: 'img-worker1', b64: 'data:image/png;base64,{{WORKER_B64}}'},
    {id: 'img-worker2', b64: 'data:image/png;base64,{{WORKER_B64}}'},
    {id: 'img-vault', b64: 'data:image/png;base64,{{VAULT_B64}}'}
];

imgs.forEach(item => {
    let rawImg = new Image();
    rawImg.src = item.b64;
    rawImg.onload = () => {
        let canvas = document.createElement('canvas');
        canvas.width = rawImg.width; canvas.height = rawImg.height;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(rawImg, 0, 0);
        let imgData = ctx.getImageData(0,0, canvas.width, canvas.height);
        let d = imgData.data;
        for(let i=0; i<d.length; i+=4) {
            let r=d[i], g=d[i+1], b=d[i+2];
            if (r > 180 && b > 180 && g < 100) { 
                d[i+3] = 0; 
            } else if (r > 120 && b > 120 && g < 120 && Math.abs(r-b) < 30) {
                d[i+3] = Math.max(0, d[i+3] - 180);
            }
        }
        ctx.putImageData(imgData, 0, 0);
        document.getElementById(item.id).src = canvas.toDataURL();
    };
});
</script>
</body>
</html>
