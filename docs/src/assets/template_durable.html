<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Durable State Architecture</title>
    <style>
        :root {
            --violet: #b57cff;
            --emerald: #33ff99;
            --amber: #ffaa00;
            --cyan: #00f0ff;
            --err: #ff4444;
            --grid: rgba(255,255,255,0.06);
            --dim: rgba(255,255,255,0.08);
        }

        body {
            /* Force the recording viewport to have zero wasted space */
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background: #050508;
            font-family: 'Consolas', 'Courier New', monospace;
            color: white; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #composite-stage {
            /* When recorded at 960x960 window size, this fills the entire frame edge-to-edge natively */
            width: 100vw; height: 100vh;
            position: relative;
            background: radial-gradient(circle at 50% 50%, rgba(20,20,30,0.8), rgba(0,0,0,1));
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 4% 4%;
            overflow: hidden;
        }

        .node { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transform: translate(-50%, -50%); }
        .node .asset { max-width: 100%; max-height: 70%; object-fit: contain; filter: brightness(1) contrast(1.2) drop-shadow(0 1% 2% rgba(0,0,0,0.8)); transition: filter 0.2s ease; }
        .node .label { margin-top: -2%; background: rgba(5,5,10,0.95); border: 0.3vh solid #666; padding: 2vh 4.5vh; border-radius: 0.8rem; font-size: 2.4vh; font-weight: bold; box-shadow: 0 1vh 2vh rgba(0,0,0,0.9); backdrop-filter: blur(5px); text-align: center; }

        #node-portal { left: 30%; top: 15%; width: 35%; height: 26%; }
        #node-workflow { left: 30%; top: 50%; width: 35%; height: 26%; }
        #node-vault { left: 30%; top: 85%; width: 38%; height: 26%; }
        #node-worker1 { left: 75%; top: 30%; width: 30%; height: 26%; }
        #node-worker2 { left: 75%; top: 70%; width: 30%; height: 26%; }

        #img-portal { transform: translateX(2%) translateY(12%); }

        /* NODE ANIMATIONS (SYNCED STRICTLY TO TIMELINE) */

        /* Loop-seam policy: every keyframe must end (100%) in the same visual
           state it begins (0%). The final 95-100% segment is a "settle" tail
           that smoothly returns each element to its initial state, so the
           20s loop reads as continuous instead of snapping back. */

        #node-workflow .asset { animation: nx-wf 20s infinite; }
        @keyframes nx-wf {
            0%, 9%, 18%, 38%, 48%, 68%, 88%, 100% { filter: brightness(1); }
            10%, 15%, 40%, 45%, 60%, 65%, 90%, 93% { filter: brightness(2) drop-shadow(0 0 2vh var(--violet)); }
        }

        #node-vault .asset { animation: nx-va 20s infinite; }
        @keyframes nx-va {
            0%, 7%, 38%, 48%, 100% { filter: brightness(1); }
            8%, 12% { filter: brightness(2) drop-shadow(0 0 2vh var(--cyan)); }
            40%, 45% { filter: brightness(3) drop-shadow(0 0 5vh var(--cyan)); }
        }

        #node-worker1 .asset { animation: nx-w1 20s infinite; }
        @keyframes nx-w1 {
            0%, 18% { filter: brightness(1); }
            19%, 20% { filter: brightness(2) drop-shadow(0 0 2vh var(--amber)); }
            21%, 23% { filter: brightness(3) sepia(1) hue-rotate(330deg) drop-shadow(0 0 3vh var(--err)); }
            24%, 95% { filter: brightness(0.1) grayscale(1); }
            100% { filter: brightness(1); }
        }
        #node-worker1 .label { animation: nx-w1l 20s infinite; }
        @keyframes nx-w1l {
            0%, 18% { border-color: #444; color: white; text-decoration: none; }
            19%, 23% { border-color: var(--amber); color: var(--amber); text-decoration: none; }
            24%, 95% { border-color: var(--err); color: var(--err); text-decoration: line-through; }
            100% { border-color: #444; color: white; text-decoration: none; }
        }

        #node-worker2 .asset { animation: nx-w2 20s infinite; filter: brightness(0.1) grayscale(1); }
        @keyframes nx-w2 {
            0%, 68% { filter: brightness(0.1) grayscale(1); }
            69%, 78% { filter: brightness(2) drop-shadow(0 0 2vh var(--emerald)); }
            79%, 95% { filter: brightness(0.5); }
            100% { filter: brightness(0.1) grayscale(1); }
        }
        #node-worker2 .label { animation: nx-w2l 20s infinite; }
        @keyframes nx-w2l {
            0%, 68% { border-color: #444; color: #555; }
            69%, 78% { border-color: var(--emerald); color: var(--emerald); }
            79%, 95% { border-color: #444; color: white; }
            100% { border-color: #444; color: #555; }
        }

        #node-portal .asset { animation: nx-po 20s infinite; }
        @keyframes nx-po {
            0%, 89% { filter: brightness(1); }
            91%, 93% { filter: brightness(4) drop-shadow(0 0 5vh white); }
            95%, 100% { filter: brightness(1); }
        }

        /* SVG TRACKS */
        svg.routing { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; }
        .base-line { fill: none; stroke: var(--dim); stroke-width: 0.5vh; stroke-linecap: round; }

        .trk-spine { fill: none; stroke-width: 0.5vh; stroke-linecap: round; animation: tk-sp 20s infinite; }
        @keyframes tk-sp {
            0%, 9% { stroke: var(--violet); }
            10%, 29% { stroke: var(--dim); }
            30%, 39% { stroke: var(--amber); }
            40%, 49% { stroke: var(--cyan); stroke-width: 0.8vh; }
            50%, 95% { stroke: var(--dim); }
            100% { stroke: var(--violet); }
        }

        .trk-w1 { fill: none; stroke-width: 0.5vh; stroke-linecap: round; animation: tk-w1 20s infinite; }
        @keyframes tk-w1 {
            0%, 9% { stroke: var(--dim); stroke-dasharray: none; }
            10%, 19% { stroke: var(--amber); stroke-dasharray: none; }
            20%, 23% { stroke: var(--err); stroke-width: 0.8vh; }
            24%, 95% { stroke: rgba(255,0,0,0.2); stroke-dasharray: 2vh 10vh; }
            100% { stroke: var(--dim); stroke-dasharray: none; }
        }

        .trk-w2 { fill: none; stroke-width: 0.5vh; stroke-linecap: round; animation: tk-w2 20s infinite; }
        @keyframes tk-w2 {
            0%, 49% { stroke: transparent; }
            50%, 59% { stroke: white; stroke-dasharray: 5vh 15vh; stroke-dashoffset: 100vh; }
            60%, 69% { stroke: var(--dim); stroke-dasharray: none; }
            70%, 79% { stroke: var(--amber); stroke-dasharray: none; }
            80%, 89% { stroke: var(--emerald); stroke-dasharray: none; }
            90%, 95% { stroke: var(--dim); }
            100% { stroke: transparent; }
        }

        .trk-po { fill: none; stroke-width: 0.5vh; stroke-linecap: round; animation: tk-po 20s infinite; }
        @keyframes tk-po {
            0%, 88% { stroke: var(--dim); }
            90%, 93% { stroke: white; }
            95%, 100% { stroke: var(--dim); }
        }

        /* DATA PACKETS */
        .packet {
            position: absolute; padding: 1.8vh 3vh; border-radius: 4vh;
            z-index: 20; transform: translate(-50%, -50%); opacity: 0;
            font-weight: bold; font-size: 2.6vh; pointer-events: none;
            display: flex; align-items: center; gap: 1.2vh;
            white-space: nowrap;
        }

        #pkt-commit { animation: p-cmt 20s infinite linear; background: #0c0818; color: var(--violet); border: 2px solid var(--violet); box-shadow: 0 0 2vh var(--violet); }
        @keyframes p-cmt { 0%, 1% { left: 30%; top: 50%; opacity: 0; } 2%, 8% { opacity: 1; } 9%, 100% { left: 30%; top: 85%; opacity: 0; } }

        #pkt-exec1 { animation: p-ex1 20s infinite linear; background: #1a1100; color: var(--amber); border: 2px solid var(--amber); box-shadow: 0 0 2vh var(--amber); }
        @keyframes p-ex1 { 0%, 11% { left: 30%; top: 50%; opacity: 0; } 12%, 18% { opacity: 1; } 19%, 100% { left: 75%; top: 30%; opacity: 0; } }

        #pkt-err { animation: p-err 20s infinite ease-out; background: var(--err); color: white; border: 0.3vh solid white; box-shadow: 0 0 4vh var(--err); }
        @keyframes p-err {
            0%, 21% { left: 75%; top: 30%; opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
            22% { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
            26% { left: 60%; top: 40%; transform: translate(-50%,-50%) rotate(-10deg); opacity: 1; }
            30% { left: 55%; top: 70%; transform: translate(-50%,-50%) rotate(-25deg); opacity: 0; }
            31%, 100% { opacity: 0; }
        }

        #pkt-fetch { animation: p-fch 20s infinite linear; background: #1a1100; color: var(--amber); border: 2px solid #886600; box-shadow: 0 0 1vh var(--amber); }
        @keyframes p-fch { 0%, 31% { left: 30%; top: 50%; opacity: 0; } 32%, 38% { opacity: 1; } 39%, 100% { left: 30%; top: 85%; opacity: 0; } }

        #pkt-rehyd { animation: p-reh 20s infinite ease-out; background: #001a1f; color: var(--cyan); border: 0.4vh solid var(--cyan); box-shadow: 0 0 3vh var(--cyan) inset, 0 0 5vh var(--cyan); font-size: 3vh; border-radius: 1vh; padding: 2.2vh 3.5vh; }
        @keyframes p-reh {
            0%, 41% { left: 30%; top: 85%; opacity: 0; }
            42% { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
            48% { left: 30%; top: 50%; opacity: 1; transform: translate(-50%, -50%) scale(1); }
            49%, 100% { left: 30%; top: 50%; opacity: 0; }
        }

        #pkt-exec2 { animation: p-ex2 20s infinite linear; background: #1a1100; color: var(--amber); border: 2px solid var(--amber); box-shadow: 0 0 2vh var(--amber); }
        @keyframes p-ex2 { 0%, 61% { left: 30%; top: 50%; opacity: 0; } 62%, 68% { opacity: 1; } 69%, 100% { left: 75%; top: 70%; opacity: 0; } }

        #pkt-res { animation: p-res 20s infinite linear; background: #001a0d; color: var(--emerald); border: 2px solid var(--emerald); box-shadow: 0 0 2vh var(--emerald); }
        @keyframes p-res { 0%, 81% { left: 75%; top: 70%; opacity: 0; } 82%, 88% { opacity: 1; } 89%, 100% { left: 30%; top: 50%; opacity: 0; } }

        /* Sold black background to block white line beneath */
        #pkt-out { animation: p-out 20s infinite linear; background: #000; color: white; border: 0.4vh solid white; box-shadow: 0 0 4vh white; }
        @keyframes p-out { 0%, 88% { left: 30%; top: 50%; opacity: 0; } 89%, 93% { opacity: 1; } 94%, 100% { left: 30%; top: 25%; opacity: 0; } }

    </style>
</head>
<body>
    <div id="composite-stage">
        <svg class="routing" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path class="trk-po base-line" d="M 30 50 L 30 25" />
            <path class="trk-spine base-line" d="M 30 50 L 30 85" />
            <path class="trk-w1 base-line" d="M 30 50 L 75 30" />
            <path class="trk-w2 base-line" d="M 30 50 L 75 70" />
        </svg>

        <div class="node" id="node-portal"><img id="img-portal" class="asset" /><div class="label">MCP INTERFACE</div></div>
        <div class="node" id="node-workflow"><img id="img-workflow" class="asset" /><div class="label">DURABLE WORKFLOW</div></div>
        <div class="node" id="node-vault"><img id="img-vault" class="asset" /><div class="label">ARCA STATE VAULT</div></div>
        <div class="node" id="node-worker1"><img id="img-worker1" class="asset" /><div class="label">COMPUTE NODE A</div></div>
        <div class="node" id="node-worker2"><img id="img-worker2" class="asset" /><div class="label">COMPUTE NODE B</div></div>

        <div id="pkt-commit" class="packet"><span>📝</span> commit_log(A1)</div>
        <div id="pkt-exec1" class="packet"><span>⚡</span> EXEC: charge_card</div>
        <div id="pkt-err" class="packet"><span>❌</span> DEAD OOM EVENT</div>
        <div id="pkt-fetch" class="packet"><span>🔍</span> query(ID:A1)</div>
        <div id="pkt-rehyd" class="packet"><span>💾</span> REHYDRATED_STATE_BLOB</div>
        <div id="pkt-exec2" class="packet"><span>⚡</span> EXEC: charge_card</div>
        <div id="pkt-res" class="packet"><span>✅</span> Result: Ok(tx_123)</div>
        <div id="pkt-out" class="packet"><span>🌐</span> Return to MCP >></div>
    </div>

<script>
const imgs = [
    {id: 'img-portal', b64: 'data:image/png;base64,{{PORTAL_B64}}'},
    {id: 'img-workflow', b64: 'data:image/png;base64,{{WORKFLOW_B64}}'},
    {id: 'img-worker1', b64: 'data:image/png;base64,{{WORKER_B64}}'},
    {id: 'img-worker2', b64: 'data:image/png;base64,{{WORKER_B64}}'},
    {id: 'img-vault', b64: 'data:image/png;base64,{{VAULT_B64}}'}
];

imgs.forEach(item => {
    let rawImg = new Image();
    rawImg.src = item.b64;
    rawImg.onload = () => {
        let canvas = document.createElement('canvas');
        canvas.width = rawImg.width; canvas.height = rawImg.height;
        let ctx = canvas.getContext('2d');
        ctx.drawImage(rawImg, 0, 0);
        let imgData = ctx.getImageData(0,0, canvas.width, canvas.height);
        let d = imgData.data;
        for(let i=0; i<d.length; i+=4) {
            let r=d[i], g=d[i+1], b=d[i+2];
            if (r > 180 && b > 180 && g < 100) { 
                d[i+3] = 0; 
            } else if (r > 120 && b > 120 && g < 120 && Math.abs(r-b) < 30) {
                d[i+3] = Math.max(0, d[i+3] - 180);
            }
        }
        ctx.putImageData(imgData, 0, 0);
        document.getElementById(item.id).src = canvas.toDataURL();
    };
});
</script>
</body>
</html>
