# Workspace architectural source of truth — read by `vox-arch-check`.
# See docs/src/architecture/2026-05-08-workspace-reorg-design.md and
# docs/src/architecture/2026-05-08-naming-and-guards-design.md.
#
# Layers (descending — L5 may depend on L0..L4; L0 may depend only on L0):
#   0 — Pure types (data only, no async runtime, no DB)
#   1 — Primitives & utilities (incl. plugin-api type-only surface)
#   2 — Domain libraries (pure-data domain logic)
#   3 — Heavy runtimes (DBs, compilers, orchestrators, plugin-host)
#   4 — Concrete plugins (cdylib consumers — loaded, not compiled-into-L0..L3)
#   5 — Surfaces (binaries, integration)
#
# Per-crate fields:
#   layer             — required; integer 0..=5
#   kind              — "library" | "plugin" | "binary" | "test-only"; default "library"
#   max_dependents    — optional; warn if more in-tree consumers than this
#   max_loc           — optional; warn if src/**/*.rs total exceeds this
#   staleness_exempt  — optional bool; set true for intentionally stable crates that
#                       should not be flagged by Rule 6 even when unchanged across releases
#
# Within-layer deps are allowed. Lower→higher is an inversion (failure unless
# explicitly listed under [[known_inversions]]).
#
# Binary-tool exception: a `kind = "binary"` crate at any layer is a *tool*
# (e.g., vox-arch-check, vox-ml-cli, vox-orchestrator-d) consumed via
# `cargo run -p <name>` rather than as a library dep. Such crates are exempt
# from the orphan rule and from the convention that workspace surfaces sit at L5.
# Only product-shipped binaries (the user-visible CLI surface) live at L5.

[guards]
# Strictness per rule. Layer ordering is implicitly strict (override with
# the --warn-only CLI flag). The other seven default to warn.
fan_in            = "warn"
loc_budget        = "warn"
orphan            = "warn"
docstring         = "warn"
description       = "error"
where_things_live = "error"
# Rule 8: warns when a crate has no commits since the last CHANGELOG.md release date.
# Silence for individual crates with staleness_exempt = true.
staleness         = "warn"
# Rule 9: warns when a @generated-hash header in a file no longer matches content.
generated_file_drift = "warn"
# Rule 10: strict — crates must not directly depend on any of their listed forbidden deps.
forbidden_deps    = "error"

# ── Rule 10: Forbidden direct dependencies ────────────────────────────────────
# vox-rule-pack and vox-code-audit must never directly depend on heavy search/
# vector crates. This keeps compile times neutral and the rule-pack zero-dep.
[[forbidden_deps]]
crate    = "vox-rule-pack"
forbidden = ["vox-search", "tantivy", "qdrant"]
reason   = "vox-rule-pack must remain zero heavy-dep; patterns live in YAML not embeddings"

[[forbidden_deps]]
crate    = "vox-code-audit"
forbidden = ["vox-search", "tantivy", "qdrant"]
reason   = "vox-code-audit detectors must not pull search/vector deps (build-time neutrality)"

[crates]

# ── L0 — pure types ───────────────────────────────────────────────────────────
vox-orchestrator-types = { layer = 0 }
vox-orchestrator-cap-mint = { layer = 1, max_loc = 200, max_dependents = 4 }
vox-db-types           = { layer = 0 }
vox-protocol           = { layer = 0 }
vox-mesh-types         = { layer = 0 }
vox-primitives         = { layer = 0 }
vox-agentos-mutation   = { layer = 0, max_dependents = 12 }
workspace-hack         = { layer = 0, max_dependents = 80, staleness_exempt = true }
vox-arch-check         = { layer = 0, kind = "binary" }
vox-build-meta         = { layer = 0, staleness_exempt = true }   # build-only helper; intentionally stable

# ── L1 — primitives & utilities ───────────────────────────────────────────────
vox-bounded-fs        = { layer = 1, max_dependents = 25 }
vox-hf-layout         = { layer = 1, max_loc = 6_000 }               # HF config.json layout (MENS / Candle plugins)
vox-crypto            = { layer = 1 }
vox-secrets           = { layer = 1, max_dependents = 25 }
vox-http-envelope     = { layer = 1, max_dependents = 8 }
vox-jsonschema-util   = { layer = 1 }
vox-checksum-manifest = { layer = 1 }
vox-identity          = { layer = 1 }
vox-reqwest-defaults  = { layer = 1 }
vox-rule-pack         = { layer = 1 }                            # SSOT loader for detector patterns; zero heavy deps
vox-openai-wire       = { layer = 1 }
vox-openai-sse        = { layer = 1 }
vox-exec-grammar      = { layer = 1 }
vox-grammar-export    = { layer = 1 }
vox-scaling-policy    = { layer = 1 }
vox-package-types     = { layer = 1 }                            # pure-types L1 leaf
vox-plugin-api        = { layer = 1 }                            # type/trait surface only
vox-plugin-types      = { layer = 1 }                            # pure-types L1 leaf
vox-research-events    = { layer = 1 }                            # SCIENTIA typed event bus (Phase 0b)
vox-telemetry         = { layer = 1 }                            # L1 telemetry facade; zero domain deps
vox-tracing-init      = { layer = 1 }                            # tracing_subscriber bootstrap presets (CLI vs daemon)

# ── L2 — domain libraries ─────────────────────────────────────────────────────
vox-config              = { layer = 2 }
vox-repository          = { layer = 2 }
vox-mcp-registry        = { layer = 2 }
vox-capability-registry = { layer = 2 }
vox-install-policy      = { layer = 2 }
vox-project-scaffold    = { layer = 2 }
vox-skill-runtime       = { layer = 2 }
vox-constrained-gen     = { layer = 2 }
vox-doc-inventory       = { layer = 2 }
vox-eval                = { layer = 2 }
vox-mens-eval           = { layer = 2 }
vox-claim-extractor     = { layer = 2, max_loc = 20_000 }               # SCIENTIA Phase 1: VeriScore + atomic + MiniCheck extraction
vox-nanopub             = { layer = 2, max_loc = 10_000 }               # SCIENTIA Phase 4: TriG emit + ed25519 sign + Nanopub Network
vox-prereg              = { layer = 2, max_loc = 8_000 }                # SCIENTIA Phase 2: PreregistrationV1 signing + deviation detection
vox-ro-crate            = { layer = 2, max_loc = 12_000 }               # SCIENTIA Phase 4: RO-Crate 1.2 builder
vox-share               = { layer = 2 }

# ── L3 — heavy runtimes ───────────────────────────────────────────────────────
vox-db                  = { layer = 3, max_dependents = 25, max_loc = 40_000 }
vox-corpus              = { layer = 3, max_loc = 15_000 }
vox-compiler            = { layer = 3, max_dependents = 25, max_loc = 35_000 }
vox-codegen             = { layer = 3, max_loc = 20_000 }
vox-scientia-jsonschema-codegen = { layer = 3 }               # offline SCIENTIA JSON Schema → Rust (typify)
vox-ml-cli              = { layer = 3, kind = "binary", max_loc = 20_000 }
vox-publisher           = { layer = 3, max_loc = 20_000 }
vox-orchestrator        = { layer = 3, max_dependents = 30, max_loc = 60_000 }
vox-orchestrator-core   = { layer = 3, kind = "boundary-marker", max_loc = 20_000 } # C5: orchestrator/ router/dispatcher; extraction blocked by 30+ crate:: cross-cuts
vox-orchestrator-test-helpers = { layer = 3, kind = "test-only", max_dependents = 25, staleness_exempt = true }
vox-actor-runtime       = { layer = 3, max_loc = 15_000 }
vox-populi              = { layer = 3, max_loc = 20_000 }
vox-oratio              = { layer = 3 }
vox-wasm-engine         = { layer = 3 }
vox-container           = { layer = 3 }
vox-forge               = { layer = 3 }
vox-git                 = { layer = 3 }
vox-openclaw-runtime    = { layer = 3 }
vox-workflow-runtime    = { layer = 3 }
vox-dashboard           = { layer = 3 }
vox-mesh-models         = { layer = 3 }
vox-mesh-policy         = { layer = 3 }
vox-webhook             = { layer = 3 }
vox-code-audit          = { layer = 3, max_loc = 15_000 }
vox-drift-check              = { layer = 3, kind = "binary", max_loc = 8_000 }
vox-wire-format-validator    = { layer = 3, kind = "binary", max_loc = 4_000 }
vox-lsp                 = { layer = 3 }
vox-gamify              = { layer = 3, max_loc = 20_000 }
vox-skills              = { layer = 3 }
vox-cli-core            = { layer = 3 }
vox-cli-ci              = { layer = 3, kind = "boundary-marker" } # C3: ci/ extraction boundary marker (full move pending bounded_read refactor)
vox-orchestrator-mcp    = { layer = 3, max_loc = 40_000 }        # Phase 4 extraction
vox-orchestrator-queue  = { layer = 3 }                          # Phase 5 extraction
vox-search              = { layer = 3 }
vox-scientia-ingest     = { layer = 3 }
vox-ssg                 = { layer = 3 }
vox-test-harness        = { layer = 3 }
vox-doc-pipeline        = { layer = 3 }
vox-deploy-codegen      = { layer = 3 }
vox-package             = { layer = 3 }
vox-inference           = { layer = 3 }
vox-distributed-training = { layer = 3 }
vox-tensor              = { layer = 3 }
vox-plugin-host         = { layer = 3 }
vox-plugin-catalog      = { layer = 3 }
vox-inspect-bridge      = { layer = 3, max_loc = 15_000 }               # SCIENTIA Phase 5: UK AISI Inspect adapter

# ── L4 — concrete plugins (cdylib only — never compile-time deps for L0..L3) ──
vox-plugin-browser           = { layer = 4, kind = "plugin" }
vox-plugin-cloud             = { layer = 4, kind = "plugin" }
vox-plugin-grammar-export    = { layer = 4, kind = "plugin" }
vox-plugin-mens-candle-cuda  = { layer = 4, kind = "plugin" }
vox-plugin-nvml-probe        = { layer = 4, kind = "plugin" }
vox-plugin-oratio            = { layer = 4, kind = "plugin" }
vox-plugin-oratio-mic        = { layer = 4, kind = "plugin" }
vox-plugin-populi-mesh       = { layer = 4, kind = "plugin" }
vox-plugin-publication       = { layer = 4, kind = "plugin" }
vox-plugin-runtime-container = { layer = 4, kind = "plugin" }
vox-plugin-runtime-wasm      = { layer = 4, kind = "plugin" }
vox-plugin-script-execution  = { layer = 4, kind = "plugin" }
vox-plugin-webhook           = { layer = 4, kind = "plugin" }

# ── L5 — surfaces ─────────────────────────────────────────────────────────────
vox-cli               = { layer = 5, kind = "binary", max_loc = 70_000 }
vox-integration-tests = { layer = 5, kind = "test-only" }
vox-orchestrator-d    = { layer = 5, kind = "binary" }


# ── Permitted inversions ──────────────────────────────────────────────────────
# Layer-check tolerates these specific lower-to-higher edges. Each entry
# documents WHY and what would be required to remove it.

[[known_inversions]]
from   = "vox-cli"
to     = "vox-orchestrator"
reason = "CLI ↔ orchestrator coupling is load-bearing for runtime/observability surfaces (vox status, vox attention, vox model *, vox dei, vox live). See build-time-log.md Phase 7 audit."

[[known_inversions]]
from   = "vox-arch-check"
to     = "vox-compiler"
reason = "dev-dependency only (rename-registry integration test added in feat(arch-check) VUV-9 task 8). The tool binary does not ship vox-compiler at runtime; remove once the test can be refactored to not need the full compiler crate."

# ── Rule 11 (P3-T7): Forbidden code patterns ─────────────────────────────────
# Forbid raw git invocations outside the concurrency-policy wrapper.
# See docs/src/architecture/git-concurrency-policy.md.
[[forbidden_pattern]]
name             = "raw-git-exec"
pattern          = 'Command::new\("git"\)'
file_glob        = "crates/**/*.rs"
exempt_files     = [
    "crates/vox-vcs-git/src/git_exec.rs",
    "crates/vox-arch-check/src/main.rs",
    "crates/vox-arch-check/src/forbidden_patterns.rs",
]
allow_annotation = "// vox-arch-check: allow git-exec"
reason           = "All git invocations must go through GitExec to honor the concurrency policy."
