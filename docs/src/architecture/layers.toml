# ── Permitted inversions ──────────────────────────────────────────────────────
# Layer-check tolerates these specific lower-to-higher edges. Each entry
# documents WHY and what would be required to remove it.

[[known_inversions]]
from   = "vox-cli"
to     = "vox-orchestrator"
reason = "CLI ↔ orchestrator coupling is load-bearing for runtime/observability surfaces (vox status, vox attention, vox model *, vox dei, vox live). See build-time-log.md Phase 7 audit."

[[known_inversions]]
from   = "vox-arch-check"
to     = "vox-compiler"
reason = "dev-dependency only (rename-registry integration test added in feat(arch-check) VUV-9 task 8). The tool binary does not ship vox-compiler at runtime; remove once the test can be refactored to not need the full compiler crate."

[[known_inversions]]
from   = "vox-ml-cli"
to     = "vox-cli"
reason = "Optional `mens-dei` workflow path shells out through `vox_cli::commands::build`, `build_service`, and `fs_utils` when `workflow-runtime` is disabled. Prefer extracting a shared L3 driver crate over tightening `vox-cli` deps."

# ── Rule 11 (P3-T7): Forbidden code patterns ─────────────────────────────────
# Forbid raw git invocations outside the concurrency-policy wrapper.
# See docs/src/architecture/git-concurrency-policy.md.
[[forbidden_pattern]]
name             = "raw-git-exec"
pattern          = 'Command::new\("git"\)'
file_glob        = "crates/**/*.rs"
exempt_files     = [
    "crates/vox-vcs-git/src/git_exec.rs",
    "crates/vox-arch-check/src/main.rs",
    "crates/vox-arch-check/src/forbidden_patterns.rs",
    "crates/vox-orchestrator-mcp/src/git_tools.rs",
    "crates/vox-repository/src/repo_catalog/query.rs",
    "crates/vox-search/src/memory_hybrid.rs",
    "crates/vox-git/src/bridge.rs",
    "crates/vox-orchestrator-mcp/src/git_exec.rs",
    "crates/vox-build-meta/src/lib.rs",
    "crates/vox-cli/src/commands/ci/data_storage_guard.rs",
    "crates/vox-cli/src/commands/ci/line_endings.rs",
    "crates/vox-cli/src/commands/ci/pre_push.rs",
    "crates/vox-cli/src/commands/ci/run_body_helpers/guards.rs",
    "crates/vox-cli/src/commands/ci/watch_run.rs",
    "crates/vox-cli/src/commands/ci/workspace_artifacts/mod.rs",
    "crates/vox-cli/src/commands/diagnostics/doctor/checks_standard/toolchain.rs",
    "crates/vox-cli/src/commands/repo_upgrade.rs",
    "crates/vox-cli/src/commands/review/coderabbit/git.rs",
    "crates/vox-cli/src/commands/review/coderabbit/github/reviews/baseline.rs",
    "crates/vox-cli/src/commands/review/coderabbit/github/reviews/stack.rs",
    "crates/vox-cli/src/commands/review/coderabbit/github/reviews/submit_branch.rs",
    "crates/vox-cli/src/commands/review/coderabbit/github/reviews/worktree.rs",
    "crates/vox-cli/src/commands/review/coderabbit/historical_planner.rs",
    "crates/vox-cli/src/commands/review/coderabbit/semantic_planner/collector.rs",
    "crates/vox-cli/src/commands/review/coderabbit/semantic_planner/submit.rs",
    "crates/vox-cli/src/commands/review/coderabbit/stack_planner/submit.rs",
    "crates/vox-doc-pipeline/src/pipeline/lint.rs",
]
allow_annotation = "// vox-arch-check: allow git-exec"
reason           = "All git invocations must go through GitExec to honor the concurrency policy."

# Emit boundary (ADR 036 / projection bundle): do not re-lower or re-project HIR outside
# `vox-codegen::projection_bundle` from TypeScript/Rust emitters — use `project_bundle_from_hir`.
[[forbidden_pattern]]
name             = "projection-bundle-ts-emit-boundary"
pattern          = '(?-u)\b(lower_hir_to_web_ir|project_web_from_core|project_app_contract|project_runtime_from_hir|project_shell_from_hir|project_required_capabilities)\s*\('
file_glob        = "crates/vox-codegen/src/codegen_ts/**/*.rs"
allow_annotation = "// vox-arch-check: allow-direct-projection"
reason           = "HIR projections for emit must go through projection_bundle (WebIR/AppContract/Runtime/Shell/RequiredCapabilities SSOT)."

[[forbidden_pattern]]
name             = "projection-bundle-rust-emit-boundary"
pattern          = '(?-u)\b(lower_hir_to_web_ir|project_web_from_core|project_app_contract|project_runtime_from_hir|project_shell_from_hir|project_required_capabilities)\s*\('
file_glob        = "crates/vox-codegen/src/codegen_rust/**/*.rs"
allow_annotation = "// vox-arch-check: allow-direct-projection"
reason           = "HIR projections for emit must go through projection_bundle (WebIR/AppContract/Runtime/Shell/RequiredCapabilities SSOT)."

# Crate-level `unsafe_code` allows — keep list short; prefer `EnvScratch`, scoped `#[allow]`, or `// vox-arch-check: allow crate unsafe_code`.
[[forbidden_pattern]]
name             = "crate-allow-unsafe-code"
pattern          = '#!\[allow\([^\]]*unsafe_code[^\]]*\)\]'
file_glob        = "crates/**/*.rs"
exempt_files     = [
    "crates/vox-test-harness/src/env_scratch.rs",
    "crates/vox-plugin-api/src/lib.rs",
    "crates/vox-lsp/tests/diagnostic_tests.rs",



    "crates/vox-populi/tests/ed25519_envelope.rs",
    "crates/vox-compiler/tests/mens_decorators.rs",
    "crates/vox-compiler/tests/reactive_smoke_test.rs",
    "crates/vox-compiler/tests/web_ir_environment_gates_test.rs",
    "crates/vox-compiler/tests/web_ir_lower_emit_test.rs",
    "crates/vox-integration-tests/tests/pipeline_env_test.rs",
    "crates/vox-integration-tests/tests/pipeline_test.rs",
    "crates/vox-integration-tests/tests/ts_emit_typecheck_test.rs",
    "crates/vox-orchestrator/tests/mesh_ai_fixture_relay.rs",
]
allow_annotation = "// vox-arch-check: allow crate unsafe_code"
reason           = "New crate-root `#![allow(unsafe_code)]` must be reviewed; centralize test env mutation or document FFI invariants instead of widening the surface."

# Tauri convergence (ADR 037): Capacitor and Axum-as-app surfaces are retired for
# generated desktop/mobile applications. Current call sites remain as explicit
# exemptions until the migration plan removes them task by task.
[[forbidden_pattern]]
name             = "no-capacitor-in-app-codegen"
pattern          = '@capacitor/'
file_glob        = "crates/vox-codegen/**/*.rs"
allow_annotation = "// vox-arch-check: allow capacitor-codegen"
reason           = "Generated app code must use @tauri-apps/* per ADR 037."

[[forbidden_pattern]]
name             = "no-cap-sync-in-cli"
pattern          = 'npx\s+cap\s+(sync|run|update)'
file_glob        = "crates/vox-cli/**/*.rs"
allow_annotation = "// vox-arch-check: allow cap-sync"
reason           = "`npx cap sync` is retired for app packaging; use Tauri mobile tooling per ADR 037."

[[forbidden_pattern]]
name             = "no-axum-in-generated-app-emit"
pattern          = 'axum::serve|axum::Router::new|axum::routing'
file_glob        = "crates/vox-codegen/src/codegen_rust/emit/**/*.rs"
exempt_files     = [
    "crates/vox-codegen/src/codegen_rust/emit/http.rs",
]
allow_annotation = "// vox-arch-check: allow axum-app-emit"
reason           = "Generated desktop/mobile applications must use Tauri; Axum emit is reserved for native-binary, dashboard, server, and daemon/API lanes."

[[forbidden_pattern]]
name             = "no-rust-embed-in-generated-cargo"
pattern          = 'rust-embed'
file_glob        = "crates/vox-codegen/src/codegen_rust/emit/**/*.rs"
exempt_files     = [
    "crates/vox-codegen/src/codegen_rust/emit/mod.rs",
]
allow_annotation = "// vox-arch-check: allow rust-embed-app-emit"
reason           = "Generated desktop/mobile applications bundle assets through Tauri `dist/`; rust-embed remains only for non-Tauri targets during migration."

[[forbidden_pattern]]
name             = "no-capacitor-deps-in-apps"
pattern          = '"@capacitor/'
file_glob        = "apps/**/package.json"
allow_annotation = "// vox-arch-check: allow capacitor-app-dep"
reason           = "Application package manifests use @tauri-apps/* per ADR 037."

