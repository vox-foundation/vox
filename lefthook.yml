# Pre-commit hooks — auto-maintain generated files so they never drift to CI.
# Install once after cloning: vox run scripts/install-hooks.vox
# Requires lefthook: https://github.com/evilmartians/lefthook
#
# stage_fixed: true  →  lefthook re-stages any files the generator rewrites,
#                        so the developer doesn't need to manually git add them.
pre-commit:
  parallel: false
  commands:
    # Formatting must pass before any other check so CI never sees a format failure
    # that slipped through locally.
    fmt-check:
      run: cargo fmt --all -- --check
      glob: "**/*.rs"
      fail_text: "rustfmt check failed. Run `cargo fmt --all` to fix."

    sync-ignore-files:
      run: cargo run -p vox-cli --quiet -- ci sync-ignore-files
      stage_fixed: true
      glob: ".voxignore"

    command-sync:
      run: cargo run -p vox-cli --quiet -- ci command-sync
      stage_fixed: true
      glob: "crates/vox-cli/src/commands/**/*.rs"

    plugin-catalog-docs:
      run: cargo run -p vox-cli --quiet -- ci generate-plugin-catalog-docs
      stage_fixed: true
      glob: "crates/vox-plugin-catalog/catalog.toml"

    # Test-First Policy enforcement (AGENTS.md §Test-First Policy).
    # Blocks commits that introduce a `pub fn` (Rust) or `fn` in golden Vox
    # without an adjacent test. Runs only when relevant files are staged.
    # `enforce-strict` makes Warnings (not just Errors) fail the commit.
    tdd-guard:
      run: cargo run -p vox-code-audit --bin toestub --quiet -- . --rules skeleton --min-severity warning --mode enforce-strict --format terminal
      glob: "{crates/**/*.rs,examples/golden/**/*.vox}"
      fail_text: "Test-First Policy violation. Add a #[test] (or @test in golden Vox) before the new pub fn lands. See AGENTS.md §Test-First Policy."

# Optional secondary gate when using lefthook directly on push (thin Rust drift).
# The authoritative hook installed by `vox ci install-hooks` delegates to `vox ci pre-push`
# (fast profile: fmt, line-endings, ssot-drift, scoped docs, vox-drift-check).
pre-push:
  parallel: false
  commands:
    drift-check:
      run: cargo run -p vox-drift-check --quiet -- . --severity warning --fail-on warning
      glob: "crates/**/*.rs"
