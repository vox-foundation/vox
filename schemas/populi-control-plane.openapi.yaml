openapi: 3.0.3
info:
  title: Vox populi control plane
  description: |
    HTTP API for populi node registry and A2A relay endpoints.
    Bearer auth is optional (`VOX_MESH_TOKEN`); `GET /health` is never authenticated.
    See `docs/src/reference/populi.md`.
  version: 1.0.0

paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "ok\n"

  /v1/populi/nodes:
    get:
      summary: List registered nodes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registry snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PopuliRegistryFile"
        "401":
          description: Missing or invalid bearer when server requires token

  /v1/populi/join:
    post:
      summary: Upsert a node (requires matching scope_id when server enforces VOX_MESH_SCOPE_ID)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeRecord"
      responses:
        "200":
          description: Accepted node record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeRecord"
        "401":
          description: Unauthorized
        "403":
          description: scope_id mismatch

  /v1/populi/heartbeat:
    post:
      summary: Refresh last_seen (and optional listen_addr)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeRecord"
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeRecord"
        "401":
          description: Unauthorized
        "403":
          description: scope_id mismatch

  /v1/populi/leave:
    post:
      summary: Remove a node by id
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveRequest"
      responses:
        "204":
          description: Removed
        "404":
          description: Unknown node id
        "401":
          description: Unauthorized

  /v1/populi/a2a/deliver:
    post:
      summary: Persist an A2A message for the receiver inbox
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2ADeliverRequest"
      responses:
        "200":
          description: Accepted delivery envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2ADeliverResponse"
        "401":
          description: Unauthorized

  /v1/populi/a2a/inbox:
    post:
      summary: Fetch unacknowledged A2A messages for a receiver
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2AInboxRequest"
      responses:
        "200":
          description: Current pending inbox entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AInboxResponse"
        "401":
          description: Unauthorized

  /v1/populi/a2a/ack:
    post:
      summary: Acknowledge one A2A message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2AAckRequest"
      responses:
        "204":
          description: Message acknowledged
        "404":
          description: Unknown message id for receiver
        "401":
          description: Unauthorized

  /v1/populi/bootstrap/exchange:
    post:
      summary: Exchange one-time bootstrap token for mesh credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapExchangeRequest"
      responses:
        "200":
          description: Bootstrap exchange granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapExchangeResponse"
        "404":
          description: Bootstrap exchange not enabled
        "410":
          description: Bootstrap token expired or already consumed
        "401":
          description: Invalid bootstrap token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    A2ADeliverRequest:
      type: object
      required: [sender_agent_id, receiver_agent_id, message_type, payload]
      properties:
        sender_agent_id:
          type: string
        receiver_agent_id:
          type: string
        message_type:
          type: string
        payload:
          type: string

    A2ADeliverResponse:
      type: object
      required: [accepted, message_id]
      properties:
        accepted:
          type: boolean
        message_id:
          type: integer
          format: int64

    A2AStoredMessage:
      type: object
      required:
        [
          id,
          sender_agent_id,
          receiver_agent_id,
          message_type,
          payload,
          created_unix_ms,
          acknowledged,
        ]
      properties:
        id:
          type: integer
          format: int64
        sender_agent_id:
          type: string
        receiver_agent_id:
          type: string
        message_type:
          type: string
        payload:
          type: string
        created_unix_ms:
          type: integer
          format: int64
        acknowledged:
          type: boolean

    A2AInboxRequest:
      type: object
      required: [receiver_agent_id]
      properties:
        receiver_agent_id:
          type: string

    A2AInboxResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/A2AStoredMessage"

    A2AAckRequest:
      type: object
      required: [receiver_agent_id, message_id]
      properties:
        receiver_agent_id:
          type: string
        message_id:
          type: integer
          format: int64

    BootstrapExchangeRequest:
      type: object
      required: [bootstrap_token]
      properties:
        bootstrap_token:
          type: string

    BootstrapExchangeResponse:
      type: object
      required: [mesh_token]
      properties:
        mesh_token:
          type: string
        scope_id:
          type: string
          nullable: true

    LeaveRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: Node id to remove

    TaskCapabilityHints:
      type: object
      description: Orchestrator capability hints (see vox-orchestrator contract)
      additionalProperties: true

    NodeRecord:
      type: object
      required: [id, capabilities, version, last_seen_unix_ms]
      properties:
        id:
          type: string
        capabilities:
          $ref: "#/components/schemas/TaskCapabilityHints"
        listen_addr:
          type: string
          nullable: true
        version:
          type: string
        last_seen_unix_ms:
          type: integer
          format: int64
        scope_id:
          type: string
          nullable: true
          description: Must match server VOX_MESH_SCOPE_ID when server enforces scope

    PopuliRegistryFile:
      type: object
      required: [schema_version, nodes]
      properties:
        schema_version:
          type: integer
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeRecord"
