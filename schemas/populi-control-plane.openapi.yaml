openapi: 3.0.3
info:
  title: Vox populi control plane
  description: |
    HTTP API for populi node registry and A2A relay endpoints (extension-first `/v1` only).
    Bearer auth is optional; `GET /health` and `POST /v1/populi/bootstrap/exchange` are never authenticated.
    When any mesh secret is set on the server (`VOX_MESH_TOKEN` and/or role tokens via Clavis), clients must
    present a matching `Authorization: Bearer`. Responses may include `x-populi-feature` (additive rollout hints).
    See `docs/src/reference/populi.md`.
  version: 1.0.0

paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string
                example: "ok\n"

  /v1/populi/nodes:
    get:
      summary: List registered nodes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registry snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PopuliRegistryFile"
        "401":
          description: Missing or invalid bearer when server requires token

  /v1/populi/join:
    post:
      summary: Upsert a node (requires matching scope_id when server enforces VOX_MESH_SCOPE_ID)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeRecord"
      responses:
        "200":
          description: Accepted node record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeRecord"
        "401":
          description: Unauthorized
        "403":
          description: scope_id mismatch

  /v1/populi/heartbeat:
    post:
      summary: Refresh last_seen (and optional listen_addr)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeRecord"
      responses:
        "200":
          description: Updated node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeRecord"
        "401":
          description: Unauthorized
        "403":
          description: scope_id mismatch

  /v1/populi/leave:
    post:
      summary: Remove a node by id
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeaveRequest"
      responses:
        "204":
          description: Removed
        "404":
          description: Unknown node id
        "401":
          description: Unauthorized

  /v1/populi/a2a/deliver:
    post:
      summary: Persist an A2A message for the receiver inbox
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2ADeliverRequest"
      responses:
        "200":
          description: Accepted delivery envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2ADeliverResponse"
        "401":
          description: Unauthorized

  /v1/populi/a2a/inbox:
    post:
      summary: Fetch unacknowledged A2A messages for a receiver
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2AInboxRequest"
      responses:
        "200":
          description: Current pending inbox entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/A2AInboxResponse"
        "401":
          description: Unauthorized

  /v1/populi/a2a/ack:
    post:
      summary: Acknowledge one A2A message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2AAckRequest"
      responses:
        "204":
          description: Message acknowledged
        "404":
          description: Unknown message id for receiver
        "401":
          description: Unauthorized

  /v1/populi/a2a/lease-renew:
    post:
      summary: Extend an active inbox lease held by claimer_node_id
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/A2ALeaseRenewRequest"
      responses:
        "204":
          description: Lease extended
        "400":
          description: Bad request (missing ids)
        "401":
          description: Unauthorized
        "403":
          description: Unknown claimer or quarantined node
        "404":
          description: Message not found
        "409":
          description: Not the lease holder

  /v1/populi/admin/quarantine:
    post:
      summary: Set NodeRecord quarantine (mesh/admin bearer only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminQuarantineRequest"
      responses:
        "204":
          description: Updated
        "401":
          description: Unauthorized
        "403":
          description: Insufficient role
        "404":
          description: Unknown node id

  /v1/populi/bootstrap/exchange:
    post:
      summary: Exchange one-time bootstrap token for mesh credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapExchangeRequest"
      responses:
        "200":
          description: Bootstrap exchange granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapExchangeResponse"
        "404":
          description: Bootstrap exchange not enabled
        "410":
          description: Bootstrap token expired or already consumed
        "401":
          description: Invalid bootstrap token

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque

  schemas:
    A2ADeliverRequest:
      type: object
      required: [sender_agent_id, receiver_agent_id, message_type, payload]
      properties:
        sender_agent_id:
          type: string
        receiver_agent_id:
          type: string
        message_type:
          type: string
        payload:
          type: string
        idempotency_key:
          type: string
          nullable: true
          description: When set, duplicate delivers return the same message_id while the row is pending.
        privacy_class:
          type: string
          nullable: true
          description: Optional claim policy hint (`public`, `private`, `trusted`, `trusted_only`, …).
        payload_blake3_hex:
          type: string
          nullable: true
          description: Optional 64-hex BLAKE3 digest of UTF-8 payload (`job_result` / `job_fail` attestations).
        worker_ed25519_sig_b64:
          type: string
          nullable: true
          description: Optional Standard base64 Ed25519 signature over the raw 32-byte BLAKE3 digest.

    A2ADeliverResponse:
      type: object
      required: [accepted, message_id]
      properties:
        accepted:
          type: boolean
        message_id:
          type: integer
          format: int64

    A2AStoredMessage:
      type: object
      required:
        [
          id,
          sender_agent_id,
          receiver_agent_id,
          message_type,
          payload,
          created_unix_ms,
          acknowledged,
        ]
      properties:
        id:
          type: integer
          format: int64
        sender_agent_id:
          type: string
        receiver_agent_id:
          type: string
        message_type:
          type: string
        payload:
          type: string
        created_unix_ms:
          type: integer
          format: int64
        acknowledged:
          type: boolean
        lease_holder_node_id:
          type: string
          nullable: true
        lease_expires_unix_ms:
          type: integer
          format: int64
          nullable: true
        privacy_class:
          type: string
          nullable: true
        idempotency_dedupe_key:
          type: string
          nullable: true
        payload_blake3_hex:
          type: string
          nullable: true
        worker_ed25519_sig_b64:
          type: string
          nullable: true

    A2AInboxRequest:
      type: object
      required: [receiver_agent_id]
      properties:
        receiver_agent_id:
          type: string
        claimer_node_id:
          type: string
          nullable: true
          description: When set, return at most one claimable row and refresh its inbox lease for this node id.

    A2AInboxResponse:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/A2AStoredMessage"

    A2AAckRequest:
      type: object
      required: [receiver_agent_id, message_id]
      properties:
        receiver_agent_id:
          type: string
        message_id:
          type: integer
          format: int64

    BootstrapExchangeRequest:
      type: object
      required: [bootstrap_token]
      properties:
        bootstrap_token:
          type: string

    BootstrapExchangeResponse:
      type: object
      required: [mesh_token]
      properties:
        mesh_token:
          type: string
        scope_id:
          type: string
          nullable: true

    LeaveRequest:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: Node id to remove

    TaskCapabilityHints:
      type: object
      description: Orchestrator capability hints (see vox-orchestrator contract)
      additionalProperties: true

    NodeRecord:
      type: object
      required: [id, capabilities, version, last_seen_unix_ms]
      properties:
        id:
          type: string
        capabilities:
          $ref: "#/components/schemas/TaskCapabilityHints"
        listen_addr:
          type: string
          nullable: true
        version:
          type: string
        last_seen_unix_ms:
          type: integer
          format: int64
        scope_id:
          type: string
          nullable: true
          description: Must match server VOX_MESH_SCOPE_ID when server enforces scope
        visibility:
          type: string
          nullable: true
        pool_id:
          type: string
          nullable: true
        trust_tier:
          type: string
          nullable: true
        workload_classes:
          type: array
          items:
            type: string
          nullable: true
        privacy_class:
          type: string
          nullable: true
        maintenance:
          type: boolean
          nullable: true
        provider:
          type: string
          nullable: true
          description: Optional hybrid tag (e.g. runpod/vast synthetic worker)
        quarantined:
          type: boolean
          nullable: true
          description: When true, server rejects new A2A claims for this node

    PopuliRegistryFile:
      type: object
      required: [schema_version, nodes]
      properties:
        schema_version:
          type: integer
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeRecord"
